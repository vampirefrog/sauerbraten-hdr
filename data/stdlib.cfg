//##############################################################################################################################################################
//  Console language standard library:
//##############################################################################################################################################################
//
//  Order of Execution:
//                  "data/stdlib.cfg"               *
//                  "data/font.cfg"
//                  "data/keymap.cfg"
//                  "data/stdedit.cfg"              *
//                  "data/sounds.cfg"
//                  "data/menus.cfg"                **
//                      EXEC "data/lists.cfg"
//                      EXEC "data/hud.cfg"
//                          EXEC "data/hud_edit.cfg"
//                          EXEC "data/hud_game.cfg"
//                      EXEC "data/menus_***.cfg"
//                  "data/brushes_heightmap.cfg"
//                  "data/brushes_blendmap.cfg"
//                  "data/game_fps.cfg"             **
//
//                  "servers.cfg"
//          IF NOT  "config.cfg"                    ***
//                      EXEC "data/defaults.cfg"            "defaults.cfg" is not executed if "config.cfg" exists.
//                      SAVE "restore.cfg"
//                  "autoexec.cfg"                  ***
//          DO      "playsong"
//                  "auth.cfg"                      ***     Put sensitive stuff in here, rather than "autoexec.cfg".
//
//                  "data/glsl.cfg"
//
//##############################################################################################################################################################
//##############################################################################################################################################################
+fround = [ round (+f $arg1 $arg2) (absf $arg2) ]

//==============================================================================================================================================================
//  Creates a macro whose body is a format string.
//      Example: macro greet [ say Hi, %1! ]
macro = [ $arg1 = (concat [format [@@arg2]] (loopconcat i $numargs [concatword " $arg" (+ $i 1)])) ]

//==============================================================================================================================================================
//  Edit the contents of an alias/var via the console:
modify = [
    if (getalias $arg1) [
        if (> (listlen $$arg1) 1) [
            saycommand (concatword "/" $arg1 " = " (escape $$arg1))
        ][
            saycommand (concatword "/" $arg1 " = " $$arg1)
        ]
    ][
        cond [varishexcolor $arg1][
            saycommand (concatword "/" $arg1 " " (& (>> $$arg1 16) 0xFF) " " (& (>> $$arg1 8) 0xFF) " " (& $$arg1 0xFF))
        ][> (listlen $$arg1) 1][
            saycommand (concatword "/" $arg1 " " (escape $$arg1))
        ][
            saycommand (concatword "/" $arg1 " " $$arg1)
        ]
    ]
]

//==============================================================================================================================================================
quine = [ echo (format "quine = [%1]" $quine) ]

//==============================================================================================================================================================
togglevar      = [ set $arg1 (= $$arg1 0); if (= $$arg1 0) [echo $arg1 "OFF"][echo $arg1 "ON"] ]
togglevarquiet = [ set $arg1 (= $$arg1 0) ]

//==============================================================================================================================================================
//  Built-in Var is a packed "hex color" (0xRrGgBb).
varishexcolor = [
    result (|| (
        >= (strrstr $arg1 "colour") 0)(
        =s $arg1 "ambient")(
        =s $arg1 "aolight")(
        =s $arg1 "skylight")(
        =s $arg1 "sunlight")(
        =s $arg1 "atmosunlight")(
        =s $arg1 "atmosundisk")
    )
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                         KEY BINDS
//  Binds a key so that it will toggle a variable:
//    arg1: KEYCODE Key to bind.
//    arg2: VAR     Var to toggle.
//    arg3: [...]   Codition required to toggle var.  Optional.
    bindvar = [if (>= $numargs 3) [      bind $arg1 [if (@arg3) [togglevar @@arg2]]  ][      bind $arg1 [togglevar @arg2]  ]]
editbindvar = [if (>= $numargs 3) [  editbind $arg1 [if (@arg3) [togglevar @@arg2]]  ][  editbind $arg1 [togglevar @arg2]  ]]

//==============================================================================================================================================================
    bindvarquiet = [     bind $arg1 [set @arg2 (= $@arg2 0)] ]
editbindvarquiet = [ editbind $arg1 [set @arg2 (= $@arg2 0)] ]

//==============================================================================================================================================================
//  Binds a key so that it will set a modifier while held down:
    bindmod = [     bind $arg1 [set @arg2 1; onrelease [set @@arg2 0]] ]
editbindmod = [ editbind $arg1 [set @arg2 1; onrelease [set @@arg2 0]] ]


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                      Universal Delta
//  This facilitates the various MouseWheel actions.
delta__active = 0
delta__mod    = 0

delta_use = [
    delta__active = $arg1;
    onrelease [
        //  This prevents janky behavior if multiple 'delta_use' keys are pressed simultaneously.
        if (= $delta__active @arg1) [
            delta__active = 0
        ]
    ]
]

delta_do = [
    do [
        delta__@(? $editing "edit" "game")_@delta__active @arg1
    ]
]

domodifier     = $delta_use //  Legacy Alias.
universaldelta = $delta_do  //  Legacy Alias.

//==============================================================================================================================================================
delta__game_0 = [
    if (&& $fullconsole $fullconscroll) [
        conskip (* $arg1 3)
    ][
        if (= $arg1 1) [weapon 2 3 5 4 1 6 0] [weapon 4 1 6 2 3 5 0]
    ]
]

//==============================================================================================================================================================
delta__edit_0 = [
    || [ patchextend $arg1 ] [   //  pointing at a patch edge control point: extend/shrink that edge
        cond [&& $fullconsole $fullconscroll] [ conskip (* $arg1 3)
        ]    [   $blendpaintmode            ] [ scrollblendbrush $arg1
        ]                                     [ editpush $arg1 1 ] //  CubeEdit: Empty|Fill Cubes.
    ]
]
delta__edit_1 = [nodebug [gridpower (+ $gridpower $arg1)]] //  CubeEdit: GridPower.
delta__edit_2 = [editpush    $arg1 0] //  CubeEdit: Push|Pull Cube-Face.
delta__edit_3 = [editpush    $arg1 2] //  CubeEdit: Push|Pull Cube-Corner.
delta__edit_4 = [editrotate  $arg1]   //  CubeEdit: Rotate geometry|brush.
delta__edit_5 = [edittex     $arg1]   //  CubeEdit: Change texture.
delta__edit_6 = [selectbrush $arg1]   //  CubeEdit: Change height-map brush.

delta__edit_7 = [entautoview $arg1]   //  Entity: Scroll to 'gotosel' through selected entities.

//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//  Entity Attributes:
delta__edit_11 = [entproperty2 0 (* $arg1 (? (delta__mod) 10 1))]
delta__edit_12 = [entproperty2 1 (* $arg1 (? (delta__mod) 10 1))]
delta__edit_13 = [entproperty2 2 (* $arg1 (? (delta__mod) 10 1))]
delta__edit_14 = [entproperty2 3 (* $arg1 (? (delta__mod) 10 1))]
delta__edit_15 = [entproperty2 4 (* $arg1 (? (delta__mod) 10 1))]

//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//  Texture Parameters:
delta__edit_21 = [vdelta [voffset (* $arg1 (? (delta__mod) 1 8)) 0]]
delta__edit_22 = [vdelta [voffset 0 (* $arg1 (? (delta__mod) 1 8))]]
delta__edit_23 = [vdelta [vrotate $arg1]]
delta__edit_24 = [
    if (delta__mod) [
        vscale (+f (getvscale $getseltex) (? (< $arg1 0) -0.0625 0.0625))
    ][
        vdelta [vscale (? (< $arg1 0) 0.5 2.0)]
    ]
]

//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//  COMBO -- EntityAttribute or TextureParameter:
delta__edit_31 = [if (&& $entediting $enthavesel) [delta__edit_11 $arg1] [delta__edit_21 $arg1]] //  EntAttr 1  OR  TexOffset X
delta__edit_32 = [if (&& $entediting $enthavesel) [delta__edit_12 $arg1] [delta__edit_22 $arg1]] //  EntAttr 2  OR  TexOffset Y
delta__edit_33 = [if (&& $entediting $enthavesel) [delta__edit_13 $arg1] [delta__edit_23 $arg1]] //  EntAttr 3  OR  TexRotate
delta__edit_34 = [if (&& $entediting $enthavesel) [delta__edit_14 $arg1] [delta__edit_24 $arg1]] //  EntAttr 4  OR  TexScale
delta__edit_35 = [if (&& $entediting $enthavesel) [delta__edit_15 $arg1]                       ] //  EntAttr 5  OR  nothing


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                       MISCELLANEOUS
FOV_GetHorzFromVert = [result (*f 2.0 (atan (*f (tan (divf $arg1 2.0)) (divf $scr_w $scr_h)) ))]
FOV_GetVertFromHorz = [result (*f 2.0 (atan (*f (tan (divf $fov  2.0)) (divf $scr_h $scr_w)) ))]
fovh = [
    if (> $numargs 0) [fov $arg1]
    echo "^f~fov vertical   =" (FOV_GetVertFromHorz)
    echo "^f~fov horizontal =" $fov
]
fovv = [
    if (> $numargs 0) [fov (round (FOV_GetHorzFromVert $arg1))]
    echo "^f~fov vertical   =" (FOV_GetVertFromHorz)
    echo "^f~fov horizontal =" $fov
]

//==============================================================================================================================================================
//  For clarity/readability.
ingame   = [isconnected    ] //  In game, offline or online.
ingamemp = [isconnected 0 0] //  In game, online.

//==============================================================================================================================================================
soundbuffermillis = [
    if $stereo [
        result (*f (divf (divf $soundbufferlen 2) $soundfreq) 1000)
    ][
        result (*f (divf       $soundbufferlen    $soundfreq) 1000)
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                   MATERIAL SLOT LOADING
//    arg1: INDEX   MaterialSlot  1-4
//    arg2: STRING  Diffuse Water  (not used)
//    arg3: STRING  Diffuse WaterFall
//    arg4: STRING  Water Normals
//    arg5: STRING  Water Distortion
//    arg6: STRING  WaterFall Normals
//    arg7: STRING  WaterFall Distortion
matwater = [
    cond [!= $numargs 7             ] [error "ERROR -- matwater: 7 args expected."
    ]    [|| [< $arg1 1] [> $arg1 4]] [error "ERROR -- matwater: index must be 1-4."
    ][
        texture (? (= $arg1 1) water water@arg1) (? (=s $arg2 "") "golgotha/water2.jpg" @arg2)
        texture 1 @arg3
        texture 1 @arg4
        texture 1 @arg5
        texture 1 @arg6
        texture 1 @arg7
    ]
]

//==============================================================================================================================================================
//    arg1: INDEX   MaterialSlot  1-4
//    arg2: STRING  Diffuse Lava
//    arg3: STRING  Diffuse LavaFall
matlava = [
    cond [!= $numargs 3             ] [error "ERROR -- matlava: 3 args expected."
    ]    [|| [< $arg1 1] [> $arg1 4]] [error "ERROR -- matlava: index must be 1-4."
    ][
        texture (? (= $arg1 1) lava lava@arg1) @arg2
        texture 1 @arg3
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                           STRING
//  Generate a string containing N chars or spaces:
//    arg1: INT     Repetitions of character(s).
//    arg2: STRING  Character(s) to repeat N times.
chars  = [loopconcatword i $arg1 [result $arg2]]
spaces = [loopconcatword i $arg1 [result " "]]


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                           COLOR
//    arg1: [LIST]  [ Red Grn Blu ]  0.0 to 1.0
// RETURNS: INT     0xRrGgBb
color_vectoint = [
    if (&& [= $numargs 1] [= (listlen $arg1) 3]) [
        local Red Grn Blu
        Red = (<< (+ 0 (round (*f (at $arg1 0) 255))) 16)
        Grn = (<< (+ 0 (round (*f (at $arg1 1) 255)))  8)
        Blu =     (+ 0 (round (*f (at $arg1 2) 255)))
        result (+ $Red (+ $Grn $Blu))
    ][
        result -1
    ]
]

//==============================================================================================================================================================
//    arg1: [LIST]  [ Hue Sat Vib ]   H = 0.0 to 3.6    S,V = 0.0 to 1.0
// RETURNS: [LIST]  [ Red Grn Blu ]   R,G,B = 0.0 to 1.0
color_hsvtorgb = [
    if (&& [= $numargs 1] [= (listlen $arg1) 3]) [
        local Hue Sat Vib
        Hue = (at $arg1 0)
        Sat = (at $arg1 1)
        Vib = (at $arg1 2)

        local c x m
        c = (*f   $Vib $Sat)

        x = (*f   $Hue 1.66666666666666666667)
        x = (modf $x   2.0)
        x = (-f   $x   1.0)
        x = (absf $x)
        x = (-f   1.0  $x)
        x = (*f   $c   $x)

        m = (-f   $Vib $c)

        local Red Grn Blu
        cond [&& [>=f $Hue 0.0] [<f  $Hue 0.6]] [ Red =  $c; Grn =  $x; Blu = 0.0
            ][&& [>=f $Hue 0.6] [<f  $Hue 1.2]] [ Red =  $x; Grn =  $c; Blu = 0.0
            ][&& [>=f $Hue 1.2] [<f  $Hue 1.8]] [ Red = 0.0; Grn =  $c; Blu =  $x
            ][&& [>=f $Hue 1.8] [<f  $Hue 2.4]] [ Red = 0.0; Grn =  $x; Blu =  $c
            ][&& [>=f $Hue 2.4] [<f  $Hue 3.0]] [ Red =  $x; Grn = 0.0; Blu =  $c
            ][&& [>=f $Hue 3.0] [<=f $Hue 3.6]] [ Red =  $c; Grn = 0.0; Blu =  $x ]
        Red = (+f $Red $m)
        Grn = (+f $Grn $m)
        Blu = (+f $Blu $m)

        result (concat $Red $Grn $Blu)
    ][
        result [-1 -1 -1]
    ]
]

//==============================================================================================================================================================
//    arg1: [LIST]  [ Red Grn Blu ]   R,G,B = 0.0 to 1.0
// RETURNS: [LIST]  [ Hue Sat Vib ]   H = 0.0 to 3.6    S,V = 0.0 to 1.0
color_rgbtohsv = [
    if (&& [= $numargs 1] [= (listlen $arg1) 3]) [
        local Red Grn Blu
        Red = (at $arg1 0)
        Grn = (at $arg1 1)
        Blu = (at $arg1 2)

        local Min Max Dlt
        Min = (minf $Red (minf $Grn $Blu))
        Max = (maxf $Red (maxf $Grn $Blu))
        Dlt = (-f $Max $Min)

        local Hue Sat Vib
        Vib = $Max

        if (&& (>f $Dlt 0.0) (>f $Max 0.0)) [
            Sat = (divf $Dlt $Max)

            cond [=f $Red $Max] [ Hue =         (divf (-f $Grn $Blu) $Dlt)
                ][=f $Grn $Max] [ Hue = (+f 2.0 (divf (-f $Blu $Red) $Dlt) )
                ][      1     ] [ Hue = (+f 4.0 (divf (-f $Red $Grn) $Dlt) ) ]

            if (<f $Hue 0.0) [Hue = (+f $Hue 6.0)] // Wrap.

          //Hue = (*f $Hue  0.16666666666666666666) // 0 to   1.0
            Hue = (*f $Hue  0.6)                    // 0 to   3.6
          //Hue = (*f $Hue 60.0)                    // 0 to 360.0
        ][
            Hue = 0.0
            Sat = 0.0
        ]

        result (concat $Hue $Sat $Vib)
    ][
        result [-1 -1 -1]
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//                                                                            LISTS
//    arg1: [LIST]   List must be sorted such that all duplicates are located next to each other.
// RETURNS: [LIST]   Purged of duplicates.
list_purgedups = [
    if (= $numargs 1) [
        local ListLen; ListLen = (listlen $arg1)
        if (> $ListLen 1) [
            local Result i
            Result = $arg1
            i = $ListLen
            while [> $i 0] [
                if (=s (at $Result $i) (at $Result (- $i 1))) [
                    Result = (listsplice $Result "" $i 1)
                ]
                i = (- $i 1)
            ]
            result $Result
        ][
            result $arg1
        ]
    ]
]

//==============================================================================================================================================================
//    arg1: [LIST]
// RETURNS: [LIST]   Shuffled.
list_shuffle = [
    if (= $numargs 1) [
        local ListLen; ListLen = (listlen $arg1)
        if (> $ListLen 1) [
            local Result iB HoldMe
            Result = $arg1
            loop iA (- $ListLen 1) [ //  -1, no need to swap last index with itself.
                //  Swap current item with any item AFTER it, including itself:
                iB = (rnd $ListLen $iA)
                HoldMe = (escape (at $Result $iA))
                Result = (listsplice $Result (escape (at $Result $iB)) $iA 1)
                Result = (listsplice $Result             $HoldMe       $iB 1)
            ]
            result $Result
        ][
            result $arg1
        ]
    ]
]

//==============================================================================================================================================================
//    arg1: [LIST]
// RETURNS: [LIST]   Sorted.
list_sort = [
    if (= $numargs 1) [
        if (> (listlen $arg1) 1) [
            result (sortlist $arg1 iA iB [naturalsort $iA $iB])
        ][
            result $arg1
        ]
    ]
]

//==============================================================================================================================================================
//    arg1: [LIST]
//    arg2: INDEX   ZeroInclusive
//    arg3: INDEX   ZeroInclusive
// RETURNS: [LIST]
list_swap = [
    local ListLen; ListLen = (listlen $arg1)
    cond [!= $numargs 3                     ] [error "ERROR -- list_swap: 3 args expected.^n    list_swap LIST INDEX INDEX"
    ]    [<= $ListLen 1                     ] [error "ERROR -- list_swap: list with at least 2 items expected"
    ]    [|| [< $arg2 0] [>= $arg2 $ListLen]] [error "ERROR -- list_swap: IndexA is out of range"
    ]    [|| [< $arg3 0] [>= $arg3 $ListLen]] [error "ERROR -- list_swap: IndexB is out of range"
    ][
        local Result HoldMe
        Result = $arg1
        HoldMe = (escape (at $Result $arg2))
        Result = (listsplice $Result (escape (at $Result $arg3)) $arg2 1)
        Result = (listsplice $Result             $HoldMe         $arg3 1)
        result $Result
    ]
]
