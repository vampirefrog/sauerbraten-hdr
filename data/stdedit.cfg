//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvar MSM_Active     0 0    1
    defvar MSM_FullScreen 0 0    1
    defvar MSM_ResX       0 0 8192
    defvar MSM_ResY       0 0 8192
    defvar MSM_FOV        0 0  180
    defvar MSM_HideHud    0 0    1
    defvar MSM_Spectator  0 0    1
]
togglemapshotmode = [
    if (= $getmode 1) [
        if $MSM_Active [
            //  Disable MapShotMode:
            fullscreen $MSM_FullScreen    ; MSM_FullScreen 0
            screenres  $MSM_ResX $MSM_ResY; MSM_ResX       0
                                            MSM_ResY       0
            fov        $MSM_FOV           ; MSM_FOV        0
            hidehud    $MSM_HideHud       ; MSM_HideHud    0
            spectator  $MSM_Spectator     ; MSM_Spectator  0

            sleep 100 [
                if (= $editing 0) [edittoggle]
                undo // "entfindpickups; delent"
                cancelsel
            ]

            MSM_Active 0
        ][
            //  Enable MapShotMode:
            if (= $editing 0) [edittoggle]

            cancelsel; entfindpickups; delent

            MSM_FullScreen $fullscreen ; fullscreen 0
            MSM_ResX       $scr_w
            MSM_ResY       $scr_h      ; screenres  768 768
            MSM_FOV        $fov        ; fov        70
            MSM_HideHud    $hidehud    ; hidehud    1
            MSM_Spectator  $isspectator; spectator  1

            MSM_Active 1
        ]
    ][
        error "ERROR -- togglemapshotmode: Gamemode must be Coopedit."
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//  These return "pretty" formatted strings:
prettyentdrop = [
    case $entdrop 0 [result "^f~entdrop ^f20 ^"at current position^""
                ] 1 [result "^f~entdrop ^f21 ^"at current position, to floor^""
                ] 2 [result "^f~entdrop ^f22 ^"at selection^""
                ] 3 [result "^f~entdrop ^f23 ^"at selection, to floor^""
                ]   [result ""
    ]
]

prettygetselpos = [
    if $enthavesel [
        result "^f~selpos (^f3~ ^f0~ ^f1~^f~)"
    ][
        concatword "^f~selpos (^f3"(at $getselpos 0)" ^f0"(at $getselpos 1)" ^f1"(at $getselpos 2)"^f~)"
    ]
]
prettygetselsavedpos  = [
    if (!=s $getselsavedpos "0 0 0") [
        concatword "^f~savedselpos (^f3"(at $getselsavedpos 0)" ^f0"(at $getselsavedpos 1)" ^f1"(at $getselsavedpos 2)"^f~)"
    ]
]
prettygetselsavedsize = [
    if (!=s $getselsavedsize "0 0 0") [
        concatword "^f~savedselsize (^f3"(at $getselsavedsize 0)" ^f0"(at $getselsavedsize 1)" ^f1"(at $getselsavedsize 2)"^f~)"
    ]
]

prettygridpower = [concatword "^f~gridpower ^f2" $gridpower "^f~(^f2" (+ (pow 2 $gridpower)) "^f~)"]

prettygetcampos = [
    concatword "^f~position ( ^f3" (at $getcampos 0) "  ^f0" (at $getcampos 1) "  ^f1" (at $getcampos 2) " ^f~)"
]

prettygetcampitch = [
    concatword "^f~rotation ( ^f3" $getcampitch "  ^f0" $getcamroll "  ^f1" $getcamyaw " ^f~)"
]
