nodebug [
    deffvarp CamSave_PosX -256 0 65792     //clamp(x, -256, MaxMapSize + 256);
    deffvarp CamSave_PosY -256 0 65792     //clamp(y, -256, MaxMapSize + 256);
    deffvarp CamSave_PosZ -256 0 65792     //clamp(z, -256, MaxMapSize + 256);
    deffvarp CamSave_Pch   -90 0    90
    deffvarp CamSave_Yaw  -360 0   360
]
camsave = [
    CamSave_PosX (at $getcampos 0)
    CamSave_PosY (at $getcampos 1)
    CamSave_PosZ (at $getcampos 2)
    CamSave_Pch $getcampitch
    CamSave_Yaw $getcamyaw
]
camrestore = [
    setcampos   $CamSave_PosX $CamSave_PosY $CamSave_PosZ
    setcampitch $CamSave_Pch
    setcamyaw   $CamSave_Yaw
]

