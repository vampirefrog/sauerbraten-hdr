togglemainmenu = [|| [cleartexgui] [cleargui 1] [showgui "main"]]

//  GAME  ======================================================================================================================================================
chooseplayermodel = [showgui "playermodel"]
mastergui         = [showgui "master"]

hudgui            = [showgui "hud"]
crosshairgui      = [showgui "crosshair"]
ammobargui        = [showgui "ammobar"]
gameclockgui      = [showgui "gameclock"]
hudscoregui       = [showgui "hudscore"]

browse_custommaps = [showgui "custommaps"]

//  EDIT  ======================================================================================================================================================
maplighting      = [toggleeditgui "map_lighting" 1]
mapmisc          = [toggleeditgui "map_misc"     1]
mapsky           = [toggleeditgui "map_sky"      1]

contextgui       = [toggleeditgui "context"]
materialgui      = [toggleeditgui "editmat"]

newentgui        = [toggleeditgui "newent"]
replacetexgui    = [toggleeditgui "replacetex"]
vcolorgui        = [toggleeditgui "vcolor"]
vshaderparamgui  = [toggleeditgui "vshaderparam"]

browse_mapmodels = [toggleeditgui "mapmodels"]
browse_prefabs   = [toggleeditgui "prefabs"]
browse_textures  = [toggleeditgui "showtexgui"]

manage_entities     = [toggleeditgui "entitymanager"]
manage_textureslots = [toggleeditgui "texslotmanager"]

//  TEXT EDITOR  ===============================================================================================================================================
notepad     = [if (> $numargs 0) [notepadfile = $arg1]; showgui "notepad"]
