    concatword "^n" (? (= $HUD_DeltaHighlight 1) "^f8" "^f~") "* ammo:^t^f2"  (entattr 0) "^f~ ^"" (? (< (entattr 0) 0) "^f5random-group" (? (> (entattr 0) 6) "^f3INVALID" (unescape (at $HUD_BaseAmmoTypes (entattr 0))) ) ) "^f~^"" )(
    concatword "^n" (? (= $HUD_DeltaHighlight 2) "^f8" "^f~") "* index:^t^f2" (entattr 1) (? (> (entattr 1) 0) (? (! (=s (getalias (concatword "base_"(entattr 1)) ) ""))  (concatword "^f~ ^"" (getalias (concatword "base_" (entattr 1)) ) "^"") )) )(
