//##############################################################################################################################################################
//  Defines the EditHUD, visible bottom-left while editing:
//##############################################################################################################################################################
//
//  Built-in edithud stuff:  (/showeditstats)
//
//      wtr  =  OctreeData:  Number of Triangles visible.   (% of total)
//      wvt  =  OctreeData:  Number of Vertices visible.    (% of total)
//      evt  =               Number of "Extra" Vertices??                       I see this a lot: "xtraverts += gle::end()"     "gle::end()" returns "numvertexes"
//      eva  =               Number of "Extra" VertexArrays??                   I see this a lot: "xtravertsva += numverts"
//                                                                              These both appear to be measuring vertex counts of something(s)...
//      ond  =  OctreeData:  Number of Nodes
//       va  =  OpenGL:      Number of VertexArrays
//       gl  =  OpenGL:      Number of DrawCalls            ("Batches")
//       oq  =  OpenGL:      Number of "Queries"
//       lm  =  MapData:     Number of Lightmap Textures
//       rp  =  MapData-ish: Number of RenderPlanes currently visible (used for water refraction & reflection)
//      pvs  =  MapData:     Number of PVS ViewCells
//
//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvarp  edithud_showmyposition 0 0 1
    defvarp  edithud_showmyrotation 0 0 1

    defvarp  edithud_showtexhistory 0 0 1
    defvarp  edithud_showselinfo    0 0 1

    defvarp  edithud_showtexparams      0 1 1
    defvarp  edithud_showtexlayerparams 0 0 1

    defsvarp edithud_listbools       [allfaces entediting entselsnap]
    defsvarp edithud_listboolsshy    [fullbright gridlookup showwaypoints]
    defsvarp edithud_listboolsnotice [dropwaypoints]
    defsvarp edithud_listvars        [floatspeed prettygridpower prettygetselpos] //prettygetselsavedpos prettygetselsavedsize

    defvar   HUD_ParticleTypeIsValid 0 0 1
    defsvar  HUD_DeltaHighlight      0 0 5
    defvar   HUD_Blinken             0 0 1
]

edithud = [
    cond [|| [= $delta__active 11][= $delta__active 21][= $delta__active 31]] [HUD_DeltaHighlight 1
        ][|| [= $delta__active 12][= $delta__active 22][= $delta__active 32]] [HUD_DeltaHighlight 2
        ][|| [= $delta__active 13][= $delta__active 23][= $delta__active 33]] [HUD_DeltaHighlight 3
        ][|| [= $delta__active 14][= $delta__active 24][= $delta__active 34]] [HUD_DeltaHighlight 4
        ][|| [= $delta__active 15][= $delta__active 25][= $delta__active 35]] [HUD_DeltaHighlight 5
                                                                            ] [HUD_DeltaHighlight 0]
    concatword (
        if $edithud_showmyposition [concatword "^f~position ( ^f3" (at $getcampos 0) "  ^f0" (at $getcampos 1) "  ^f1" (at $getcampos 2) " ^f~)" (? (!= $edithud_showmyrotation 0) "^n" "^n^n")]
    )(  if $edithud_showmyrotation [concatword "^f~rotation ( ^f3" $getcampitch "  ^f0" $getcamroll "  ^f1" $getcamyaw " ^f~)^n^n"]
    )(  if $edithud_showtexhistory [HUD__TexHistory]
    )(  if $edithud_showselinfo    [HUD__SelectionInfo]
    )(cond $hmapedit               [HUD__HeightMap
         ] $blendpaintmode         [HUD__BlendMap
         ] [! $enthavesel]         [HUD__CubeTex]
    )(  if (> $enthavesel 0)       [HUD__EntitySelection]
    )(                              HUD__Vars
    )
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
//    Note: 'getcurtex' and 'getreptex' are a bit buggy.
//          Can return random values based on selection.
//          Can cause "selection not in view" errors.
//              Odd, considering neither of them have anything to do with a selection...
//
//      getcurtex   Texture most recently used.
//      getreptex   Texture most recently replaced. ( /replace uses this. )
//
HUD__TexHistory = [
    local Result
    Result = (concatword $Result "^f~LastUsed: ^t[^f0" (+ $getcurtex 0) "^f~] ")
    Result = (concatword $Result "^f0^"" (gettexname (+ $getcurtex 0)) "^"^n")
    Result = (concatword $Result "^f~LastReplaced:^t[^f0" (+ $getreptex 0) "^f~] ")
    Result = (concatword $Result "^f0^"" (gettexname (+ $getreptex 0)) "^"^n^n")
    result $Result
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
HUD__SelectionInfo = [
    local Result
    Result = (concatword $Result "  ^f6Doing:")
    Result = (concatword $Result "^f~^tdragging ^f2"    $dragging  "^n")
    Result = (concatword $Result "^f~^t^tmoving ^f2"    $moving    "^n")
    Result = (concatword $Result "^f~^t^tentmoving ^f2" $entmoving "^n^n")

    Result = (concatword $Result "   ^f6How:")
    Result = (concatword $Result "^f~^tselectcorners ^f2"     $selectcorners   "^n")
    Result = (concatword $Result "^f~^t^tpassthroughcube ^f2" $passthroughcube "^n")
    Result = (concatword $Result "^f~^t^tpassthroughent ^f2"  $passthroughent  "^n")
    Result = (concatword $Result "^f~^t^tpassthroughsel ^f2"  $passthroughsel  "^n")
    Result = (concatword $Result "^f~^t^tpassthrough ^f2"     $passthrough     "^n")
    Result = (concatword $Result "^f~^t^teditinview ^f2"      $editinview      "^n")
    Result = (concatword $Result "^f~^t^tentediting ^f2"      $entediting      "^n")
    Result = (concatword $Result "^f~^t^tgridpower ^f2"       $gridpower       "  ^f~gridlookup ^f2" $gridlookup "^n")
    Result = (concatword $Result "^f~^t^tnompedit ^f2"        $nompedit        "^n^n")

    Result = (concatword $Result "  ^f6Where:")
    Result = (concatword $Result "^f~^tgetselpos ( ^f3"(at $getselpos 0)" ^f0"(at $getselpos 1)" ^f1"(at $getselpos 2)" ^f~)^n")
    Result = (concatword $Result "^f~^t^tgetselsavedpos ( ^f3"(at $getselsavedpos 0)" ^f0"(at $getselsavedpos 1)" ^f1"(at $getselsavedpos 2)" ^f~)  ")
    Result = (concatword $Result "^f~selmoved ^f2" $selmoved " ^f9(getselpos != getselsavedpos)^n") // If 'getselpos' not equal to 'getselsavedpos', this will return 1.
    Result = (concatword $Result "^f~^t^tgetselsavedsize ( ^f3"(at $getselsavedsize 0)" ^f0"(at $getselsavedsize 1)" ^f1"(at $getselsavedsize 2)" ^f~)^n^n")

    Result = (concatword $Result "   ^f6What:")
    Result = (concatword $Result "^f~^thavesel ^f2" $havesel "^n")
    Result = (concatword $Result "^f~^t^tselchildcount ^f2" $selchildcount "^n")
    Result = (concatword $Result "^f~^t^tselchildmat ^f2" $selchildmat "^n^n")

    //Result = (concatword $Result "^f~^t^tenthavesel ^f2" $enthavesel "^n")
    //Result = (HUD__EntitySelectionInfo)

    result $Result
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
HUD__HeightMap = [
    result (
        concatword "^f~heightmap^n*  brush: ^f~[^f2" $currentbrush "^f~] ^f2^"" $currentbrushname "^"^n^n"
    )
]

//==============================================================================================================================================================
HUD__BlendMap = [
    result (
        concatword "^f~blendmap^n*  mode: ^f2^""(
            at $Labels_BlendPaintMode $blendpaintmode
        )"^"^f~^n*  brush: ^f~[^f2"(
            curblendbrush
        )"^f~] ^f2^""(
            getblendbrushname $curblendbrush
        )"^"^n^n"
    )
]


//##############################################################################################################################################################
//##############################################################################################################################################################
HUD__CubeTex = [
    if (<= $getseltex 0) [
        result "^f~[^f2~^f~] ^f2^"~^"^n^n" //  Nothing, SkyTexture or subdivided-Cube is selected.
    ][
        if (= $edithud_showtexparams 0) [
            concatword "^f~[^f2" $getseltex "^f~] ^f2^"" (gettexname $getseltex) "^"^n^n"
        ][
            concatword "^f~[^f2" $getseltex "^f~] ^f2^"" (gettexname $getseltex) "^"^n" (
                HUD__TexColor      $getseltex 2 "*"
            )(  HUD__TexAlpha      $getseltex 2 "*"
            )(  HUD__TexOffset     $getseltex 2 "*" (? (= $HUD_DeltaHighlight 1) 1 (? (= $HUD_DeltaHighlight 2) 2 0))
            )(  HUD__TexRotate     $getseltex 2 "*" (= $HUD_DeltaHighlight 3)
            )(  HUD__TexScale      $getseltex 2 "*" (= $HUD_DeltaHighlight 4)
            )(  HUD__TexScroll     $getseltex 2 "*"
            )(  HUD__TexSmooth     $getseltex 2 "*"
            )(  HUD__vShaderParams $getseltex 2 "*"
            )(  HUD__TexLayer      $getseltex 6 "+"
            ) "^n"
        ]
    ]
]

//==============================================================================================================================================================
//    arg1: INDEX   TextureSlot
//    arg2: INT     Text Color
//    arg3: STRING  Prefix
//    arg4: BOOL    Highlight
HUD__TexColor = [
    if (|| [!=f (at (getvcolor $arg1) 0) 1.0] [!=f (at (getvcolor $arg1) 1) 1.0] [!=f (at (getvcolor $arg1) 2) 1.0]) [
        concatword "^f~" $arg3 " color:^t^f3" (at (getvcolor $arg1) 0) "  ^f0" (at (getvcolor $arg1) 1) "  ^f1" (at (getvcolor $arg1) 2) "^n"
    ]
]
HUD__TexAlpha = [
    if (|| [!=f (at (getvalpha $arg1) 0) 0.5] [!=f (at (getvalpha $arg1) 1) 0.0]) [
        concatword "^f~" $arg3 " alpha:^tfront: ^f5" (at (getvalpha  $arg1) 0) "  ^f~back: ^f5" (at (getvalpha  $arg1) 1) "^n"
    ]
]
HUD__TexRotate = [
    if (|| $arg4 [getvrotate $arg1]) [
        concatword (? $arg4 "^f8" "^f~") $arg3 " rotate:^t^f" $arg2 (getvrotate $arg1) " ^f~^"" (at $Labels_TexRotate (getvrotate $arg1)) "^"^n"
    ]
]
HUD__TexOffset = [
    if (|| $arg4 [!= (at (getvoffset $arg1) 0) 0] [!= (at (getvoffset $arg1) 1) 0]) [
        concatword (? $arg4 "^f8" "^f~") $arg3 " offset:^t" (? (= $arg4 1) "^f8" "^f3") (at (getvoffset $arg1) 0) "^t" (? (= $arg4 2) "^f8" "^f0") (at (getvoffset $arg1) 1) "^n"
    ]
]
HUD__TexScale = [
    if (|| $arg4 [!=f (getvscale $arg1) 1.0]) [
        concatword (? $arg4 "^f8" "^f~") $arg3 " scale:^t^f" $arg2 (getvscale $arg1) "^n"
    ]
]
HUD__TexScroll = [
    if (|| (!=f (at (getvscroll $arg1) 0) 0.0) (!=f (at (getvscroll $arg1) 1) 0.0) ) [
        concatword "^f~" $arg3 " scroll:^t^f3" (at (getvscroll $arg1) 0) "^t^f0" (at (getvscroll $arg1) 1) "^n"
    ]
]
HUD__TexSmooth = [
    if (!= (getvsmooth $arg1) -1) [
        concatword "^f~" $arg3 " smooth: ^f" $arg2 "group: "  (getvsmooth @arg1) "  threshold: " (getsmoothangle (getvsmooth @arg1)) "^n"
    ]
]
HUD__vShaderParams = [
    local Result
    if (getvshaderparamnames $arg1) [
        Result = (concatword "^f" $arg2)
        looplist Param (getvshaderparamnames $arg1) [
            Result = (concatword $Result "^"" $Param "^" " (getvshaderparam $arg1 $Param) "  ")
        ]
        concatword "^f~" $arg3 " vshaderparam: " $Result "^n"
    ]
]

//==============================================================================================================================================================
HUD__TexLayer = [
    if (getvlayer $arg1) [
        if (= $edithud_showtexlayerparams 0) [
            concatword "^f~" $arg3 " layer:^t^f~[^f" $arg2 (getvlayer $arg1) "^f~] ^f" $arg2 "^"" (gettexname (getvlayer $arg1)) "^"^n"
        ][
            iTex = (getvlayer $arg1)
            concatword "^f~" $arg3 " layer:^t^f~[^f6" $iTex "^f~] ^f6^""(gettexname $iTex)"^"^n" (
                HUD__TexColor      $iTex $arg2 $arg3
            )(  HUD__TexAlpha      $iTex $arg2 $arg3
            )(  HUD__TexOffset     $iTex $arg2 $arg3
            )(  HUD__TexRotate     $iTex $arg2 $arg3
            )(  HUD__TexScale      $iTex $arg2 $arg3
            )(  HUD__TexScroll     $iTex $arg2 $arg3
            )(  HUD__vShaderParams $iTex $arg2 $arg3
            )(  HUD__TexLayerMask  $arg1     2 ">"
            )
        ]
    ]
]

//==============================================================================================================================================================
nodebug [
    defsvar HUD_LayerMaskMode_0 "mask only" //  Reserved, use mode 1.
    defsvar HUD_LayerMaskMode_1 "mask only"
    defsvar HUD_LayerMaskMode_2 "min(blendmap, mask)"
    defsvar HUD_LayerMaskMode_3 "max(blendmap, mask)"
    defsvar HUD_LayerMaskMode_4 "min(blendmap, 255-mask)"
    defsvar HUD_LayerMaskMode_5 "max(blendmap, 255-mask)"
]
HUD__TexLayerMask = [
    if (getvlayermaskname $arg1) [
        local Result
        Result = (concatword         "^f~" $arg3 " layermask: ^f" $arg2 "^""(getvlayermaskname  $arg1)"^"^n")
        Result = (concatword $Result "^f~" $arg3 " mode:^t^f"     $arg2     (getvlayermaskmode  $arg1)" ^f~^"" $(concatword "HUD_LayerMaskMode_"(getvlayermaskmode $arg1)) "^"^n")
        Result = (concatword $Result "^f~" $arg3 " scale:^t^f"    $arg2     (getvlayermaskscale $arg1)"^n")
        result $Result
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
//##############################################################################################################################################################
//  Entity selection behavior has some quirks:
//==============================================================================================================================================================
//
//    > enthavesel                  Returns number of entities selected.
//                                  Does not count Hovered_Selection if you have a Clicked_Selection.
//
//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//
//    > entget                      Returns string/list with entity's type & attribute values
//    > entindex                    Returns entity's index.
//    > enttype                     Returns entity's type.
//    > entattr iAttr               Returns entity's attribute value.
//
//          Each of these will return value of Hovered_Selection, even if Clicked_Selection present.
//          With only a Clicked_Selection, it will always return value of last selected entity.
//
//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//
//    > entattr iAttr Value         Sets attribute to 'Value'.
//
//          With a Clicked_Selection, it will set value of Clicked_Selection entity(s) and does not set Hovered_Selection.
//
//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//
//    > entloop []                  This loops through all selected entities individually.
//                                  Entity commands behave differently inside this loop, they only apply to the current entity of the loop.
//                                      (entget, entindex, enttype, entattr)
//
//          Hovered_Selection is ignored inside 'entloop', unless there is no Clicked_Selection present.
//
//==============================================================================================================================================================
//
//    > entproperty iAttr Delta     This alias-command uses 'entattr' to get attribute value, offset the value with 'Delta', then applies value to selection.
//
//          With the aforementioned quirks:
//              If there is a Hovered_Selection, Value will come from Hovered_Selection, even if Clicked_Selection present.
//              Only Clicked_Selection will be modified, not Hovered_Selection, unless there is no Clicked_Selection.
//              Value got via 'entattr' will be set to all selected entities, regardless of their respective value.
//
//--------------------------------------------------------------------------------------------------------------------------------------------------------------
//
//    > entproperty2 iAttr Delta    Same as 'entproperty'.  However, this uses 'entloop' to modify each selected entity individually.
//                                  It is now used with default keybinds.
//
//          Hovered_Selection is ignored, unless there is no Clicked_Selection present.
//
//==============================================================================================================================================================
HUD__EntitySelection = [
    if (= $enthavesel 1) [
        if (=s (enttype) "particles") [
            HUD_ParticleTypeIsValid (|| (&& [>= (entattr 0) 0] [!= (entattr 0) 8] [<= (entattr 0) 13]) (&& [>= (entattr 0) 32] [<= (entattr 0) 35]))
        ][
            HUD_ParticleTypeIsValid 0
        ]
        format "^f~[^f6%1^f~] ^f6%2%3%4%5%6%7^n^n" (entindex) (enttype) @[HUD__EntAttr_@(enttype)]
    ][
        format "^f~[^f3~^f~] ^f3%1 entities selected%2%3%4%5%6^n^n" (enthavesel) @HUD__EntAttr
    ]
]

//##############################################################################################################################################################
//##############################################################################################################################################################
//  NOTE: Entity-Attributes are labeled 1-5, instead of 0-4, to correspond to default keybinds for editing values. ( NumRow 1-5 )
HUD__EntAttr = [(
    concatword "^n" (? (= $HUD_DeltaHighlight 1) "^f8" "^f9") "* attr1:^t^f9" (entattr 0) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 2) "^f8" "^f9") "* attr2:^t^f9" (entattr 1) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 3) "^f8" "^f9") "* attr3:^t^f9" (entattr 2) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 4) "^f8" "^f9") "* attr4:^t^f9" (entattr 3) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 5) "^f8" "^f9") "* attr5:^t^f9" (entattr 4) )
]

//==============================================================================================================================================================
//                                                                       Miscellaneous
HUD__EntAttr_none? = $HUD__EntAttr

HUD__EntAttr_carrot = [(
    concatword "^n" (? (= $HUD_DeltaHighlight 1) "^f8" "^f9") "* attr1:^t^f9" (entattr 0) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 2) "^f8" "^f~") "* spin!:^t^f2" (entattr 1) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 3) "^f8" "^f9") "* attr3:^t^f9" (entattr 2) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 4) "^f8" "^f9") "* attr4:^t^f9" (entattr 3) )(
    concatword "^n" (? (= $HUD_DeltaHighlight 5) "^f8" "^f9") "* attr5:^t^f9" (entattr 4) )
]

