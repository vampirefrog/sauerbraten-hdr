HUD__EntAttr_particles = [(
        Result = (concatword "^n" (? (= $HUD_DeltaHighlight 1) "^f8" "^f~") "* type:^t^f2" (entattr 0))
        if $HUD_ParticleTypeIsValid [
            Result = (concatword $Result " ^f~" $(concatword "HUD_PrtclType_"(entattr 0)) )
        ][
            Result = (concatword $Result " ^f~^"^f3INVALID^f~^"")
        ]
        result $Result
    )(
        if $HUD_ParticleTypeIsValid [
            Result = (concatword "^n" (? (= $HUD_DeltaHighlight 2) "^f8" "^f~") "* ")
            if (|| [= (entattr 0) 4] [= (entattr 0) 7]) [
                if (&& [>= (entattr 1) 256] [<= (entattr 1) 319]) [
                    Result = (concatword $Result "variety:^t^f2" (entattr 1))
                ][
                    Result = (concatword $Result "dir:^t^f2" (entattr 1))
                ]
            ][
                Result = (concatword $Result $(concatword "HUD_PrtclAttr1_"(entattr 0)) ":^t^f2" (entattr 1))
            ]
            cond [&& [>= (strstr $Result "dir") 0][>= (entattr 1)   0][<= (entattr 1)   5]][
                Result = (concatword $Result " ^f~^"" $(concatword "HUD_PrtclDir_"(entattr 1)) "^"")
            ][&& [>= (strstr $Result "var") 0][>= (entattr 1) 256][<= (entattr 1) 320]][
                Result = (concatword $Result " ^f~^"" $(concatword "HUD_PrtclVrty_"(mod (entattr 1) 64)) "^"")
            ]
        ][
            Result = (concatword "^n" (? (= $HUD_DeltaHighlight 2) "^f8" "^f9") "* attr2:^t^f9" (entattr 1))
        ]
        result $Result
    )(
        if (&& $HUD_ParticleTypeIsValid [!=s $(concatword "HUD_PrtclAttr2_"(entattr 0)) "X"]) [
            concatword "^n" (? (= $HUD_DeltaHighlight 3) "^f8" "^f~") "* " $(concatword "HUD_PrtclAttr2_"(entattr 0)) ":^t^f2" (at $entget 3)
        ][
            concatword "^n" (? (= $HUD_DeltaHighlight 3) "^f8" "^f9") "* attr3:^t^f9" (entattr 2)
        ]
    )(
        if (&& $HUD_ParticleTypeIsValid [!=s $(concatword "HUD_PrtclAttr3_"(entattr 0)) "X"]) [
            concatword "^n" (? (= $HUD_DeltaHighlight 4) "^f8" "^f~") "* " $(concatword "HUD_PrtclAttr3_"(entattr 0)) ":^t^f2" (at $entget 4)
        ][
            concatword "^n" (? (= $HUD_DeltaHighlight 4) "^f8" "^f9") "* attr4:^t^f9" (entattr 3)
        ]
    )(
        if (&& $HUD_ParticleTypeIsValid [!=s $(concatword "HUD_PrtclAttr4_"(entattr 0)) "X"]) [
            concatword "^n" (? (= $HUD_DeltaHighlight 5) "^f8" "^f~") "* " $(concatword "HUD_PrtclAttr4_"(entattr 0)) ":^t^f2" (entattr 4)
        ][
            concatword "^n" (? (= $HUD_DeltaHighlight 5) "^f8" "^f9") "* attr5:^t^f9" (entattr 4)
        ]
    )
]

