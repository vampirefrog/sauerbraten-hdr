HUD__Vars = [
    local Result; Result = ""

    looplist Bool $edithud_listbools [
        Result = (concatword $Result (? $$Bool "^f0" "^f4") $Bool "  ")
    ]

    looplist Bool $edithud_listboolsshy [
        if $$Bool [
            Result = (concatword $Result "^f8" $Bool "  ")
        ]
    ]

    HUD_Blinken (mod (div $getmillis 333) 2)
    looplist Bool $edithud_listboolsnotice [
        if $$Bool [
            Result = (concatword $Result (? $HUD_Blinken "^f0" "^f3") $Bool "  ")
        ]
    ]

    if $edithud_listvars [
        Result = (concatword $Result "^n")
        looplist Var $edithud_listvars [
            if (>= (strstr $Var "pretty") 0) [
                Result = (concatword $Result ($Var) (? ($Var) "  "))
            ][
                Result = (concatword $Result "^f~" $Var " ^f2" $$Var "  ")
            ]
        ]
    ]

    result $Result
