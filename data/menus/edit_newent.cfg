nodebug [
    defvar NE_Trig_MapModel -1 -1 65535
    defvar NE_Trig_Type      0  0 65535
]

newgui "newent_trigger" [
    guiscale .6
    guilist [// H
        guilist [// V
            guiradio "invisible" NE_Trig_MapModel -1
            guiradio "a carrot"  NE_Trig_MapModel 23
            guiradio "switch #1" NE_Trig_MapModel 24
            guiradio "switch #2" NE_Trig_MapModel 25
            guiradio "door #1"   NE_Trig_MapModel 26
            guiradio "door #2"   NE_Trig_MapModel 27
            guiradio "door #3"   NE_Trig_MapModel 28 // Model preview ???
        ]
        guibar
        guilist [// V
            guiradio "animation loop"                      NE_Trig_Type  0
            guiradio "trigger once (popback)"              NE_Trig_Type  1
            guiradio "trigger once (popback & rumble)"     NE_Trig_Type  2
            guiradio "trigger once"                        NE_Trig_Type  3
            guiradio "trigger once (rumble)"               NE_Trig_Type  4
            guiradio "trigger multiple (popback)"          NE_Trig_Type  5
            guiradio "trigger multiple (popback & rumble)" NE_Trig_Type  6
            guiradio "trigger multiple"                    NE_Trig_Type  7
            guiradio "trigger multiple (rumble)"           NE_Trig_Type  8
            guiradio "door (open once)"                    NE_Trig_Type  9
            guiradio "door (auto close)"                   NE_Trig_Type 10
            guiradio "door (locked)"                       NE_Trig_Type 11
            guiradio "vanishing trigger"                   NE_Trig_Type 12
            guiradio "vanishing trigger (rumble)"          NE_Trig_Type 13
            guiradio "End of Level Trigger"                NE_Trig_Type 29
        ]
        guibar
        guilist [// V
            loop i 9 [
                guibutton (concat tag (concatword # $i)) (concat BTti "=" $i ";" "NE__BuildTrigger")
            ]
        ]
    ]
] "newent > trigger"

NE__BuildTrigger = [newent mapmodel $BTmm $BTtt $BTti]
