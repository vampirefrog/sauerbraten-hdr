nodebug [
    defvar NE_Light_Preset -1 0 9
    defvar NE_Light_Bright  0 1 1

    defvar NE_Light_Radius 0 128 512
    defvar NE_Light_ColorR 0 255 255
    defvar NE_Light_ColorG 0 255 255
    defvar NE_Light_ColorB 0 255 255
]

newgui "newent_light" [
    guiscale .6
    guialign 0 [
        guititle (concatword "^f~/newent ^f7light ^f2" $NE_Light_Radius " ^f3" $NE_Light_ColorR " ^f0" $NE_Light_ColorG " ^f1" $NE_Light_ColorB )
    ]
    guibar
    guifreerow  9  1 [ guitext "radius: " 0
             ] 64 -2 [ guislider NE_Light_Radius 0 512
    ]
    guistrut 1
    guilist [// H
        guilist [// V
            guistrut 9 1
            guialign 1 [guitext "color: " 0]
            guistrut 1.5
            guialign 1 [guicolor (+ (* (+ (* $NE_Light_ColorR 256) $NE_Light_ColorG) 256) $NE_Light_ColorB); guistrut 1]
        ]
        guilist [// V
            guistrut 64 1
            guislider NE_Light_ColorR 0 255 [NE_Light_Preset -1]; guistrut 0.25
            guislider NE_Light_ColorG 0 255 [NE_Light_Preset -1]; guistrut 0.25
            guislider NE_Light_ColorB 0 255 [NE_Light_Preset -1]
        ]
    ]
    guistrut 0.5
    guilist [// H
        guilist [// V
            guistrut 9 1
        ]
        guilist [// V
            guistrut 64 1
            guialign 0 [// H
                guiradio "^f7white "  NE_Light_Preset 0 [NE__LightSet 255 255 255]
                guiradio "^f3red "    NE_Light_Preset 1 [NE__LightSet 255 192 192]
                guiradio "^f6orange " NE_Light_Preset 2 [NE__LightSet 255 224 192]
                guiradio "^f2yellow " NE_Light_Preset 3 [NE__LightSet 255 255 192]
                guiradio "^f0green "  NE_Light_Preset 4 [NE__LightSet 192 255 192]
                guiradio "^f8cyan "   NE_Light_Preset 5 [NE__LightSet 192 255 255]
                guiradio "^f1blue "   NE_Light_Preset 6 [NE__LightSet 192 192 255]
                guiradio "^f5violet " NE_Light_Preset 7 [NE__LightSet 255 192 255]
            ]
            guistrut 0.25
            guialign 0 [// H
                guicheckbox "bright" NE_Light_Bright 1 0 [if [>= $NE_Light_Preset 0] [NE__LightScale]]
            ]
        ]
    ]
    guistrut 1
    guialign 0 [
        guibutton "create" [newent light $NE_Light_Radius $NE_Light_ColorR $NE_Light_ColorG $NE_Light_ColorB]
    ]
    guistrut 0.5
] "newent > light"


NE__Light_Reset = [
    NE_Light_Preset 0
    NE_Light_Bright 1
    NE_Light_Radius 128
    NE_Light_ColorR 255
    NE_Light_ColorG 255
    NE_Light_ColorB 255
]

NE__LightSet = [
    NE_Light_ColorR $arg1
    NE_Light_ColorG $arg2
    NE_Light_ColorB $arg3
    if (= $NE_Light_Bright 0) NE__LightScale
]

NE__LightScale = [
    if (= $NE_Light_Bright 0) [
        NE_Light_ColorR (div $NE_Light_ColorR 2)
        NE_Light_ColorG (div $NE_Light_ColorG 2)
        NE_Light_ColorB (div $NE_Light_ColorB 2)
    ][
        NE_Light_ColorR (min 255 (* $NE_Light_ColorR 2))
        NE_Light_ColorG (min 255 (* $NE_Light_ColorG 2))
        NE_Light_ColorB (min 255 (* $NE_Light_ColorB 2))
    ]
]


