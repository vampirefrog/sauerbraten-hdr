nodebug [
    defvar NE_TelePort_Tag 0 0 10000
    defvar NE_TeleDest_Tag 0 0 10000

    NE_TelePortList = ""
    NE_TeleDestList = ""
]

newgui "newent_teleport" [
    guiscale .6
    guilist [// H
        guilist [//V
            guistrut 32 1
            guilist [// H

                guispring
                guititle (concatword "/newent ^f7teleport ^f2" $NE_TelePort_Tag)
                guispring

                guistayopen [
                    guibutton "" [NE_TelePort_Tag (max (+ $NE_TelePort_Tag -1)  0)] "val_dec"
                    guibutton "" [NE_TelePort_Tag (min (+ $NE_TelePort_Tag  1) 64)] "val_inc"
                ]
            ]
            guistrut 0.5
            guialign 0 [
                guibutton "create" [newent teleport $NE_TelePort_Tag]
            ]
            guistrut 0.25
            guibar
            guititle "teleports"
            guialign 0 [// H
                if ($entediting) [
                    guistrut 1.5 1
                    guistayopen [
                        looplist i $NE_TelePortList [
                            guibutton (concatword " [^f2" $i "^f~] ") [cancelsel; entfind teleport @i; gotosel] 0
                        ]
                    ]
                ][
                    guistrut 2.5 1
                    guitext "^f9lists won't populate^nwith entediting OFF" 0
                ]
            ]
        ]
        guibar
        guilist [//V
            guistrut 32 1
            guilist [// H

                guispring
                guititle (concatword "/newent ^f7teledest ^f2" $NE_TeleDest_Tag)
                guispring

                guistayopen [
                    guibutton "" [NE_TeleDest_Tag (max (+ $NE_TeleDest_Tag -1)  0)] "val_dec"
                    guibutton "" [NE_TeleDest_Tag (min (+ $NE_TeleDest_Tag  1) 64)] "val_inc"
                ]
            ]
            guistrut 0.5
            guialign 0 [
                guibutton "create" [newent teledest $NE_TeleDest_Tag]
            ]
            guistrut 0.25
            guibar
            guititle "destinations"
            guialign 0 [// H
                if ($entediting) [
                    guistrut 1.5 1
                    guistayopen [
                        looplist i $NE_TeleDestList [
                            guibutton (concatword " [^f2" $i "^f~] ") [cancelsel; entfind teledest * @i; gotosel] 0
                        ]
                    ]
                ][
                    guistrut 2.5 1
                    guitext "^f9~" 0
                ]
            ]
        ]
    ]
] "newent > teleport" [
    NE_TelePort_Tag 0
    NE_TeleDest_Tag 0
    NE_TelePortList = ""
    NE_TeleDestList = ""

    cancelsel
    entfind *       //  a way to entloop all entities without altering selection ???
    entloop [
        cond [=s $enttype "teleport"][ NE_TelePortList = (concat $NE_TelePortList (entattr 0))
            ][=s $enttype "teledest"][ NE_TeleDestList = (concat $NE_TeleDestList (entattr 1)) ]
    ]
    cancelsel

    NE_TelePortList = (sortlist $NE_TelePortList iA iB [naturalsort $iA $iB])
    if (> (listlen $NE_TelePortList) 1) [
        NE_TelePortList = (list_purgedups $NE_TelePortList)
    ]
    NE_TeleDestList = (sortlist $NE_TeleDestList iA iB [naturalsort $iA $iB])
    if (> (listlen $NE_TeleDestList) 1) [
        NE_TeleDestList = (list_purgedups $NE_TeleDestList)
    ]

    //  Find first un-used index:
    i = 0
    while [< $i 256] [
        if (= (listfind j $NE_TelePortList [= $j $i]) -1) [
            NE_TelePort_Tag $i
            i = 256 // Break/ExitLoop
        ][
            i = (+ $i 1)
        ]
    ]
    i = 0
    while [< $i 256] [
        if (= (listfind j $NE_TeleDestList [= $j $i]) -1) [
            NE_TeleDest_Tag $i
            i = 256 // Break/ExitLoop
        ][
            i = (+ $i 1)
        ]
    ]
]

