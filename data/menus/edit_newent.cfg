nodebug [
    defsvar NewEntString "^f7~"
]

newgui "newent" [
    guiscale 0.6;

    cond [>= (strstr $guirolloveraction "showgui") 0][NewEntString (concat (at $guirollovername 0) "^f6*")
        ][>= (strstr $guirolloveraction "newent")  0][NewEntString $guirollovername
                                                    ][NewEntString "^f7~"]
    guistrut 0.25
    guititle (concatword "/newent " $NewEntString)

    //guistrut 0.75

    guistrut 0.25
    guibar
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 12 1
        ]
        guilist [// V
            guistrut 18 1
            guibutton "^f7light"              [showgui "newent_light"    ]; guistrut 0.25
            guibutton "^f7spotlight"          [newent spotlight 45       ]; guistrut 0.25
            guibutton "^f7mapmodel  ^f2[F4]"  [showgui "mapmodels"       ]; guistrut 0.25
            guibutton "^f7particles"          [showgui "newent_particles"]
        ]
        guilist [// V
            guistrut 18 1
            guibutton "^f7playerstart"       [newent playerstart  ]; guistrut 0.25
            guibutton "^f7playerstart ^f61"  [newent playerstart 1]; guistrut 0.25
            guibutton "^f7playerstart ^f62"  [newent playerstart 2]; guistrut 0.25
            guibutton "^f7jumppad"           [showgui "newent_jumppad"]
         ]
        guilist [// V
            guistrut 16 1
            guibutton "^f7base"              [newent base  ]; guistrut 0.25
            guibutton "^f7flag ^f61"         [newent flag 1]; guistrut 0.25
            guibutton "^f7flag ^f62"         [newent flag 2]; guistrut 0.25
            guibutton "^f7teleport"          [showgui "newent_teleport"]
        ]
    ]

    guistrut 0.25
    guibar
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 12 1
            guialign 1 [guitext "pickups: " 0]
        ]
        guilist [// V
            guistrut 18 1
            guibutton "^f3shells"        [newent shells     ]; guistrut 0.25
            guibutton "^f0bullets"       [newent bullets    ]; guistrut 0.25
            guibutton "^f6rockets"       [newent rockets    ]; guistrut 0.25
            guibutton "^f1riflerounds"   [newent riflerounds]; guistrut 0.25
            guibutton "^f8grenades"      [newent grenades   ]; guistrut 0.25
            guibutton "^f9cartridges"    [newent cartridges ]
        ]
        guialign 0 [// V
            guistrut 18 1
            guibutton "^f8health"        [newent health     ]; guistrut 0.25
            guibutton "^f1healthboost"   [newent healthboost]
            guistrut 0.75
            guibutton "^f0greenarmour"   [newent greenarmour ]; guistrut 0.25
            guibutton "^f2yellowarmour"  [newent yellowarmour]
        ]
        guialign 0 [// V
            guistrut 16 1
            guibutton "^f3quaddamage"    [newent quaddamage]
        ]
    ]

    guistrut 0.5
    guialign 0 [// H
        guistrut 12
        guibutton "^f4select all pickup entities  ^f2/entfindpickups"   [entfindpickups]
    ]

    guistrut 0.25
    guibar
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 12 1
            guialign 1 [guitext "SP mode: " 0]
        ]
        guilist [// V
            guistrut 18 1
            guibutton "^f7monster"  [showgui "newent_monster"]; guistrut 0.25
            guibutton "^f7trigger"  [showgui "newent_trigger"]
        ]
        guilist [// V
            guistrut 18 1
            guibutton "^f7barrel"  [newent barrel]; guistrut 0.25
            guibutton "^f7box"     [newent box]
        ]
        guilist [// V
            guistrut 16 1
            guibutton "^f7elevator"  [newent elevator]; guistrut 0.25
            guibutton "^f7platform"  [newent platform]
        ]
    ]
    guistrut 0.5
]


