//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvar GUI_MapSky_Width  1 126 0
    defvar GUI_MapSky_Height 1  15 0
    defvar GUI_MapSky_RowWidth 1 25 0

    MAP_ComboList = ""
    defsvar MAP_SkyPreview ""

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
    defvar MAP_SkyboxColorR 0 0 255
    defvar MAP_SkyboxColorG 0 0 255
    defvar MAP_SkyboxColorB 0 0 255
    defvar MAP_SpinSky  -7200 0 7200 // -720.0  720.0

    defvar MAP_SkyboxCount 0  0 256

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
    defvar MAP_CloudboxColorR 0 0  255
    defvar MAP_CloudboxColorG 0 0  255 //  0  0xFFFFFF
    defvar MAP_CloudboxColorB 0 0  255
    defvar MAP_CloudboxAlpha  0 0  255 //    0.0    1.0
    defvar MAP_CloudClip      0 0 1000 //    0.0    1.0
    defvar MAP_SpinClouds -7200 0 7200 // -720.0  720.0

    defvar MAP_CloudboxCount      0  0 256
    defvar MAP_Cloudbox_ShowSkies 0  0   1

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
    defvar MAP_CloudAlpha         0 0   255 //    0.0      1.0
    defvar MAP_CloudColorR        0 0   255
    defvar MAP_CloudColorG        0 0   255 // 0  0xFFFFFF
    defvar MAP_CloudColorB        0 0   255
    defvar MAP_CloudFade          0 0  1000 //    0.0      1.0
    defvar MAP_CloudHeight    -1000 0  1000 //   -1.0      1.0
    defvar MAP_CloudOffsetX       0 0  1000 //    0.0      1.0
    defvar MAP_CloudOffsetY       0 0  1000 //    0.0      1.0
    defvar MAP_CloudScale         1 0 64000 //    0.001   64.0
    defvar MAP_CloudScrollX  -16000 0 16000 //  -16.0     16.0
    defvar MAP_CloudScrollY  -16000 0 16000 //  -16.0     16.0
    defvar MAP_SpinCloudLayer -7200 0  7200 // -720.0    720.0

    defvar MAP_CloudLayerCount 0 0 256

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
    defvar MAP_AtmoAlpha         0 0  255 //  0.0       1.0
    defvar MAP_AtmoBright        0 0 1600 //  0.0      16.0
    defvar MAP_AtmoDensity       0 0 1600 //  0.0      16.0
    defvar MAP_AtmoHaze          0 0 1600 //  0.0      16.0
    defvar MAP_AtmoHeight        0 0 1000 //  0.001  1000.0
    defvar MAP_AtmoOzone         0 0 1600 //  0.0      16.0
    defvar MAP_AtmoPlanetSize    0 0 1000 //  0.001  1000.0
    defvar MAP_AtmoSunDiskR      0 0  255
    defvar MAP_AtmoSunDiskG      0 0  255 //  0  0xFFFFFF
    defvar MAP_AtmoSunDiskB      0 0  255
    defvar MAP_AtmoSunDiskBright 0 0 1600 //  0.0      16.0
    defvar MAP_AtmoSunDiskCorona 0 0  100 //  0.0       1.0
    defvar MAP_AtmoSunDiskSize   0 0  900 //  0.0      90.0
    defvar MAP_AtmoSunLightR     0 0  255
    defvar MAP_AtmoSunLightG     0 0  255 //  0  0xFFFFFF
    defvar MAP_AtmoSunLightB     0 0  255
    defvar MAP_AtmoSunLightScale 0 0 1600 //  0.0,     16.0

    MAP__SkyAtmoReset = [
        atmoalpha           1.0
        atmobright          1.0
        atmodensity         1.0
        atmohaze            0.1
        atmoheight          1.0
        atmoozone           1.0
        atmoplanetsize      1.0
        atmosundisk         0x0
        atmosundiskbright   1.0
        atmosundiskcorona   0.4
        atmosundisksize    12.0
        atmosunlight        0x0
        atmosunlightscale   1.0
    ]

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
    defvar MAP_FogColorR 0 0 255
    defvar MAP_FogColorG 0 0 255
    defvar MAP_FogColorB 0 0 255

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
    defvar MAP_FogDomeColorR    0 0 255
    defvar MAP_FogDomeColorG    0 0 255 // 0  0xFFFFFF
    defvar MAP_FogDomeColorB    0 0 255
    defvar MAP_FogDomeMin       0 0 100 //  0.0  1.0
    defvar MAP_FogDomeMax       0 0 100 //  0.0  1.0
    defvar MAP_FogDomeClip      0 0 100 //  0.0  1.0
    defvar MAP_FogDomeHeight -100 0 100 // -1.0  1.0

    //----------------------------------------------------------------------------------------------------------------------------------------------------------
]


newgui "map_sky" [
    guiposition 0 1
    guiscale 0.6
    guikeeptab 1
    guistayopen [
    guistrut $GUI_MapSky_Width 1
    //##########################################################################################################################################################
    //##########################################################################################################################################################
    if (= $guitabnum  1) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1

            loop iCol (ceil (divf $MAP_SkyboxCount $GUI_MapSky_Height)) [
                guilist [// V
                    guistrut 25 1
                    loopsublist iSky $SkyboxList (* $iCol $GUI_MapSky_Height) $GUI_MapSky_Height [
                        guibutton $iSky (concat skybox $iSky) (? (=s $skybox $iSky) "radio_on" "radio_off")
                    ]
                ]
            ]

            //guispring
            guibar
            guilist [// V
                MAP_SkyPreview (checkrolloveraction "skybox " [if (> $numargs 0) [result $arg1] [at $guirolloveraction 1]])
                guiimage (concatword "<thumbnail:256>packages/" $MAP_SkyPreview "_ft") (checkrolloveraction "skybox ") 6 0 "data/cube.png" ""
                guistrut -1.5
                guialign 0 [guitext (concatword "^f~^"" (chopstr $MAP_SkyPreview -25 "..") "^"") 0]
                guistrut 0.75
                guibar
                guialign 0 [guitext (concatword "^f7skybox: ^f~^"" (chopstr $skybox -17 "..") "^"") 0]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f~parameters"
    if (= $guitabnum  2) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1

            guilist [// V
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1
                        guialign 1 [guicolor $skyboxcolour; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 64 1
                        MAP_SkyboxColorR (& (>> $skyboxcolour 16) 0xFF)
                        MAP_SkyboxColorG (& (>> $skyboxcolour  8) 0xFF)
                        MAP_SkyboxColorB (&     $skyboxcolour     0xFF)
                        guislider MAP_SkyboxColorR 0 255 [skyboxcolour $MAP_SkyboxColorR $MAP_SkyboxColorG $MAP_SkyboxColorB]
                        guislider MAP_SkyboxColorG 0 255 [skyboxcolour $MAP_SkyboxColorR $MAP_SkyboxColorG $MAP_SkyboxColorB]
                        guislider MAP_SkyboxColorB 0 255 [skyboxcolour $MAP_SkyboxColorR $MAP_SkyboxColorG $MAP_SkyboxColorB]
                    ]
                ]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "yaw: " 0]
                        guistrut 1
                        guialign 1 [guitext "spin: " 0]
                    ]
                    guilist [// V
                        guistrut 64 1
                        guislider yawsky
                        guistrut 1
                        MAP_SpinSky (*f $spinsky 10)
                        guislider MAP_SpinSky -200 200 [spinsky (*f $MAP_SpinSky 0.1)]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f7cloudbox"
    if (= $guitabnum  3) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1

            if $MAP_Cloudbox_ShowSkies [
                loop iCol (ceil (divf $MAP_CloudboxCount $GUI_MapSky_Height)) [
                    guilist [// V
                        guistrut 24 1
                        loopsublist iSky $MAP_ComboList (* $iCol $GUI_MapSky_Height) $GUI_MapSky_Height [
                            if (! $iSky) [
                                guibutton "^f9*no cloudbox*" [cloudbox ""] (? (=s $cloudbox $iSky) "radio_on" "radio_off")
                            ][
                                guibutton $iSky (concat cloudbox $iSky)    (? (=s $cloudbox $iSky) "radio_on" "radio_off")
                            ]
                        ]
                    ]
                ]
            ][
                loop iCol (ceil (divf $MAP_CloudboxCount $GUI_MapSky_Height)) [
                    guilist [// V
                        guistrut 24 1
                        loopsublist iSky $CloudboxList (* $iCol $GUI_MapSky_Height) $GUI_MapSky_Height [
                            if (! $iSky) [
                                guibutton "^f9*no cloudbox*" [cloudbox ""] (? (=s $cloudbox $iSky) "radio_on" "radio_off")
                            ][
                                guibutton $iSky (concat cloudbox $iSky)    (? (=s $cloudbox $iSky) "radio_on" "radio_off")
                            ]
                        ]
                    ]
                ]
            ]

            //guispring
            guibar
            guilist [// V
                MAP_SkyPreview (checkrolloveraction "cloudbox " [if (> $numargs 0) [result $arg1] [at $guirolloveraction 1]])
                guiimage (concatword "<thumbnail:256>packages/" $MAP_SkyPreview "_ft") (checkrolloveraction "cloudbox ") 5.875 0 "data/cube.png" ""
                guibar
                guialign 0 [guitext (concatword "^f7cloudbox: ^f~^"" (chopstr $cloudbox -16 "..") "^"") 0]
                guistrut 0.25
                guialign 0 [
                    guicheckbox "show skyboxes " MAP_Cloudbox_ShowSkies 1 0 [
                        MAP_ComboList = (concat $CloudboxList $SkyboxList)
                        if $MAP_Cloudbox_ShowSkies [
                            MAP_CloudboxCount (listlen $MAP_ComboList)
                        ][
                            MAP_CloudboxCount (listlen $CloudboxList)
                        ]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f7parameters"
    if (= $guitabnum  4) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1

            guilist [// V
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1
                        guialign 1 [guicolor $cloudboxcolour; guistrut 1]
                        guistrut 0.5
                        guialign 1 [guitext "alpha: " 0]
                    ]
                    guilist [// V
                        guistrut 64 1
                        MAP_CloudboxColorR (& (>> $cloudboxcolour 16) 0xFF)
                        MAP_CloudboxColorG (& (>> $cloudboxcolour  8) 0xFF)
                        MAP_CloudboxColorB (&     $cloudboxcolour     0xFF)
                        guislider MAP_CloudboxColorR 0 255 [cloudboxcolour $MAP_CloudboxColorR $MAP_CloudboxColorG $MAP_CloudboxColorB]
                        guislider MAP_CloudboxColorG 0 255 [cloudboxcolour $MAP_CloudboxColorR $MAP_CloudboxColorG $MAP_CloudboxColorB]
                        guislider MAP_CloudboxColorB 0 255 [cloudboxcolour $MAP_CloudboxColorR $MAP_CloudboxColorG $MAP_CloudboxColorB]
                        guistrut 0.5
                        MAP_CloudboxAlpha (*f $cloudboxalpha 255)
                        guislider MAP_CloudboxAlpha 0 255 [cloudboxalpha (*f $MAP_CloudboxAlpha (divf 1 255))]
                    ]
                ]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "clip: " 0]
                        guistrut 0.5
                        guialign 1 [guitext "spin: " 0]
                        guistrut 0.5
                        guialign 1 [guitext "yaw: " 0]
                    ]
                    guilist [// V
                        guistrut 64 1
                        MAP_CloudClip (*f $cloudclip 1000)
                        guislider MAP_CloudClip 0 1000 [cloudclip (*f $MAP_CloudClip 0.001)]
                        guistrut 0.5
                        MAP_SpinSky (*f $spinclouds 10)
                        guislider MAP_SpinSky -200 200 [spinclouds (*f $MAP_SpinSky 0.1)]
                        guistrut 0.5
                        guislider yawclouds
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f~cloudlayer"
    if (= $guitabnum  5) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1

            loop iCol (ceil (divf $MAP_CloudLayerCount $GUI_MapSky_Height)) [
                guilist [// V
                    guistrut 24 1
                    loopsublist iSky $CloudlayerList (* $iCol $GUI_MapSky_Height) $GUI_MapSky_Height [
                        if (! $iSky) [
                            guibutton "^f9*no cloudlayer*" [cloudlayer ""] (? (=s $cloudlayer $iSky) "radio_on" "radio_off")
                        ][
                            guibutton $iSky (concat cloudlayer $iSky)      (? (=s $cloudlayer $iSky) "radio_on" "radio_off")
                        ]
                    ]
                ]
            ]

            //guispring
            guibar
            guilist [// V
                MAP_SkyPreview (checkrolloveraction "cloudlayer " [at $guirolloveraction 1])
                guiimage (concatword "<thumbnail:128>packages/" $MAP_SkyPreview) (checkrolloveraction "cloudlayer ") 6 0 "data/cube.png" ""
                guibar
                guialign 0 [guitext (concatword "^f7cloudlayer: ^f~^"" (chopstr $cloudlayer -17 "..") "^"") 0]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f~parameters"
    if (= $guitabnum  6) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1
            //guistrut 12 1

            guilist [// V
                guititle "appearance"
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1
                        guialign 1 [guicolor $cloudcolour; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 52 1
                        MAP_CloudColorR (& (>> $cloudcolour 16) 0xFF)
                        MAP_CloudColorG (& (>> $cloudcolour  8) 0xFF)
                        MAP_CloudColorB (&     $cloudcolour     0xFF)
                        guislider MAP_CloudColorR 0 255 [cloudcolour $MAP_CloudColorR $MAP_CloudColorG $MAP_CloudColorB]
                        guislider MAP_CloudColorG 0 255 [cloudcolour $MAP_CloudColorR $MAP_CloudColorG $MAP_CloudColorB]
                        guislider MAP_CloudColorB 0 255 [cloudcolour $MAP_CloudColorR $MAP_CloudColorG $MAP_CloudColorB]
                    ]
                ]
                guistrut 0.5
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "alpha: " 0]
                        guistrut 0.5
                        guialign 1 [guitext "fade: " 0]
                    ]
                    guilist [// V
                        guistrut 52 1
                        MAP_CloudAlpha (*f $cloudalpha 255)
                        guislider MAP_CloudAlpha 0 255 [cloudalpha (*f $MAP_CloudAlpha (divf 1 255))]
                        guistrut 0.5
                        MAP_CloudFade (*f $cloudfade 1000)
                        guislider MAP_CloudFade  0 1000 [cloudfade  (*f $MAP_CloudFade  0.001)]
                    ]
                ]
            ]

            guibar
            guilist [// V
                guititle "position"
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 8 1
                        guialign 1 [guitext "offset x: " 0]
                        guialign 1 [guitext "offset y: " 0]
                        guistrut 0.5
                        guialign 1 [guitext "height: " 0]
                        guialign 1 [guitext "scale: " 0]
                        guistrut 0.5
                        guialign 1 [guitext "yaw: " 0]
                    ]
                    guilist [// V
                        guistrut 52 1
                        MAP_CloudOffsetX (*f $cloudoffsetx 1000)
                        MAP_CloudOffsetY (*f $cloudoffsety 1000)
                        guislider MAP_CloudOffsetX 0 1000 [cloudoffsetx (*f $MAP_CloudOffsetX 0.001)]
                        guislider MAP_CloudOffsetY 0 1000 [cloudoffsety (*f $MAP_CloudOffsetY 0.001)]
                        guistrut 0.5
                        MAP_CloudHeight (*f $cloudheight 100)
                        MAP_CloudScale  (*f $cloudscale  100)
                        guislider MAP_CloudHeight -100 100 [cloudheight (*f $MAP_CloudHeight 0.01)]
                        guislider MAP_CloudScale     1 400 [cloudscale  (*f $MAP_CloudScale  0.01)]
                        guistrut 0.5
                        guislider yawcloudlayer
                    ]
                ]

                guistrut 1
                guititle "animation"
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 8 1
                        guialign 1 [guitext "scroll x: " 0]
                        guialign 1 [guitext "scroll y: " 0]
                        guistrut 0.5
                        guialign 1 [guitext "spin: " 0]
                    ]
                    guilist [// V
                        guistrut 52 1
                        MAP_CloudScrollX (*f $cloudscrollx 10000)
                        MAP_CloudScrollY (*f $cloudscrolly 10000)
                        guislider MAP_CloudScrollX 0 1000 [cloudscrollx (*f $MAP_CloudScrollX 0.0001)]
                        guislider MAP_CloudScrollY 0 1000 [cloudscrolly (*f $MAP_CloudScrollY 0.0001)]
                        guistrut 0.5
                        MAP_SpinCloudLayer (*f $spincloudlayer 10)
                        guislider MAP_SpinCloudLayer -200 200 [spincloudlayer (*f $MAP_SpinCloudLayer 0.1)]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f7atmo"
    if (= $guitabnum  7) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1

            guilist [// V
                guialign 0 [
                    guicheckbox "atmo enabled" atmo
                    guispring
                    guistayopen [guibutton "RESET" [MAP__SkyAtmoReset]]
                ]
                guistrut 0.5 //guibar
                guilist [// H
                    guilist [// V
                        guistrut 13 1
                        guialign 1 [guitext "alpha: " 0]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_AtmoAlpha (*f $atmoalpha 255)
                        guislider MAP_AtmoAlpha 0 255 [atmoalpha (*f $MAP_AtmoAlpha (divf 1 255))]
                    ]
                ]

                guibar //---------------------------------------------------------------------------------------------------------------------------------------
                guititle "atmosphere"
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 13 1
                        guialign 1 [guitext "bright: "     0]
                        guistrut 0.5
                        guialign 1 [guitext "density: "    0]
                        guialign 1 [guitext "haze: "       0]
                        guialign 1 [guitext "ozone: "      0]
                        guistrut 0.5
                        guialign 1 [guitext "height: "     0]
                        guialign 1 [guitext "planetsize: " 0]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_AtmoBright     (*f $atmobright     100)
                        MAP_AtmoDensity    (*f $atmodensity    100)
                        MAP_AtmoHaze       (*f $atmohaze       100)
                        MAP_AtmoHeight     (*f $atmoheight     100)
                        MAP_AtmoOzone      (*f $atmoozone      100)
                        MAP_AtmoPlanetSize (*f $atmoplanetsize 100)
                        guislider MAP_AtmoBright     0 1600 [atmobright     (*f $MAP_AtmoBright     0.01)]
                        guistrut 0.5
                        guislider MAP_AtmoDensity    0 1600 [atmodensity    (*f $MAP_AtmoDensity    0.01)]
                        guislider MAP_AtmoHaze       0 1600 [atmohaze       (*f $MAP_AtmoHaze       0.01)]
                        guislider MAP_AtmoOzone      0 1600 [atmoozone      (*f $MAP_AtmoOzone      0.01)]
                        guistrut 0.5
                        guislider MAP_AtmoHeight     1 1000 [atmoheight     (*f $MAP_AtmoHeight     0.01)] //  Vertical-size/depth of atmosphere.
                        guislider MAP_AtmoPlanetSize 1 1000 [atmoplanetsize (*f $MAP_AtmoPlanetSize 0.01)] //  Atmosphere "shape" / falloff towards horizon.
                    ]
                ]
            ]

            guibar //===========================================================================================================================================
            guilist [// V
                guititle "sundisk"
                guistrut 0.25
                MAP_AtmoSunDiskR (& (>> $atmosundisk 16) 0xFF)
                MAP_AtmoSunDiskG (& (>> $atmosundisk  8) 0xFF)
                MAP_AtmoSunDiskB (&     $atmosundisk     0xFF)
                MAP_AtmoSunDiskBright (*f $atmosundiskbright 100)
                MAP_AtmoSunDiskCorona (*f $atmosundiskcorona 100)
                MAP_AtmoSunDiskSize   (*f $atmosundisksize    10)
                guilist [// H
                    guilist [// V
                        guistrut 13 1
                        guialign 1 [guitext "color: " 0]
                        guialign 1 [guitext "^f90=use sunlight " 0]
                        guialign 1 [guicolor $atmosundisk; guistrut 1]
                        guistrut 0.5
                        guialign 1 [guitext "bright: " 0]
                        guialign 1 [guitext "corona: " 0]
                        guialign 1 [guitext "size: " 0]
                    ]
                    guilist [// V
                        guistrut 48 1
                        guislider MAP_AtmoSunDiskR 0 255 [atmosundisk $MAP_AtmoSunDiskR $MAP_AtmoSunDiskG $MAP_AtmoSunDiskB]
                        guislider MAP_AtmoSunDiskG 0 255 [atmosundisk $MAP_AtmoSunDiskR $MAP_AtmoSunDiskG $MAP_AtmoSunDiskB]
                        guislider MAP_AtmoSunDiskB 0 255 [atmosundisk $MAP_AtmoSunDiskR $MAP_AtmoSunDiskG $MAP_AtmoSunDiskB]
                        guistrut 0.5
                        guislider MAP_AtmoSunDiskBright 0 1600 [atmosundiskbright (*f $MAP_AtmoSunDiskBright 0.01)]
                        guislider MAP_AtmoSunDiskCorona 0  100 [atmosundiskcorona (*f $MAP_AtmoSunDiskCorona 0.01)]
                        guislider MAP_AtmoSunDiskSize   0  900 [atmosundisksize   (*f $MAP_AtmoSunDiskSize   0.1 )]
                    ]
                ]

                guibar //---------------------------------------------------------------------------------------------------------------------------------------
                guititle "atmo sunlight"
                guistrut 0.25
                MAP_AtmoSunLightR (& (>> $atmosunlight 16) 0xFF)
                MAP_AtmoSunLightG (& (>> $atmosunlight  8) 0xFF)
                MAP_AtmoSunLightB (&     $atmosunlight     0xFF)
                MAP_AtmoSunLightScale (*f $atmosunlightscale 100)
                guilist [// H
                    guilist [// V
                        guistrut 13 1
                        guialign 1 [guitext "color: " 0]
                        guialign 1 [guitext "^f90=use sunlight " 0]
                        guialign 1 [guicolor $atmosunlight; guistrut 1]
                        guistrut 0.5
                        guialign 1 [guitext "color scale: " 0]
                    ]
                    guilist [// V
                        guistrut 48 1
                        guislider MAP_AtmoSunLightR 0 255 [atmosunlight $MAP_AtmoSunLightR $MAP_AtmoSunLightG $MAP_AtmoSunLightB]
                        guislider MAP_AtmoSunLightG 0 255 [atmosunlight $MAP_AtmoSunLightR $MAP_AtmoSunLightG $MAP_AtmoSunLightB]
                        guislider MAP_AtmoSunLightB 0 255 [atmosunlight $MAP_AtmoSunLightR $MAP_AtmoSunLightG $MAP_AtmoSunLightB]
                        guistrut 0.5
                        guislider MAP_AtmoSunLightScale 0 500 [atmosunlightscale (*f $MAP_AtmoSunLightScale 0.01)]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f~fog"
    if (= $guitabnum  8) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1
            guilist [// V
                guistrut 0.25

                guifreerow  9  1 [ guitext "distance: " 0
                         ] 64 -2 [ guislider fog 128 16384
                ]

                guistrut 1.5
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1.5
                        guialign 1 [guicolor $fogcolour; guistrut 1]
                    ]

                    guilist [// V
                        guistrut 64 1

                        MAP_FogColorR (& (>> $fogcolour 16) 0xFF)
                        MAP_FogColorG (& (>> $fogcolour  8) 0xFF)
                        MAP_FogColorB (&     $fogcolour     0xFF)

                        guislider MAP_FogColorR 0 255 [fogcolour $MAP_FogColorR $MAP_FogColorG $MAP_FogColorB]; guistrut 0.25
                        guislider MAP_FogColorG 0 255 [fogcolour $MAP_FogColorR $MAP_FogColorG $MAP_FogColorB]; guistrut 0.25
                        guislider MAP_FogColorB 0 255 [fogcolour $MAP_FogColorR $MAP_FogColorG $MAP_FogColorB]
                    ]
                ]
            ]

        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "^f~fogdome"
    if (= $guitabnum  9) [
        guialign 0 [// H
            guistrut $GUI_MapSky_Height 1
            guilist [// V
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1.5
                        guialign 1 [guicolor $fogdomecolour; guistrut 1]
                    ]

                    guilist [// V
                        guistrut 64 1

                        MAP_FogDomeColorR (& (>> $fogdomecolour 16) 0xFF)
                        MAP_FogDomeColorG (& (>> $fogdomecolour  8) 0xFF)
                        MAP_FogDomeColorB (&     $fogdomecolour     0xFF)

                        guislider MAP_FogDomeColorR 0 255 [fogdomecolour $MAP_FogDomeColorR $MAP_FogDomeColorG $MAP_FogDomeColorB]; guistrut 0.25
                        guislider MAP_FogDomeColorG 0 255 [fogdomecolour $MAP_FogDomeColorR $MAP_FogDomeColorG $MAP_FogDomeColorB]; guistrut 0.25
                        guislider MAP_FogDomeColorB 0 255 [fogdomecolour $MAP_FogDomeColorR $MAP_FogDomeColorG $MAP_FogDomeColorB]
                    ]
                ]

                guistrut 1.5
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "min: " 0]; guistrut 0.25
                        guialign 1 [guitext "max: " 0]
                    ]

                    guilist [// V
                        guistrut 64 1

                        MAP_FogDomeMin (*f $fogdomemin 100)
                        MAP_FogDomeMax (*f $fogdomemax 100)

                        guislider MAP_FogDomeMin 0 100 [fogdomemin (*f $MAP_FogDomeMin 0.01)]; guistrut 0.25
                        guislider MAP_FogDomeMax 0 100 [fogdomemax (*f $MAP_FogDomeMax 0.01)]
                    ]
                ]

                guistrut 1.5
                guilist [// H
                    guilist [// V
                        guistrut 9 1
                        guialign 1 [guitext "clip: " 0]; guistrut 0.25
                        guialign 1 [guitext "height: " 0]
                    ]

                    guilist [// V
                        guistrut 64 1

                        MAP_FogDomeClip   (*f $fogdomeclip   100)
                        MAP_FogDomeHeight (*f $fogdomeheight 100)

                        guislider MAP_FogDomeClip      1 100 [fogdomeclip   (*f $MAP_FogDomeClip   0.01)]; guistrut 0.25
                        guislider MAP_FogDomeHeight -100 100 [fogdomeheight (*f $MAP_FogDomeHeight 0.01)]
                    ]
                ]

                guistrut 1.5
                guifreerow  9 -2 [
                         ] 18 -2 [ guicheckbox "over clouds"     fogdomeclouds
                         ] 18 -2 [ guicheckbox "squared falloff" fogdomesquare
                         ] 18 -2 [ guicheckbox "capped"          fogdomecap
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
]] "^f~skybox" [
    MAP_SkyboxCount     (listlen $SkyboxList)
    MAP_CloudLayerCount (listlen $CloudlayerList)
    MAP_CloudboxCount   (listlen $CloudboxList)
    MAP_ComboList = (concat $CloudboxList $SkyboxList)
]
