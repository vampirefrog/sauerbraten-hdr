//##############################################################################################################################################################
//  vColor Editor:
//##############################################################################################################################################################
nodebug [
    defvar  VC_Red -1 100000  100000
    defvar  VC_Grn -1 100000  100000
    defvar  VC_Blu -1 100000  100000

    defvar  VC_Hue -1      0  360000
    defvar  VC_Sat -1      0  100000
    defvar  VC_Vib -1 100000  100000

    defsvar VC_RGB "1.0 1.0 1.0"
    defsvar VC_HSV "0.0 0.0 1.0"

    defvar  VC_AutoSet 0 0 1 [if (&& $VC_AutoSet (ingamemp)) [VC_AutoSet 0]]
]

newgui "vcolor" [
    guiposition 0 1
    if (|| (! $editing) (! (ingame))) [cleargui 1][
        guistayopen [
            //==================================================================================================================================================
            guilist [// H
                guispring
                guilist [// V
                    guistrut 28 1
                    guialign 0 [// H
                        guitext "^f2vcolor: " 0
                        if (! $getseltex) [
                            //  Nothing or subdivided-cube selected:
                            guitext "^f3~^f7, ^f0~^f7, ^f1~" 0
                            guistrut 4
                            guibutton "^f4GET" [sleep 1]
                        ][
                            guitext (concatword "^f3" (at (getvcolor $getseltex) 0) "  ^f0" (at (getvcolor $getseltex) 1) "  ^f1" (at (getvcolor $getseltex) 2)) 0
                            guistrut 4
                            guibutton "^f2GET" [VC__Get]
                        ]
                    ]
                ]

                guispring
                guibutton "RESET" [VC__Reset; VC__Set]
                guispring

                guilist [// V
                    guistrut 28 1
                    guialign 0 [// H
                        guibutton "^f8SET" [VC__Set 1]
                        guistrut 2.5
                        if (= (ingamemp) 0) [
                            //guicheckbox (concatword (? $VC_AutoSet (? (mod (div $getmillis 500) 2) "^f1" "^f8") "^f7") "AutoSet") VC_AutoSet 1 0
                            guicheckbox "AutoSet" VC_AutoSet
                        ]
                    ]
                ]
                guispring
            ]

            //==================================================================================================================================================
            guialign 0 [// H
                guilist [// V
                    guistrut 2.5 1
                    guistrut 0.45; guialign 1 [guitext "^f3R " 0]
                    guistrut 0.5 ; guialign 1 [guitext "^f0G " 0]
                    guistrut 0.5 ; guialign 1 [guitext "^f1B " 0]
                ]
                guilist [// V
                    guistrut 64 1
                    guistrut 0.5; guislider VC_Red 0 100000 [VC__UpdateHSV; VC__Set]
                    guistrut 0.5; guislider VC_Grn 0 100000 [VC__UpdateHSV; VC__Set]
                    guistrut 0.5; guislider VC_Blu 0 100000 [VC__UpdateHSV; VC__Set]
                ]
                guilist [// V
                    guistrut 4 1
                    guistrut 0.45
                    cond [< $VC_Hue  25000][TextColor = 3
                    ]    [< $VC_Hue  45000][TextColor = 6
                    ]    [< $VC_Hue  75000][TextColor = 2
                    ]    [< $VC_Hue 150000][TextColor = 0
                    ]    [< $VC_Hue 200000][TextColor = 8
                    ]    [< $VC_Hue 270000][TextColor = 1
                    ]    [< $VC_Hue 330000][TextColor = 5
                    ]                      [TextColor = 3]
                    guialign 1 [guitext (concatword "^f" $TextColor "H ") 0] // H

                    guistrut 0.5
                    TextColor = (? (< $VC_Sat 66666) (? (< $VC_Sat 33333) 4 9) 7)
                    guialign 1 [guitext (concatword "^f" $TextColor "S ") 0] // H

                    guistrut 0.5
                    TextColor = (? (< $VC_Vib 66666) (? (< $VC_Vib 33333) 4 9) 7)
                    guialign 1 [guitext (concatword "^f" $TextColor "V ") 0] // H
                ]
                guilist [// V
                    guistrut 64 1
                    guistrut 0.5
                    guislider VC_Hue 0 360000 [VC__UpdateRGB; VC__Set]
                    guistrut 0.5
                    guislider VC_Sat 0 100000 [VC__UpdateRGB; VC__Set]
                    guistrut 0.5
                    guislider VC_Vib 0 100000 [VC__UpdateRGB; VC__Set]
                ]
            ]
        ]
    ]
] 0


//##############################################################################################################################################################
//##############################################################################################################################################################
VC__Get = [
    VC_Red = (*f (at (getvcolor $getseltex) 0) 100000)
    VC_Grn = (*f (at (getvcolor $getseltex) 1) 100000)
    VC_Blu = (*f (at (getvcolor $getseltex) 2) 100000)
    VC__UpdateHSV
]
VC__Set = [
    if (|| (> $numargs 0) [&& $VC_AutoSet (= (ingamemp) 0)]) [
        vcolor (*f $VC_Red 0.00001) (*f $VC_Grn 0.00001) (*f $VC_Blu 0.00001)
    ]
]
VC__Reset = [
    VC_Red 100000
    VC_Grn 100000
    VC_Blu 100000
    VC_Hue      0
    VC_Sat      0
    VC_Vib 100000
    VC_RGB "1.0 1.0 1.0"
    VC_HSV "0.0 0.0 1.0"
]


//##############################################################################################################################################################
//##############################################################################################################################################################
VC__UpdateHSV = [
    VC_HSV = (color_rgbtohsv (concat (*f $VC_Red 0.00001) (*f $VC_Grn 0.00001) (*f $VC_Blu 0.00001)))
    VC_Hue = (*f (at $VC_HSV 0) 100000)
    VC_Sat = (*f (at $VC_HSV 1) 100000)
    VC_Vib = (*f (at $VC_HSV 2) 100000)
]
VC__UpdateRGB = [
    VC_RGB = (color_hsvtorgb (concat (*f $VC_Hue 0.00001) (*f $VC_Sat 0.00001) (*f $VC_Vib 0.00001)))
    VC_Red = (*f (at $VC_RGB 0) 100000)
    VC_Grn = (*f (at $VC_RGB 1) 100000)
    VC_Blu = (*f (at $VC_RGB 2) 100000)
]
