//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvarp mastermenu_confirmkick   0 1 1
    defvarp mastermenu_showbots      0 0 1
    defvarp mastermenu_showself      0 1 1
    defvarp mastermenu_splitplyrspec 0 1 1

    defsvar SM_ServDesc ""
    defsvar SM_ServAddr ""

    defvar  SM_ClntCount  0 0 256
    defvar  SM_SpecCount  0 0 256
    defvar  SM_PlyrCount  0 0 256
    defvar  SM_BotCount   0 0 256

    defvar  SM_MasterMode 0 0 3

    defvar  SM_ClntIsMstr 0 0 1
    defvar  SM_ClntIsSpec 0 0 1

    defvar  SM_KickMe -1 -1 256

    SM_ClntList = ""
    SM_AdmnList = ""
    SM_AuthList = ""
    SM_MstrList = ""
    SM_BotsList = ""
    SM_PlyrList = ""
    SM_SpecList = ""
]

newgui "master" [
    guiscale 0.75
    guikeeptab 1
    guistayopen [guinoautotab [

    guilist [// H
        guistrut (max $SM_SpecCount (max $SM_PlyrCount $SM_BotCount)) 1
        guilist [// V
            SM__Update

            guialign 0 [guititle $SM_ServDesc  ]
            guialign 0 [guitext  $SM_ServAddr 0]

            guibar //-------------------------------------------------------------------------------------------------------------------------------------------

            guialign 0 [// H
                SM_MasterMode $getmastermode
                guitext (concatword "^f7mastermode ^f2" $getmastermode) 0
                guistrut 3
                guiradio "open  "   SM_MasterMode 0 [mastermode 0]
                guiradio "veto  "   SM_MasterMode 1 [mastermode 1]
                guiradio "locked  " SM_MasterMode 2 [mastermode 2]
                guiradio "private"  SM_MasterMode 3 [mastermode 3]
            ]

            guistrut 1.1
            guialign 0 [// H
                if (ismaster $getclientnum) [
                    guibutton "clear bans" clearbans
                ][
                    guistrut 1 1
                ]
            ]

            guistrut 1
            guilist [//H
                guilist [//V
                    guistrut 27 1
                    if (ismaster $getclientnum) [
                        guialign 0 [guibutton "^f0relinquish master" [setmaster 0]]
                    ][
                        if (|| [listlen $SM_AdmnList] [listlen $SM_AuthList] [listlen $SM_MstrList]) [
                            guialign 0 [guibutton "^f4claim master" [setmaster 1]]
                        ][
                            guialign 0 [guibutton "^f0claim master" [setmaster 1]]
                        ]
                    ]
                ]
                guilist [// V
                    guistrut 27 1
                    if (hasauthkey) [
                        if (isauth $getclientnum) [
                            guialign 0 [guibutton "^f5relinquish auth" [setmaster 0]]
                        ][
                            if (|| [listlen $SM_AdmnList] [listlen $SM_AuthList] [listlen $SM_MstrList]) [
                                guialign 0 [guibutton "^f4claim auth" [auth]]
                            ][
                                guialign 0 [guibutton "^f5claim auth" [auth]]
                            ]
                        ]
                    ]
                ]
            ]

            guibar //-------------------------------------------------------------------------------------------------------------------------------------------

            guialign 0 [// H
                guilist [// V
                    guistrut 18 1
                    guititle "master"
                    looplist iClnt $SM_MstrList [
                        guialign 0 [guitext (concatword "^f0" (getclientname $iClnt) ) 0]
                    ]
                ]
                guilist [// V
                    guistrut 18 1
                    guititle "auth"
                    looplist iClnt $SM_AuthList [
                        guialign 0 [guitext (concatword "^f5" (getclientname $iClnt) ) 0]
                    ]
                ]
                guilist [// V
                    guistrut 18 1
                    guititle "admin"
                    looplist iClnt $SM_AdmnList [
                        guialign 0 [guitext (concatword "^f6" (getclientname $iClnt) ) 0]
                    ]
                ]
            ]
        ]
    ]

    guitab "settings"
    if (= $guitabnum 2) [
        guistrut 54 1
        guistrut 0.5
        guicheckbox "show self" mastermenu_showself
        guistrut 1
        guicheckbox "show spectators on separate tab" mastermenu_splitplyrspec
        guicheckbox "show bots"                       mastermenu_showbots
        guistrut 1
        guicheckbox "confirm kick" mastermenu_confirmkick
    ]

    guitab (concatword "players ^f7[^f~" $SM_PlyrCount "^f7]")
    if (= $guitabnum 3) [
        SM__ListClients $SM_PlyrList (isspectator $getclientnum)
    ]

    if $mastermenu_splitplyrspec [
        guitab (concatword "spectators ^f7[^f~" $SM_SpecCount "^f7]")
        if (= $guitabnum 4) [
            if (<= (listlen $SM_SpecList) 0) [
                guialign 0 [guitext "^f4~" 0]
            ][
                SM__ListClients $SM_SpecList 0
            ]
        ]
    ]

    if $mastermenu_showbots [
        guitab (concatword "bots ^f7[^f~" $SM_BotCount "^f7]")
        if (= $guitabnum (? $mastermenu_splitplyrspec 5 4)) [
            if (<= (listlen $SM_BotsList) 0) [
                guialign 0 [guitext "^f4~" 0]
            ][
                SM__ListClients $SM_BotsList (isspectator $getclientnum)
            ]
        ]
    ]
]]] "server master" [SM__Update]


//##############################################################################################################################################################
//##############################################################################################################################################################
//    arg1: [LIST]  List of client numbers.
//    arg2: BOOL    Allow follow this client.
SM__ListClients = [


    //looplist iClnt $arg1 [
    //    guilist [// H
    //        wtf ClientRow ???
    //    ]
    //]


    guilist [// H
        //  CLIENT NUMBER:
        guilist [// V
            if $arg2 [
                looplist iClnt $arg1 [
                    guialign 1 [ guibutton (concatword "^f7[^f2" $iClnt "^f7]") [follow @iClnt] 0 ]
                ]
            ][
                looplist iClnt $arg1 [
                    guialign 1 [ guitext (concatword "^f7[^f2" $iClnt "^f7]") 0 ]
                ]
            ]
        ]

        //  NAME:
        guistrut 1
        guilist [// V
            if $arg2 [
                looplist iClnt $arg1 [
                    guibutton (concatword (? (isadmin $iClnt) "^f6" (? (isauth $iClnt) "^f5" (? (ismaster $iClnt) "^f0"))) (getclientname $iClnt)) [follow @iClnt] (getclienticon $iClnt)
                ]
            ][
                looplist iClnt $arg1 [
                    guitext (concatword (? (isadmin $iClnt) "^f6" (? (isauth $iClnt) "^f5" (? (ismaster $iClnt) "^f0"))) (getclientname $iClnt)) (getclienticon $iClnt)
                ]
            ]
        ]

        if (ismaster $getclientnum) [
            guispring
            //  BTN -- SWITCH TEAM:
            if (m_teammode $getmode) [
                guistrut 2
                guilist [// V
                    guistrut 9.09 1
                    if (&& (isspectator (at $arg1 0)) $mastermenu_splitplyrspec) [
                        looplist iClnt $arg1 [
                            guialign 0 [guitext "^f4~" 0]
                        ]
                    ][
                        looplist iClnt $arg1 [
                            guibutton (concatword (? (=s (getclientteam $getclientnum)(getclientteam $iClnt)) "^f1" "^f3") "switchteam") [setteam @iClnt @(? (=s (getclientteam $iClnt) "good") "evil" "good")] 0
                        ]
                    ]
                ]
            ]

            //  BTN -- SPECTATOR:
            guistrut 2
            guilist [// V
                guistrut 5.9 1
                if (isai (at $arg1 0)) [
                    loop i $SM_BotCount [
                        guialign 0 [guitext "^f4~" 0]
                    ]
                ][
                    looplist iClnt $arg1 [
                        SM_ClntIsSpec (isspectator $iClnt)
                        guicheckbox (concatword (? $SM_ClntIsSpec "^f8" "^f4") "spec") SM_ClntIsSpec 1 0 [spectator @(= (isspectator $iClnt) 0) @iClnt]
                    ]
                ]
            ]

            //  BTN -- MASTER|AUTH|ADMIN:
            guistrut 2
            guilist [// V
                guistrut 7.29 1
                if (isai (at $arg1 0)) [
                    loop i $SM_BotCount [
                        guialign 0 [guitext "^f4~" 0]
                    ]
                ][
                    looplist iClnt $arg1 [
                        SM_ClntIsMstr (ismaster $iClnt)
                        guicheckbox (? (isadmin $iClnt) "^f6admin" (? (isauth $iClnt) "^f5auth" (? (ismaster $iClnt) "^f0master" "^f4master"))) SM_ClntIsMstr 1 0 [setmaster @(= (ismaster $iClnt) 0) @iClnt]
                    ]
                ]
            ]

            //  BTN -- KICK:
            guistrut 2
            guilist [// V
                guistrut 3.1 1
                if (isai (at $arg1 0)) [
                    loop i $SM_BotCount [ guialign 0 [guitext "^f4~" 0] ]
                ][
                    if $mastermenu_confirmkick [
                        looplist iClnt $arg1 [ guibutton "^f2kick" [SM_KickMe @iClnt; showgui "master_confirmkick"] 0 ]
                    ][
                        looplist iClnt $arg1 [ guibutton "^f2kick" [kick @iClnt] 0 ]
                    ]
                ]
            ]
        ]
    ]
]

//==============================================================================================================================================================
newgui "master_confirmkick" [
    guistrut 28 1
    guialign 0 [guitext "^f7kick, are you sure?" 0 ]
    guialign 0 [guitext (concatword "^f6[" $SM_KickMe "] " (getclientname $SM_KickMe)) 0 ]
    guistrut 1
    guialign 0 [
        guibutton "^f2kick" [kick $SM_KickMe; SM_KickMe -1; cleargui 1]
        guistrut 5
        guibutton "^f7cancel" [cleargui 1]
    ]
] 0


//##############################################################################################################################################################
//##############################################################################################################################################################
SM__Update = [
    if $getservdesc [
        SM_ServDesc = (concatword "^f7" $getservdesc)
        SM_ServAddr = (concatword $connectedip ":" $connectedport)
    ][
        if $connectedip [
            SM_ServDesc = "^f4~"
            SM_ServAddr = (concatword $connectedip ":" $connectedport)
        ][
            SM_ServDesc = "^f4Sauerbraten"
            SM_ServAddr = "^f4~"
        ]
    ]

    SM_ClntList  = (listclients 1 0)
    SM_ClntCount = (listlen $SM_ClntList)

    SM_AdmnList = (listfilter i $SM_ClntList [                                     isadmin $i  ])
    SM_AuthList = (listfilter i $SM_ClntList [&&                  (isauth $i)  (! (isadmin $i))])
    SM_MstrList = (listfilter i $SM_ClntList [&& (ismaster $i) (! (isauth $i)) (! (isadmin $i))])

    SM_ClntList = (listclients $mastermenu_showself $mastermenu_showbots)

    if $mastermenu_splitplyrspec [
        SM_SpecList = (listfilter i $SM_ClntList [isspectator $i])
        SM_PlyrList = (listfilter i $SM_ClntList [&& (! (isspectator $i)) (! (isai $i))])
    ][
        SM_SpecList = ""
        SM_PlyrList = (listfilter i $SM_ClntList [! (isai $i)])
    ]

    if $mastermenu_showbots [
        SM_BotsList = (listfilter i $SM_ClntList [isai $i])
    ][
        SM_BotsList = ""
    ]

    SM_SpecCount = (listlen $SM_SpecList)
    SM_PlyrCount = (listlen $SM_PlyrList)
    SM_BotCount  = (listlen $SM_BotsList)
]
