nodebug [
    defsvar DBG_AliasName ""
    defvar  DBG_W 0 46 64
]

newgui "debug" [
    guiscale 0.5
    guilist [// H
        guilist [// V
            guititle "FileIO"
            guifreerow 15 -2 [guicheckbox "dbg^f2dds"        dbgdds         ] $DBG_W -2 [guitext "..." 0                                         ]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2gz"         dbggz          ] $DBG_W -2 [guitext "..." 0                                         ]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2movie"      dbgmovie       ] $DBG_W -2 [guitext "..." 0                                         ]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2vars"       dbgvars        ] $DBG_W -2 [guitext "Print MapVars processed while loading a map." 0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2zip"        dbgzip         ] $DBG_W -2 [guitext "..." 0                                         ]; guistrut 0.5

            guibar
            guititle "Rendering"
            guifreerow 15 -2 [guicheckbox "dbg^f2blob"       dbgblob        ] $DBG_W -2 [guitext "Blob-Shadows..."                                       0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2dec"        dbgdec         ] $DBG_W -2 [guitext "Decals..."                                             0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2exts"       dbgexts        ] $DBG_W -2 [guitext "Print info while initializing OpenGL Extensions."      0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2grass"      dbggrass       ] $DBG_W -2 [guitext "Grass..."                                              0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2pcull"      dbgpcull       ] $DBG_W -2 [guitext "Particle cull..."                                      0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2pseed"      dbgpseed       ] $DBG_W -2 [guitext "Particle seed..."                                      0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "dbg^f2shader ^f9(0)" dbgshader 0    ] $DBG_W -2 [guitext "Off"                                                   0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "dbg^f2shader ^f9(1)" dbgshader 1    ] $DBG_W -2 [guitext "Print GLSL-info upon CompileShader failure."           0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "dbg^f2shader ^f9(2)" dbgshader 2    ] $DBG_W -2 [guitext "Print GLSL-info upon CompileShader failure & success." 0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "dbg^f2ubo"        dbgubo         ] $DBG_W -2 [guitext "OpenGL UniformBufferObject..."                         0]; guistrut 0.25

            guifreerow 15 -2 [guicheckbox "debug^f2depthfx"   debugdepthfx  ] $DBG_W -2 [guitext "Depth effects..."                          0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "debug^f2glare"     debugglare    ] $DBG_W -2 [guitext "Show glare buffer; glare must be enabled." 0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "debug^f2particles" debugparticles] $DBG_W -2 [guitext "Not particles entities..."                 0]; guistrut 0.25
            guifreerow 15 -2 [guicheckbox "debug^f2sm"        debugsm       ] $DBG_W -2 [guitext "ShadowMapping..."                          0]; guistrut 0.5
        ]

        guibar

        guilist [// V
            guititle "Bot AI"
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(0)" aidebug 0] $DBG_W -2 [guitext "Off"                                                                      0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(1)" aidebug 1] $DBG_W -2 [guitext "Show messages:  ^f8addbot^f~, ^f8delbot"                                  0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(2)" aidebug 2] $DBG_W -2 [guitext "Show text:  ^f8interest"                                                  0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(3)" aidebug 3] $DBG_W -2 [guitext "Show text:  ^f8weapon^f~, ^f8wait^f~, ^f8pursue^f~, ^f8node^f~, ^f8route" 0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(4)" aidebug 4] $DBG_W -2 [guitext "Show waypoints:  ^f8route^f~, ^f8danger"                                  0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(5)" aidebug 5] $DBG_W -2 [guitext "Show waypoints:  ^f8near"                                                 0]; guistrut 0.25
            guifreerow 15 -2 [guiradio "^f2ai^f~debug ^f9(6)" aidebug 6] $DBG_W -2 [guitext "Show all waypoints"                                                       0]; guistrut 0.5

            guibar
            guititle "Miscellaneous"
            guifreerow 15 -2 [ guicheckbox "dbg^f2sound"  dbgsound ] $DBG_W -2 [ guitext "..." 0 ]; guistrut 0.25
            guifreerow 15 -2 [ guicheckbox "dbg^f2spawns" dbgspawns] $DBG_W -2 [ guitext "..." 0 ]; guistrut 0.5

            //guibar
            //guititle "Alias"
            //guifreerow 15 -2 [ guitext "dbg^f2alias" ] $DBG_W -2 [ guitextbox $DBG_AliasName; guibutton "execute" [dbgalias $$DBG_AliasName] ]; guistrut 0.5
        ]
    ]
]

//##############################################################################################################################################################
//##############################################################################################################################################################
newgui "postfx" [
    guiscale 0.75
    guistayopen [
        guibutton "** clear postfx **"      [clearpostfx]
        guistrut 0.5
        guibutton "bloom (subtle: 30%)"     [bloom 0.3]
        guibutton "bloom (bright: 55%)"     [bloom 0.55]
        guibutton "bloom (intense: 80%)"    [bloom 0.8]
        guistrut 0.5
        guibutton "rotoscope"               [rotoscope 1]
        guibutton "rotoscope + blur3"       [rotoscope 1 1]
        guibutton "rotoscope + blur5"       [rotoscope 1 2]
        guistrut 0.5
        guibutton "sobel"                   [setpostfx sobel]
        guistrut 0.5
        guibutton "invert"                  [setpostfx invert]
        guibutton "gbr"                     [setpostfx gbr]
        guibutton "bw"                      [setpostfx bw]
        guistrut 0.5
        guibutton "blur3"                   [setpostfx hblur3; addpostfx vblur3]
        guibutton "blur5"                   [setpostfx hblur5; addpostfx vblur5]
    ]
]

//##############################################################################################################################################################
//##############################################################################################################################################################
newgui "seltexinfo" [
    guieditingcheck
    guiscale 0.6

    local TexName

    guitext (concatword "Slot: " (getseltex))

    guilist [
        loop iSubSlot 5 [
            TexName = (gettexname (getseltex) $iSubSlot)
            TexName = (substr $TexName (+ (strstr $TexName ">") 1)) // chop off any leading commands
            guiimage (concatword "packages/" $TexName) "" 1 1
        ]
    ]

    loop iSubSlot 5 [
        TexName = (gettexname (getseltex) $iSubSlot)
        if (=s $TexName "") [] [guitext $TexName]
    ]
] "texture info"
