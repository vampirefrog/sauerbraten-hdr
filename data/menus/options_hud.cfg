nodebug [
    defvar AH_SwayStep    1 0 100 //   1.0, 35.0, 100.0
    defvar AH_SwaySide    0 0 100 //   0.0, 0.04,   1.0
    defvar AH_SwayUp   -100 0 100 //  -1.0, 0.05,   1.0

    defvar AH_ThirdPersonDistance    0 0 500 //   0, 20, 50
    defvar AH_ThirdPersonSide     -250 0 250 // -25,  0, 25
    defvar AH_ThirdPersonUp       -250 0 250 // -25,  0, 25
]

GUI_Hud_Misc2 = [
    guititle "hudgun"
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 14 1
            guistrut 4.5
            guialign 1 [guitext "step: "       0]; guistrut 0.5
            guialign 1 [guitext "horizontal: " 0]; guistrut 0.5
            guialign 1 [guitext "vertical: "   0]
        ]
        guilist [// V
            guistrut 56 1
            guicheckbox "show hudgun"  hudgun
            guistrut 0.5
            guilist [
                guicheckbox (concatword (? $hudgun "" "^f4") "muzzleflash") muzzleflash
                guistrut 2
                guicheckbox (concatword (? $hudgun "" "^f4") "muzzlelight") muzzlelight
            ]
            guistrut 0.5
            guicheckbox (concatword (? $hudgun "" "^f4") "sway") hudgunsway
            guistrut 0.5
            AH_SwayStep $swaystep
            AH_SwaySide (*f $swayside 100)
            AH_SwayUp   (*f $swayup   100)
            guislider AH_SwayStep  1 100 [swaystep $AH_SwayStep          ]; guistrut 0.5
            guislider AH_SwaySide  0 100 [swayside (*f $AH_SwaySide 0.01)]; guistrut 0.5
            guislider AH_SwayUp -100 100 [swayup   (*f $AH_SwayUp   0.01)]
        ]
    ]

    guistrut 0.5
    guibar
    guititle "zoom"
    guistrut 0.25
    guifreerow 14  1 [ guitext "in time: "  0
             ] 51 -2 [ guislider zoominvel  0 500 [zoominvel  (round $zoominvel  5)]
             ]  1 -2 [ guitext " ^f9(ms)" 0
    ]
    guistrut 0.5
    guifreerow 14  1 [ guitext "out time: " 0
             ] 51 -2 [ guislider zoomoutvel 0 500 [zoomoutvel (round $zoomoutvel 5)]
             ]  1 -2 [ guitext " ^f9(ms)" 0
    ]

    guistrut 0.5
    guibar
    guititle "thirdperson"
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 14 1
            guistrut 1.5
            guialign 1 [guitext "distance: "   0]; guistrut 0.5
            guialign 1 [guitext "horizontal: " 0]; guistrut 0.5
            guialign 1 [guitext "vertical: "   0]
        ]
        guilist [// V
            guistrut 56 1
            guicheckbox "thirdperson^t^f2[9]" thirdperson
            guistrut 0.5
            AH_ThirdPersonDistance (*f $thirdpersondistance 10)
            AH_ThirdPersonSide (*f $thirdpersonside 10)
            AH_ThirdPersonUp (*f $thirdpersonup 10)
            guislider AH_ThirdPersonDistance 0 500 [thirdpersondistance (*f $AH_ThirdPersonDistance 0.1)]; guistrut 0.5
            guislider AH_ThirdPersonSide  -250 250 [thirdpersonside     (*f $AH_ThirdPersonSide     0.1)]; guistrut 0.5
            guislider AH_ThirdPersonUp    -250 250 [thirdpersonup       (*f $AH_ThirdPersonUp       0.1)]
        ]
    ]
]


