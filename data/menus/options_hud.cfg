nodebug [
    defvar AH_AmmoBarScale      0 0 1000 //  0.1  0.5    1.0
    defvar AH_AmmoBarCountScale 0 0 2000 //  0.5  1.5    2.0
    defvar AH_AmmoBarX          0 0 1000 //  0.0  0.025  1.0
    defvar AH_AmmoBarY          0 0 1000 //  0.0  0.5    1.0
]

GUI_Hud_AmmoBar = [
    guinoautotab [guistayopen [
        guialign 0 [// H
            guicheckbox "show ammobar" ammobar
            guistrut 6
            guibutton "RESET" [AH_AmmoBar_Reset]
            guistrut 3
            guibutton "^f9RESET old" [AH_AmmoBar_ResetOld]
        ]
        guibar
        guifreerow 14  1 [ guitext "align: " 0
                 ]  5 -2 [ guiradio "-1" ammobaralign -1
                 ]  5 -2 [ guiradio "0"  ammobaralign  0
                 ]  5 -2 [ guiradio "1"  ammobaralign  1
        ]
        guistrut 0.5
        guilist [// H
            guistrut 14
            guilist [// V
                guilist [// H
                    guicheckbox "horizontal" ammobarhorizontal
                    guistrut 4
                    guicheckbox "flip text" ammobarflip
                    guistrut 4
                    guicheckbox "hide empty" ammobarhideempty
                ]
            ]
        ]

        guistrut 1
        AH_AmmoBarX (*f $ammobarx 1000)
        guifreerow 14  1 [ guitext "posX: " 0
                 ] 56 -2 [ guislider AH_AmmoBarX 0 1000 [ammobarx (*f $AH_AmmoBarX 0.001)]
        ]
        guistrut 0.5
        AH_AmmoBarY (*f $ammobary 1000)
        guifreerow 14  1 [ guitext "posY: " 0
                 ] 56 -2 [ guislider AH_AmmoBarY 0 1000 [ammobary (*f $AH_AmmoBarY 0.001)]
        ]

        guistrut 1
        guifreerow 14  1 [ guitext "separation: " 0
                 ] 56 -2 [ guislider ammobarsep
        ]
        guistrut 0.5
        guifreerow 14  1 [ guitext "text separation: " 0
                 ] 56 -2 [ guislider ammobarcountsep
        ]

        guistrut 1
        AH_AmmoBarScale (*f $ammobarscale 100)
        guifreerow 14  1 [ guitext "scale: " 0
                 ] 56 -2 [ guislider AH_AmmoBarScale 10 100 [ammobarscale (*f $AH_AmmoBarScale 0.01)]
        ]
        guistrut 0.5
        AH_AmmoBarCountScale (*f $ammobarcountscale 100)
        guifreerow 14  1 [ guitext "text scale: " 0
                 ] 56 -2 [ guislider AH_AmmoBarCountScale 50 200 [ammobarcountscale (*f $AH_AmmoBarCountScale 0.01)]
        ]
    ]]
]

AH_AmmoBar_Reset = [
    ammobaralign      0
    ammobarcountscale 1.5
    ammobarcountsep   20
    ammobarflip       1
    ammobarhideempty  0
    ammobarhorizontal 1
    ammobarscale      0.55
    ammobarsep        100
    ammobarx          0.5
    ammobary          0.75
]
AH_AmmoBar_ResetOld = [
    ammobaralign      0
    ammobarcountscale 1.5
    ammobarcountsep   20
    ammobarflip       0
    ammobarhideempty  1
    ammobarhorizontal 0
    ammobarscale      0.5
    ammobarsep        20
    ammobarx          0.025
    ammobary          0.5
]


