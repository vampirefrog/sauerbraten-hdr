nodebug [
    defvar GUI_Hud_Wdth 1 70 0
    defvar GUI_Hud_Hght 1 24 0
]

newgui "hud" [
    guiscale 0.65
    guikeeptab 1
    guinoautotab [guistayopen [
        //  Save-the-frames 'guitabnum' hack:     H                               V
                            if (= $guitabnum 1) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_Misc     ]] ]
        guitab "misc2"    ; if (= $guitabnum 2) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_Misc2    ]] ]
        guitab "crosshair"; if (= $guitabnum 3) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_Crosshair; guistrut 0.5; guispring; guilist [guispring; guibutton "^f2/crosshairgui" [showgui "crosshair"]] ]] ]
        guitab "ammobar"  ; if (= $guitabnum 4) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_AmmoBar  ; guistrut 0.5; guispring; guilist [guispring; guibutton "^f2/ammobargui"   [showgui "ammobar"  ]] ]] ]
        guitab "gameclock"; if (= $guitabnum 5) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_GameClock; guistrut 0.5; guispring; guilist [guispring; guibutton "^f2/gameclockgui" [showgui "gameclock"]] ]] ]
        guitab "hudscore" ; if (= $guitabnum 6) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_HudScore ; guistrut 0.5; guispring; guilist [guispring; guibutton "^f2/hudscoregui"  [showgui "hudscore" ]] ]] ]
        guitab "editing"  ; if (= $guitabnum 7) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_Editing  ]] ]
        guitab "edithud"  ; if (= $guitabnum 8) [ guilist [guistrut $GUI_Hud_Hght 1; guilist [guistrut $GUI_Hud_Wdth 1; GUI_Hud_EditHud  ]] ]
    ]]
] "misc" [GenList_Crosshairs]

newgui "crosshair" [guiscale 0.9; GUI_Hud_Crosshair] "" [GenList_Crosshairs]
newgui "ammobar"   [guiscale 0.6; GUI_Hud_AmmoBar  ] ""
newgui "gameclock" [guiscale 0.6; GUI_Hud_GameClock] ""
newgui "hudscore"  [guiscale 0.6; GUI_Hud_HudScore ] ""


