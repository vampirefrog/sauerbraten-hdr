nodebug [
    defvar AH_GameClockX     0 0 1000 //  0.0  0.50  1.0
    defvar AH_GameClockY     0 0 1000 //  0.0  0.03  1.0
    defvar AH_GameClockScale 0 0 2000 //  0.5  0.75  2.0

    defvar AH_GameClockR 0 0 255
    defvar AH_GameClockG 0 0 255
    defvar AH_GameClockB 0 0 255

    defvar AH_GameClockLowR 0 0 255
    defvar AH_GameClockLowG 0 0 255
    defvar AH_GameClockLowB 0 0 255
]

GUI_Hud_GameClock = [
    guinoautotab [guistayopen [
        guialign 0 [// H
            guicheckbox "show gameclock" gameclock
            guistrut 6
            guibutton "RESET" [AH__GameClock_Reset]
        ]

        guibar
        guifreerow 14  1 [ guitext "align: " 0
                 ]  5 -2 [ guiradio "-1" gameclockalign -1
                 ]  5 -2 [ guiradio "0"  gameclockalign  0
                 ]  5 -2 [ guiradio "1"  gameclockalign  1
        ]

        guistrut 1
        AH_GameClockX (*f $gameclockx 1000)
        guifreerow 14  1 [ guitext "posX: " 0
                 ] 56 -2 [ guislider AH_GameClockX 0 1000 [gameclockx (*f $AH_GameClockX 0.001)]
        ]
        guistrut 0.5
        AH_GameClockY (*f $gameclocky 1000)
        guifreerow 14  1 [ guitext "posY: " 0
                 ] 56 -2 [ guislider AH_GameClockY 0 1000 [gameclocky (*f $AH_GameClockY 0.001)]
        ]

        guistrut 1
        AH_GameClockScale (*f $gameclockscale 100)
        guifreerow 14  1 [ guitext "scale: " 0
                 ] 56 -2 [ guislider AH_GameClockScale 50 200 [gameclockscale (*f $AH_GameClockScale 0.01)]
        ]
        guistrut 1
        guifreerow 14  1 [ guitext "opacity: " 0
                 ] 56 -2 [ guislider gameclockalpha
        ]

        guistrut 0.5
        guibar
        guilist [// H
            guilist [// V
                guistrut 14 1
                guialign 1 [guitext "color: " 0]
                guistrut 1.5
                guialign 1 [guicolor $gameclockcolour; guistrut 1]
            ]
            guilist [// V
                guistrut 56 1
                AH_GameClockR (& (>> $gameclockcolour 16) 0xFF)
                AH_GameClockG (& (>> $gameclockcolour  8) 0xFF)
                AH_GameClockB (&     $gameclockcolour     0xFF)
                guislider AH_GameClockR 0 255 [gameclockcolour $AH_GameClockR $AH_GameClockG $AH_GameClockB]; guistrut 0.25
                guislider AH_GameClockG 0 255 [gameclockcolour $AH_GameClockR $AH_GameClockG $AH_GameClockB]; guistrut 0.25
                guislider AH_GameClockB 0 255 [gameclockcolour $AH_GameClockR $AH_GameClockG $AH_GameClockB]
            ]
        ]

        guistrut 1
        guilist [// H
            guilist [// V
                guistrut 14 1
                guialign 1 [guitext "low color: " 0]
                guistrut 1.5
                guialign 1 [guicolor $gameclocklowcolour; guistrut 1]
            ]
            guilist [// V
                guistrut 56 1
                AH_GameClockLowR (& (>> $gameclocklowcolour 16) 0xFF)
                AH_GameClockLowG (& (>> $gameclocklowcolour  8) 0xFF)
                AH_GameClockLowB (&     $gameclocklowcolour     0xFF)
                guislider AH_GameClockLowR 0 255 [gameclocklowcolour $AH_GameClockLowR $AH_GameClockLowG $AH_GameClockLowB]; guistrut 0.25
                guislider AH_GameClockLowG 0 255 [gameclocklowcolour $AH_GameClockLowR $AH_GameClockLowG $AH_GameClockLowB]; guistrut 0.25
                guislider AH_GameClockLowB 0 255 [gameclocklowcolour $AH_GameClockLowR $AH_GameClockLowG $AH_GameClockLowB]
            ]
        ]
    ]]
]

AH__GameClock_Reset = [
    gameclockalign     0
    gameclockalpha     255
    gameclockcolour    0xFFFFFF
    gameclocklowcolour 0xFFA050
    gameclockscale     1.0
    gameclockx         0.50
    gameclocky         0.03
]


