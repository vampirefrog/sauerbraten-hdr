GUI_Hud_Editing = [
    guititle "entities"
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 14 1
            guistrut 1.25
            guialign 1 [guitext "sparkly size: " 0]
        ]
        guilist [// V
            guistrut 56 1
            guicheckbox "show selected entity radius" showentradius
            guistrut 0.25
            guislider particlesize //  Size of entity sparklies in editmode.
            guistrut 0.25
            guicheckbox "show particles from particle entities in editmode" showparticles
        ]
    ]
    guistrut 0.5
    guibar
    guititle "blendbrush"
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 14 1
            guialign 1 [guitext "color: " 0]
            guistrut 1.5
            guialign 1 [guicolor $blendbrushcolor; guistrut 1]
        ]
        guilist [// V
            guistrut 56 1
            BlendBrushR (& (>> $blendbrushcolor 16) 0xFF)
            BlendBrushG (& (>> $blendbrushcolor  8) 0xFF)
            BlendBrushB (&     $blendbrushcolor     0xFF)
            guislider BlendBrushR 0 255 [blendbrushcolor $BlendBrushR $BlendBrushG $BlendBrushB]; guistrut 0.25
            guislider BlendBrushG 0 255 [blendbrushcolor $BlendBrushR $BlendBrushG $BlendBrushB]; guistrut 0.25
            guislider BlendBrushB 0 255 [blendbrushcolor $BlendBrushR $BlendBrushG $BlendBrushB]
        ]
    ]

    guibar
    guititle "skytexture"
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 14 1
            guistrut 1.75
            guialign 1 [guitext "outlinecolor: " 0]
            guistrut 1.5
            guialign 1 [guicolor $skyoutlinecolour; guistrut 1]
        ]
        guilist [// V
            guistrut 56 1
            guistrut 0.25
            guilist [// H
                guicheckbox "show outline" showskyoutline
                guistrut 10
                guicheckbox "show surface ^f9(with skytexture 0)" showsky
            ]
            guistrut 0.5
            SkyOutlineR (& (>> $skyoutlinecolour 16) 0xFF)
            SkyOutlineG (& (>> $skyoutlinecolour  8) 0xFF)
            SkyOutlineB (&     $skyoutlinecolour     0xFF)
            guislider SkyOutlineR 0 255 [skyoutlinecolour $SkyOutlineR $SkyOutlineG $SkyOutlineB]; guistrut 0.25
            guislider SkyOutlineG 0 255 [skyoutlinecolour $SkyOutlineR $SkyOutlineG $SkyOutlineB]; guistrut 0.25
            guislider SkyOutlineB 0 255 [skyoutlinecolour $SkyOutlineR $SkyOutlineG $SkyOutlineB]
        ]
    ]

    guibar
    guititle "waypoints"
    guistrut 0.25
    guilist [// H
        guilist [// V
            guistrut 14 1
            guistrut 1.75
            guialign 1 [guitext "view distance: " 0]
        ]
        guilist [// V
            guistrut 56 1
            guistrut 0.25
            guilist [// H
                guicheckbox "show  ^f2[-]" showwaypoints
                guistrut 2
                guicheckbox "drop  ^f2[=]" dropwaypoints
            ]
            guistrut 0.5
            guislider showwaypointsradius
        ]
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
GUI_Hud_EditHud = [
    guititle "show/hide"
    guistrut 0.25
    guifreerow 12 -2 [
             ] 16 -2 [ guicheckbox "player position"     edithud_showmyposition; guistrut 0.25
                       guicheckbox "player rotation"     edithud_showmyrotation
             ] 24 -2 [ guicheckbox "texture parameters"  edithud_showtexparams;  guistrut 0.25
                       guicheckbox (concatword (? $edithud_showtexparams "" "^f4") "texture layer parameters")  edithud_showtexlayerparams
             ]  1 -2 [ guicheckbox "selection info"      edithud_showselinfo;    guistrut 0.25
                       guicheckbox "texture history"     edithud_showtexhistory
    ]

    guistrut 1
    guilist [// H
        guistrut 12
        guilist [// V
            guicheckbox "show editstats while playing" showeditstats
        ]
    ]

    guistrut 0.5
    guibar
    guititle "variables"
    guistrut 0.5
    guifreerow 12  1 [ guitext "bools: " 0
             ]  1 -2 [ guifield edithud_listbools -55
    ]
    guistrut 0.25
    guifreerow 12  1 [ guitext "shy bools: " 0
             ]  1 -2 [ guifield edithud_listboolsshy -55
    ]
    guistrut 0.25
    guifreerow 12  1 [ guitext "notice bools: " 0
             ]  1 -2 [ guifield edithud_listboolsnotice -55
    ]
    guistrut 1
    guifreerow 12  1 [ guitext "vars: " 0
             ]  1 -2 [ guifield edithud_listvars -55
    ]
]
