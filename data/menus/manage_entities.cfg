//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvar  GUI_EntMan_WidthColumn   24 48  96
    defvar  GUI_EntMan_Width         -1 -1 384
    defvar  GUI_EntMan_Height        -1 -1  64

    defvarp EM_EntsPerColumn 16 32  64
    defvarp EM_ColumnsPerTab  1  2   4
    defvar  EM_EntsPerTab    -1 -1 512
    defvar  EM_NumOf_Columns -1 -1 625
    defvar  EM_NumOf_Tabs    -1 -1 625

    defvar  EM_NumOf_Ents         -1 -1 10000  //  MAXENTS = 10,000

    defvar  EM_NumOf_Barrel        0  0 10000
    defvar  EM_NumOf_Base          0  0 10000
    defvar  EM_NumOf_Box           0  0 10000
    defvar  EM_NumOf_Bullets       0  0 10000
    defvar  EM_NumOf_Carrot        0  0 10000
    defvar  EM_NumOf_Cartridges    0  0 10000
    defvar  EM_NumOf_Elevator      0  0 10000
    defvar  EM_NumOf_EnvMap        0  0 10000
    defvar  EM_NumOf_Flag          0  0 10000
    defvar  EM_NumOf_GreenArmour   0  0 10000
    defvar  EM_NumOf_Grenades      0  0 10000
    defvar  EM_NumOf_Health        0  0 10000
    defvar  EM_NumOf_HealthBoost   0  0 10000
    defvar  EM_NumOf_JumpPad       0  0 10000
    defvar  EM_NumOf_Light         0  0 10000
    defvar  EM_NumOf_MapModel      0  0 10000
    defvar  EM_NumOf_Monster       0  0 10000
    defvar  EM_NumOf_Particles     0  0 10000
    defvar  EM_NumOf_Platform      0  0 10000
    defvar  EM_NumOf_PlayerStart0  0  0 10000
    defvar  EM_NumOf_PlayerStart1  0  0 10000
    defvar  EM_NumOf_PlayerStart2  0  0 10000
    defvar  EM_NumOf_QuadDamage    0  0 10000
    defvar  EM_NumOf_RespawnPoint  0  0 10000
    defvar  EM_NumOf_RifleRounds   0  0 10000
    defvar  EM_NumOf_Rockets       0  0 10000
    defvar  EM_NumOf_Shells        0  0 10000
    defvar  EM_NumOf_Sound         0  0 10000
    defvar  EM_NumOf_SpotLight     0  0 10000
    defvar  EM_NumOf_Teledest      0  0 10000
    defvar  EM_NumOf_Teleport      0  0 10000
    defvar  EM_NumOf_YellowArmour  0  0 10000

    EM_EntList = ""  //  Alias strings can be much longer.
]

//newgui "entitymanager" [ if (|| (! $editing) (! (ingame))) [cleargui] [EM_Main]  ] "info" [GenList__Entities]
//EM_Main = [
newgui "entitymanager" [
    guieditingcheck
    guikeeptab 1
    if (!= $EM_NumOf_Ents $numoctaents) [GenList__Entities]
    guistayopen [
        //######################################################################################################################################################
        guilist [// H
            guistrut $GUI_EntMan_Height 1
            guilist [// V
                guistrut $GUI_EntMan_Width 1
                //  Is this the active Tab? If so, populate.
                if (= $guitabnum 1) [
                    guititle "Entity Manager"
                    guibar
                    guialign 0 [// H
                        guilist [// V
                            guititle "Options"
                            guistrut 1
                            guifreerow 16  1 [ guitext "^f7Entities PerColumn:" 0
                                     ]  5  1 [ guitext (concatword "^f7" $EM_EntsPerColumn " ") 0
                                     ]  1 -2 [ guibutton "" [EM_EntsPerColumn (+ $EM_EntsPerColumn -1); if (< $EM_EntsPerColumn 16) [EM_EntsPerColumn 16]; EM__Recalc] "val_dec"
                                     ]  1 -2 [ guibutton "" [EM_EntsPerColumn (+ $EM_EntsPerColumn  1); if (> $EM_EntsPerColumn 64) [EM_EntsPerColumn 64]; EM__Recalc] "val_inc"
                            ]
                            guifreerow 16  1 [ guitext "^f7Columns PerTab:" 0
                                     ]  5  1 [ guitext (concatword "^f7" $EM_ColumnsPerTab " ") 0
                                     ]  1 -2 [ guibutton "" [EM_ColumnsPerTab (+ $EM_ColumnsPerTab -1); if (< $EM_ColumnsPerTab 1) [EM_ColumnsPerTab 1]; EM__Recalc] "val_dec"
                                     ]  1 -2 [ guibutton "" [EM_ColumnsPerTab (+ $EM_ColumnsPerTab  1); if (> $EM_ColumnsPerTab 8) [EM_ColumnsPerTab 8]; EM__Recalc] "val_inc"
                            ]
                            guistrut 1
                            guifreerow 16  1 [ guitext "# of Columns:" 0
                                     ]  5  1 [ guitext (concatword $EM_NumOf_Columns " ") 0
                            ]
                            guifreerow 16  1 [ guitext "# of Tabs:" 0
                                     ]  5  1 [ guitext (concatword $EM_NumOf_Tabs " ") 0
                            ]
                            guistrut 1
                        ]

                        guibar
                        guilist [// V
                            guititle "Stats"
                            guistrut 1
                            guialign 0 [guitext (concatword " # of Entities: " $EM_NumOf_Ents) 0]
                            guibar
                            guilist [// H
                                guilist [// V
                                    guifreerow 15 1 [guitext "PlayerStart 0: "   0] 4 1 [guitext $EM_NumOf_PlayerStart0 0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "PlayerStart 1: "   0] 4 1 [guitext $EM_NumOf_PlayerStart1 0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "PlayerStart 2: "   0] 4 1 [guitext $EM_NumOf_PlayerStart2 0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Base: "            0] 4 1 [guitext $EM_NumOf_Base         0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Flag: "            0] 4 1 [guitext $EM_NumOf_Flag         0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "JumpPad: "         0] 4 1 [guitext $EM_NumOf_JumpPad      0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Teledest: "        0] 4 1 [guitext $EM_NumOf_Teledest     0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "Teleport: "        0] 4 1 [guitext $EM_NumOf_Teleport     0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guibar
                                    guifreerow 15 1 [guitext "MapModel: "        0] 4 1 [guitext $EM_NumOf_MapModel     0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Carrot: "          0] 4 1 [guitext $EM_NumOf_Carrot       0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guibar
                                    guifreerow 15 1 [guitext "EnvMap: "          0] 4 1 [guitext $EM_NumOf_EnvMap       0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Light: "           0] 4 1 [guitext $EM_NumOf_Light        0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "SpotLight: "       0] 4 1 [guitext $EM_NumOf_SpotLight    0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Particles: "       0] 4 1 [guitext $EM_NumOf_Particles    0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Sound: "           0] 4 1 [guitext $EM_NumOf_Sound        0] //3 -2 [guicheckbox "Blarg" BLARG]
                                ]
                                guibar
                                guilist [// V
                                    guifreerow 15 1 [guitext "^f3Shells: "       0] 4 1 [guitext $EM_NumOf_Shells       0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f0Bullets: "      0] 4 1 [guitext $EM_NumOf_Bullets      0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f6Rockets: "      0] 4 1 [guitext $EM_NumOf_Rockets      0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f1RifleRounds: "  0] 4 1 [guitext $EM_NumOf_RifleRounds  0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f8Grenades: "     0] 4 1 [guitext $EM_NumOf_Grenades     0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f9Cartridges: "   0] 4 1 [guitext $EM_NumOf_Cartridges   0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "^f8Health: "       0] 4 1 [guitext $EM_NumOf_Health       0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f1HealthBoost: "  0] 4 1 [guitext $EM_NumOf_HealthBoost  0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "^f0GreenArmour: "  0] 4 1 [guitext $EM_NumOf_GreenArmour  0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "^f2YellowArmour: " 0] 4 1 [guitext $EM_NumOf_YellowArmour 0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "^f3QuadDamage: "   0] 4 1 [guitext $EM_NumOf_QuadDamage   0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guibar
                                    guifreerow 15 1 [guitext "Monster: "         0] 4 1 [guitext $EM_NumOf_Monster      0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "RespawnPoint: "    0] 4 1 [guitext $EM_NumOf_RespawnPoint 0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Barrel: "          0] 4 1 [guitext $EM_NumOf_Barrel       0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "Box: "             0] 4 1 [guitext $EM_NumOf_Box          0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guistrut 0.5
                                    guifreerow 15 1 [guitext "Elevator: "        0] 4 1 [guitext $EM_NumOf_Elevator     0] //3 -2 [guicheckbox "Blarg" BLARG]
                                    guifreerow 15 1 [guitext "Platform: "        0] 4 1 [guitext $EM_NumOf_Platform     0] //3 -2 [guicheckbox "Blarg" BLARG]
                                ]
                            ]
                            guibar
                            guistrut 1
                        ]
                    ]
                ]
            ]
        ]

        //######################################################################################################################################################
        loop iTab $EM_NumOf_Tabs [
            guitab (* $iTab $EM_EntsPerTab)
            guilist [// H
                // Is this the active Tab? If so, populate.
                if (= $iTab (- $guitabnum 2)) [
                    iEnt = (* $iTab $EM_EntsPerTab)
                    iCol = 1
                    while [<= $iCol $EM_ColumnsPerTab] [
                        guilist [// V
                            iEND = (+ (* $iTab $EM_EntsPerTab) (- (* $iCol $EM_EntsPerColumn) 1))
                            while [<= $iEnt $iEND] [
                                if (>= $iEnt $EM_NumOf_Ents) [
                                    iEnt = (+ $iEND 1) // exitloop/break
                                ][
                                    This = (at $EM_EntList $iEnt)
                                    guilist [// H
                                        guilist [guistrut  7 1; guialign 1 [guibutton (concatword "^f7[^f2" (iEnt) "^f7]") (concat "cancelsel; entselect [= $entindex " $iEnt "]; gotosel") 0]]
                                        guilist [guistrut 11 1; guialign 1 [guibutton (concatword "^f7" (at $This 0)) (concat "cancelsel; entselect [= $entindex " $iEnt "]; gotosel") 0]]
                                        guilist [guistrut  6 1; guialign 1 [guitext   (concatword "^f2" (at $This 1)) 0]]
                                        guilist [guistrut  6 1; guialign 1 [guitext   (concatword "^f2" (at $This 2)) 0]]
                                        guilist [guistrut  6 1; guialign 1 [guitext   (concatword "^f2" (at $This 3)) 0]]
                                        guilist [guistrut  6 1; guialign 1 [guitext   (concatword "^f2" (at $This 4)) 0]]
                                        guilist [guistrut  6 1; guialign 1 [guitext   (concatword "^f2" (at $This 5)) 0]]
                                    ]
                                    iEnt = (+ $iEnt 1)
                                ]
                            ]
                            iCol = (+ $iCol 1)
                        ]
                    ]
                ]
            ]
        ]
        //######################################################################################################################################################
    ]
] "info" [GenList__Entities; EM__Recalc]


//##############################################################################################################################################################
//##############################################################################################################################################################
EM__Recalc = [
    EM_EntsPerTab    (* $EM_EntsPerColumn $EM_ColumnsPerTab)

    EM_NumOf_Ents    $numoctaents
    EM_NumOf_Columns (+ (ceil (divf $EM_NumOf_Ents    $EM_EntsPerColumn))) //  (+ n) <-- Float to Int hack.
    EM_NumOf_Tabs    (+ (ceil (divf $EM_NumOf_Columns $EM_ColumnsPerTab)))

    GUI_EntMan_Width         (* $EM_ColumnsPerTab $GUI_EntMan_WidthColumn)
    GUI_EntMan_Height           $EM_EntsPerColumn
]


//##############################################################################################################################################################
//##############################################################################################################################################################
GenList__Entities = [

    EM_EntList = ""
    cancelsel; entfind *
    entloop [
        EM_EntList = (concatword $EM_EntList (escape $entget))
    ]

    cancelsel; entfind barrel         ; EM_NumOf_Barrel       $enthavesel
    cancelsel; entfind base           ; EM_NumOf_Base         $enthavesel
    cancelsel; entfind box            ; EM_NumOf_Box          $enthavesel
    cancelsel; entfind bullets        ; EM_NumOf_Bullets      $enthavesel
    cancelsel; entfind carrot         ; EM_NumOf_Carrot       $enthavesel
    cancelsel; entfind cartridges     ; EM_NumOf_Cartridges   $enthavesel
    cancelsel; entfind elevator       ; EM_NumOf_Elevator     $enthavesel
    cancelsel; entfind envmap         ; EM_NumOf_EnvMap       $enthavesel
    cancelsel; entfind flag           ; EM_NumOf_Flag         $enthavesel
    cancelsel; entfind greenarmour    ; EM_NumOf_GreenArmour  $enthavesel
    cancelsel; entfind grenades       ; EM_NumOf_Grenades     $enthavesel
    cancelsel; entfind health         ; EM_NumOf_Health       $enthavesel
    cancelsel; entfind healthboost    ; EM_NumOf_HealthBoost  $enthavesel
    cancelsel; entfind jumppad        ; EM_NumOf_JumpPad      $enthavesel
    cancelsel; entfind light          ; EM_NumOf_Light        $enthavesel
    cancelsel; entfind mapmodel       ; EM_NumOf_MapModel     $enthavesel //nummapmodels
    cancelsel; entfind monster        ; EM_NumOf_Monster      $enthavesel //nummonsters
    cancelsel; entfind particles      ; EM_NumOf_Particles    $enthavesel
    cancelsel; entfind platform       ; EM_NumOf_Platform     $enthavesel
    cancelsel; entfind playerstart * 0; EM_NumOf_PlayerStart0 $enthavesel
    cancelsel; entfind playerstart * 1; EM_NumOf_PlayerStart1 $enthavesel
    cancelsel; entfind playerstart * 2; EM_NumOf_PlayerStart2 $enthavesel
    cancelsel; entfind quaddamage     ; EM_NumOf_QuadDamage   $enthavesel
    cancelsel; entfind respawnpoint   ; EM_NumOf_RespawnPoint $enthavesel
    cancelsel; entfind riflerounds    ; EM_NumOf_RifleRounds  $enthavesel
    cancelsel; entfind rockets        ; EM_NumOf_Rockets      $enthavesel
    cancelsel; entfind shells         ; EM_NumOf_Shells       $enthavesel
    cancelsel; entfind sound          ; EM_NumOf_Sound        $enthavesel //nummapsounds
    cancelsel; entfind spotlight      ; EM_NumOf_SpotLight    $enthavesel
    cancelsel; entfind teledest       ; EM_NumOf_Teledest     $enthavesel
    cancelsel; entfind teleport       ; EM_NumOf_Teleport     $enthavesel
    cancelsel; entfind yellowarmour   ; EM_NumOf_YellowArmour $enthavesel
    cancelsel
]
