nodebug [
    defsvar CTX_CubeMats ""

    defvar CTX_GlassColorR 0 0 255; defvar CTX_Glass2ColorR 0 0 255; defvar CTX_Glass3ColorR 0 0 255; defvar CTX_Glass4ColorR 0 0 255
    defvar CTX_GlassColorG 0 0 255; defvar CTX_Glass2ColorG 0 0 255; defvar CTX_Glass3ColorG 0 0 255; defvar CTX_Glass4ColorG 0 0 255
    defvar CTX_GlassColorB 0 0 255; defvar CTX_Glass2ColorB 0 0 255; defvar CTX_Glass3ColorB 0 0 255; defvar CTX_Glass4ColorB 0 0 255

    defvar CTX_LavaColorR 0 0 255; defvar CTX_Lava2ColorR 0 0 255; defvar CTX_Lava3ColorR 0 0 255; defvar CTX_Lava4ColorR 0 0 255
    defvar CTX_LavaColorG 0 0 255; defvar CTX_Lava2ColorG 0 0 255; defvar CTX_Lava3ColorG 0 0 255; defvar CTX_Lava4ColorG 0 0 255
    defvar CTX_LavaColorB 0 0 255; defvar CTX_Lava2ColorB 0 0 255; defvar CTX_Lava3ColorB 0 0 255; defvar CTX_Lava4ColorB 0 0 255

    defvar CTX_WaterColorR 0 0 255; defvar CTX_Water2ColorR 0 0 255; defvar CTX_Water3ColorR 0 0 255; defvar CTX_Water4ColorR 0 0 255
    defvar CTX_WaterColorG 0 0 255; defvar CTX_Water2ColorG 0 0 255; defvar CTX_Water3ColorG 0 0 255; defvar CTX_Water4ColorG 0 0 255
    defvar CTX_WaterColorB 0 0 255; defvar CTX_Water2ColorB 0 0 255; defvar CTX_Water3ColorB 0 0 255; defvar CTX_Water4ColorB 0 0 255

    defvar CTX_WaterFallColorR 0 0 255; defvar CTX_Water2FallColorR 0 0 255; defvar CTX_Water3FallColorR 0 0 255; defvar CTX_Water4FallColorR 0 0 255
    defvar CTX_WaterFallColorG 0 0 255; defvar CTX_Water2FallColorG 0 0 255; defvar CTX_Water3FallColorG 0 0 255; defvar CTX_Water4FallColorG 0 0 255
    defvar CTX_WaterFallColorB 0 0 255; defvar CTX_Water2FallColorB 0 0 255; defvar CTX_Water3FallColorB 0 0 255; defvar CTX_Water4FallColorB 0 0 255
]

newgui "editmat" [
    guieditingcheck
    guiscale 0.6
    guiposition 0 1
    guikeeptab 1
    guistayopen [guinoautotab [
        guistrut 77 1
        guititle "apply material"
        guistrut 0.5
        guialign 0 [// H
            guistrut 1


            CTX_CubeMats $selchildmat   //@@  selchildmat always returns mats of HoveredSelection not ClickedSelection...


            guilist [// V
                guistrut 14 1; guibutton "^f7air ^f9(clear)" [editmat "air"]      (CTX__MatCheckbox $CTX_CubeMats "air")
                guistrut 0.25; guibutton "^f3clip"           [editmat "clip"]     (CTX__MatCheckbox $CTX_CubeMats "clip")
                guistrut 0.25; guibutton "^f0noclip"         [editmat "noclip"]   (CTX__MatCheckbox $CTX_CubeMats "noclip")
            ]
            guilist [// V
                guistrut 14 1; guibutton "^f5alpha"          [editmat "alpha"]    (CTX__MatCheckbox $CTX_CubeMats "alpha")
                guistrut 0.25; guibutton "^f4death"          [editmat "death"]    (CTX__MatCheckbox $CTX_CubeMats "death")
                guistrut 0.25; guibutton "^f2gameclip"       [editmat "gameclip"] (CTX__MatCheckbox $CTX_CubeMats "gameclip")
            ]
            guilist [// V
                guistrut  9 1; guibutton "^f8glass"          [editmat "glass"]    (CTX__MatCheckbox $CTX_CubeMats "glass")
                guistrut 0.25; guibutton "^f6lava"           [editmat "lava"]     (CTX__MatCheckbox $CTX_CubeMats "lava")
                guistrut 0.25; guibutton "^f1water"          [editmat "water"]    (CTX__MatCheckbox $CTX_CubeMats "water")
            ]
            guilist [// V
                guistrut  9 1; guibutton "^f8glass2"         [editmat "glass2"]   (CTX__MatCheckbox $CTX_CubeMats "glass2")
                guistrut 0.25; guibutton "^f6lava2"          [editmat "lava2"]    (CTX__MatCheckbox $CTX_CubeMats "lava2")
                guistrut 0.25; guibutton "^f1water2"         [editmat "water2"]   (CTX__MatCheckbox $CTX_CubeMats "water2")
            ]
            guilist [// V
                guistrut  9 1; guibutton "^f8glass3"         [editmat "glass3"]   (CTX__MatCheckbox $CTX_CubeMats "glass3")
                guistrut 0.25; guibutton "^f6lava3"          [editmat "lava3"]    (CTX__MatCheckbox $CTX_CubeMats "lava3")
                guistrut 0.25; guibutton "^f1water3"         [editmat "water3"]   (CTX__MatCheckbox $CTX_CubeMats "water3")
            ]
            guilist [// V
                guistrut  9 1; guibutton "^f8glass4"         [editmat "glass4"]   (CTX__MatCheckbox $CTX_CubeMats "glass4")
                guistrut 0.25; guibutton "^f6lava4"          [editmat "lava4"]    (CTX__MatCheckbox $CTX_CubeMats "lava4")
                guistrut 0.25; guibutton "^f1water4"         [editmat "water4"]   (CTX__MatCheckbox $CTX_CubeMats "water4")
            ]
        ]
        guistrut 2
        guialign 0 [
            guistrut 2 1
            guicheckbox "show material volumes ^f2[M]" showmat
        ]

        guitab "^f8glass"; if (= $guitabnum  2) [CTX__MatGlass ""]
        guitab "^f82"    ; if (= $guitabnum  3) [CTX__MatGlass "2"]
        guitab "^f83"    ; if (= $guitabnum  4) [CTX__MatGlass "3"]
        guitab "^f84"    ; if (= $guitabnum  5) [CTX__MatGlass "4"]
        guitab "^f6lava" ; if (= $guitabnum  6) [CTX__MatLava ""]
        guitab "^f62"    ; if (= $guitabnum  7) [CTX__MatLava "2"]
        guitab "^f63"    ; if (= $guitabnum  8) [CTX__MatLava "3"]
        guitab "^f64"    ; if (= $guitabnum  9) [CTX__MatLava "4"]
        guitab "^f1water"; if (= $guitabnum 10) [CTX__MatWater ""]
        guitab "^f12"    ; if (= $guitabnum 11) [CTX__MatWater "2"]
        guitab "^f13"    ; if (= $guitabnum 12) [CTX__MatWater "3"]
        guitab "^f14"    ; if (= $guitabnum 13) [CTX__MatWater "4"]
    ]]
] "materials"

//==============================================================================================================================================================
CTX__MatCheckbox = [
    if (|| [=s $selchildcount "1"] [> (strstr $selchildcount "/") -1]) [
        if (=s $arg2 "air") [
            result (? (= (listlen $arg1) 0) "checkbox_on" "checkbox_off")
        ][
            result (? (>= (indexof $arg1 $arg2) 0) "checkbox_on" "checkbox_off")
        ]
    ][
        result "checkbox_maybe"
    ]
]

//==============================================================================================================================================================
CTX__MatGlass = [
    local GlsClr GlsClrR GlsClrG GlsClrB
    GlsClr  = (concatword "glass" $arg1 "colour")
    GlsClrR = (concatword "CTX_Glass" $arg1 "ColorR")
    GlsClrG = (concatword "CTX_Glass" $arg1 "ColorG")
    GlsClrB = (concatword "CTX_Glass" $arg1 "ColorB")
    guilist [// H
        guilist [// V
            guistrut 13 1
            guialign 1 [guitext "color: " 0]
            guistrut 1
            guialign 1 [guicolor $@GlsClr; guistrut 1]
        ]
        guilist [// V
            guistrut 64 1
            @GlsClrR = (& (>> $@GlsClr 16) 0xFF)
            @GlsClrG = (& (>> $@GlsClr  8) 0xFF)
            @GlsClrB = (&     $@GlsClr     0xFF)
            guislider @GlsClrR 0 255 [@GlsClr $@GlsClrR $@GlsClrG $@GlsClrB]
            guislider @GlsClrG 0 255 [@GlsClr $@GlsClrR $@GlsClrG $@GlsClrB]
            guislider @GlsClrB 0 255 [@GlsClr $@GlsClrR $@GlsClrG $@GlsClrB]
        ]
    ]
]

//==============================================================================================================================================================
CTX__MatLava = [
    local LvaClr LvaClrR LvaClrG LvaClrB
    LvaClr  = (concatword "lava" $arg1 "colour")
    LvaClrR = (concatword "CTX_Lava" $arg1 "ColorR")
    LvaClrG = (concatword "CTX_Lava" $arg1 "ColorG")
    LvaClrB = (concatword "CTX_Lava" $arg1 "ColorB")
    guilist [// H
        guilist [// V
            guistrut 13 1
            guialign 1 [guitext "fog color: " 0]
            guistrut 1
            guialign 1 [guicolor $@LvaClr; guistrut 1]
            guistrut 0.5
            guialign 1 [guitext "fog distance: " 0]
        ]
        guilist [// V
            guistrut 64 1
            @LvaClrR = (& (>> $@LvaClr 16) 0xFF)
            @LvaClrG = (& (>> $@LvaClr  8) 0xFF)
            @LvaClrB = (&     $@LvaClr     0xFF)
            guislider @LvaClrR 0 255 [@LvaClr $@LvaClrR $@LvaClrG $@LvaClrB]
            guislider @LvaClrG 0 255 [@LvaClr $@LvaClrR $@LvaClrG $@LvaClrB]
            guislider @LvaClrB 0 255 [@LvaClr $@LvaClrR $@LvaClrG $@LvaClrB]
            guistrut 0.5
            guislider @(concatword "lava" $arg1 "fog") 0 1024
        ]
    ]
]

//==============================================================================================================================================================
CTX__MatWater = [
    local WtrClr WtrFllClr WtrClrR WtrClrG WtrClrB WtrFllClrR WtrFllClrG WtrFllClrB
    WtrClr     = (concatword "water" $arg1 "colour")
    WtrFllClr  = (concatword "water" $arg1 "fallcolour")
    WtrClrR    = (concatword "CTX_Water" $arg1 "ColorR")
    WtrClrG    = (concatword "CTX_Water" $arg1 "ColorG")
    WtrClrB    = (concatword "CTX_Water" $arg1 "ColorB")
    WtrFllClrR = (concatword "CTX_Water" $arg1 "FallColorR")
    WtrFllClrG = (concatword "CTX_Water" $arg1 "FallColorG")
    WtrFllClrB = (concatword "CTX_Water" $arg1 "FallColorB")
    guilist [// H
        guilist [// V
            guistrut 13 1
            guialign 1 [guitext "color: " 0]
            guistrut 1
            guialign 1 [guicolor $@WtrClr; guistrut 1]
            guistrut 0.5
            guialign 1 [guitext "fog distance: " 0]
            guialign 1 [guitext "surface spec: " 0]
            guistrut 0.5
            guialign 1 [guitext "waterfall color: " 0]
            guistrut 1
            guialign 1 [guicolor $@WtrFllClr; guistrut 1]
        ]
        guilist [// V
            guistrut 64 1
            @WtrClrR = (& (>> $@WtrClr 16) 0xFF)
            @WtrClrG = (& (>> $@WtrClr  8) 0xFF)
            @WtrClrB = (&     $@WtrClr     0xFF)
            guislider @WtrClrR 0 255 [@WtrClr $@WtrClrR $@WtrClrG $@WtrClrB]
            guislider @WtrClrG 0 255 [@WtrClr $@WtrClrR $@WtrClrG $@WtrClrB]
            guislider @WtrClrB 0 255 [@WtrClr $@WtrClrR $@WtrClrG $@WtrClrB]
            guistrut 0.5
            guislider @(concatword "water" $arg1 "fog") 0 1024
            guislider @(concatword "water" $arg1 "spec") 0 300
            guistrut 0.5
            @WtrFllClrR = (& (>> $@WtrFllClr 16) 0xFF)
            @WtrFllClrG = (& (>> $@WtrFllClr  8) 0xFF)
            @WtrFllClrB = (&     $@WtrFllClr     0xFF)
            guislider @WtrFllClrR 0 255 [@WtrFllClr $@WtrFllClrR $@WtrFllClrG $@WtrFllClrB]
            guislider @WtrFllClrG 0 255 [@WtrFllClr $@WtrFllClrR $@WtrFllClrG $@WtrFllClrB]
            guislider @WtrFllClrB 0 255 [@WtrFllClr $@WtrFllClrR $@WtrFllClrG $@WtrFllClrB]
        ]
    ]
]













