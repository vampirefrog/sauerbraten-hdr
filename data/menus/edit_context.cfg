nodebug [
    defvar CTX_Context 0 0 5
]

newgui "context" [
    guieditingcheck
    guiscale 0.5
    guilist [// H
        guilist [// V
            guistrut 48 1

            case ($CTX_Context) 1 [//===========================================================================================================================
                guititle "editing context: heightmap"
                guistrut 0.5

                guicheckbox "hmapedit" hmapedit

                guistrut 0.5
                guitext "currentbrush:" 0
                loop i (+ $HM_BrushCount 1) [
                    guiradio (concatword "[^f2" $i "^f~] ^"" (at $(concatword "brush_" $i) 1) "^"") currentbrush $i [brush_@i]
                ]

            ] 2 [//=============================================================================================================================================
                guititle "editing context: blendmap"
                guistrut 0.5

                guifreerow 11  1 [ guitext "^f~paint mode: " 0
                         ]  1 -2 [ guiradio (concatword (at $Labels_BlendPaintMode 0) "^t^t^t^t^f2[NumPad 0]")  blendpaintmode 0
                                   guiradio (concatword (at $Labels_BlendPaintMode 2) "^t^t^t^t^f2[NumPad 1]")  blendpaintmode 2
                                   guiradio (concatword (at $Labels_BlendPaintMode 5)   "^t^t^t^f2[NumPad 2]")  blendpaintmode 5
                                   guistrut 0.75
                                   guibutton "reveal blendmap^t^f2[NumPad 3]" [clearlightmaps; showblendmap]
                                   guistrut 0.75
                                   guitext "paint^t^t^t^t^f2[MouseLeft]"
                                   guitext "change brush^t^t^f2[MouseWheel]"
                                   guitext "rotate brush^t^t^f2[MouseRight]"
                ]

                //guistrut 0.5
                //guifreerow 11  1 [ guitext "^f~brush: " 0
                //         ]  1 -2 [ guitext (concatword "^f~[^f2"(curblendbrush)"^f~] ^f2^""(getblendbrushname $curblendbrush)"^"") 0
                //]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 11 1
                        guialign 1 [guitext "brush color: " 0]
                        guistrut 1.5
                        guialign 1 [guicolor $blendbrushcolor; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 37 1
                        BlendBrushR (& (>> $blendbrushcolor 16) 0xFF)
                        BlendBrushG (& (>> $blendbrushcolor  8) 0xFF)
                        BlendBrushB (&     $blendbrushcolor     0xFF)
                        guislider BlendBrushR 0 255 [blendbrushcolor $BlendBrushR $BlendBrushG $BlendBrushB]
                        guistrut 0.25
                        guislider BlendBrushG 0 255 [blendbrushcolor $BlendBrushR $BlendBrushG $BlendBrushB]
                        guistrut 0.25
                        guislider BlendBrushB 0 255 [blendbrushcolor $BlendBrushR $BlendBrushG $BlendBrushB]
                    ]
                ]

                guistrut 1
                guifreerow 4 -2 [
                         ] 1 -2 [ guibutton "clear blendmap in selection^t^f2/clearblendmapsel" [clearblendmapsel]
                                  guistrut 0.5
                                  guibutton "clear ^f3entire ^f~blendmap^t^t^f2/clearblendmap"  [clearblendmap]
                ]

            ] 3 [//=============================================================================================================================================
                guititle "editing context: waypoints"
                guistrut 0.5

                guialign 0 [// H
                    guicheckbox "show  ^f2[-]" showwaypoints
                    guistrut 4
                    guicheckbox "drop  ^f2[=]" dropwaypoints
                ]

                guistrut 1.5
                guistayopen [
                    WayPointFile (concatword (? $mapname $mapname "untitled") ".wpt")
                    guialign 0 [guibutton (concatword (? (findfile (concatword "packages/base/" $WayPointFile)) "" "^f4")  "load ^"" $WayPointFile "^"") [loadwaypoints]]
                    guistrut 0.75
                    guialign 0 [guibutton (concatword "save ^"" $WayPointFile "^"") [savewaypoints]]
                ]

                guistrut 1.5
                guilist [// H
                    guilist [guistrut 12 1; guitext "view distance:" 0]
                    guilist [guistrut 36 1; guislider showwaypointsradius]
                ]

            ] 4 [//=============================================================================================================================================
                guititle "editing context: entity"
                guistrut 0.5

                guilist [// H
                    guistrut 6 1
                    guilist [// V
                        cond [> $enthavesel 1][
                            guitext "Multiple Entity Types Selected!" 0
                        ][= $enthavesel 1][
                            guitext (HUD__EntitySelection) 0
                        ][
                            guitext "Hovered entities loose selection status in menu!" 0
                            guitext "        newgui [] ^"^" [OnOpen: store hovered entity ???]" 0
                        ]
                    ]
                ]


                //  IF (multiple ents selected)
                //      IF (ents are all of the same type)
                //          IF NOT (attribute has same value)
                //              guitext "Attr#:  Multiple Values!" 0
                //      ELSE
                //          guitext "Multiple Entity Types Selected!" 0
                //  ELSE
                //      ...


                guistrut 0.5
                guicheckbox "edithud_showselinfo" edithud_showselinfo

            ] 5 [//=============================================================================================================================================
                guititle "editing context: cube"
                guistrut 0.5

                guibutton "insert cube prefab^t^t^t^f2/browse_prefabs"              [showgui "prefabs"]     ; guistrut 0.25
                guibutton "set cube material-volume^t^f2/materialgui"               [showgui "editmat"]     ; guistrut 1.5

                guibutton "texture list^t^t^t^t^f2/browse_textures^t[F2]"           [showtexgui] "menu"     ; guistrut 0.25
                guibutton "texture replace^t^t^t^t^f2/replacetexgui"                [showgui "replacetex"]  ; guistrut 0.25
                guibutton "texture vcolor editor^t^t^f2/vcolorgui^t^t^t[F7]"        [showgui "vcolor"]      ; guistrut 0.25
                guibutton "texture vshaderparam editor^t^f2/vshaderparamgui^t[F8]"  [showgui "vshaderparam"]; guistrut 1.5

                guibutton "new entity^t^t^t^t^f2/newentgui"                         [showgui "newent"]      ; guistrut 0.25
                guibutton "new entity mapmodel^t^t^f2/browse_mapmodels^t[F4]"       [showgui "mapmodels"]

            ] 0 [//=============================================================================================================================================
                guititle "editing context: ???"
                guistrut 0.5

                guialign 0 [guitext "how did you get here?" 0]
            ]
            guistrut 0.5
        ]

        guibar //###############################################################################################################################################
        guilist [// V
            guistrut 16 1
            guititle "map vars"
            guistrut 0.5
            guibutton "lighting"      [showgui "map_lighting"]; guistrut 0.5
            guibutton "miscellaneous" [showgui "map_misc"    ]; guistrut 0.5
            guibutton "sky & fog"     [showgui "map_sky"     ]
            guistrut 0.5
            guibar //===========================================================================================================================================
            guistrut 0.5
            guibutton "entity manager  ^f6[F9]"  [showgui "entitymanager" ]; guistrut 0.5
            guibutton "texslot manager ^f6[F10]" [showgui "texslotmanager"]
            guistrut 0.5
            guibar //===========================================================================================================================================
            guistrut 0.5
            guibutton "editing"  [showgui "editing"]
            guistrut 0.5
        ]
    ]
] 0 [
    CTX_Context 0
    cond [$hmapedit      ][CTX_Context 1  //  "Heightmap"
        ][$blendpaintmode][CTX_Context 2  //  "Blendmap"
        ][$showwaypoints ][CTX_Context 3  //  "Waypoints"
        ][$enthavesel    ][CTX_Context 4  //  "Entity"
                         ][CTX_Context 5] //  "Cube(s)"
]

