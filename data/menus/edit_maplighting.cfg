//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    deffvar GUI_MapLighting_ColumnWidth 1 60   -1
    deffvar GUI_MapLighting_Height      1 11.5 -1

    defvar MAP_SunLightR     0 0  255
    defvar MAP_SunLightG     0 0  255 // 0, 0, 0xFFFFFF
    defvar MAP_SunLightB     0 0  255
    defvar MAP_SunLightScale 0 0 1600 // 0.0, 1.0, 16.0

    defvar MAP_SkyLightR     0 0  255
    defvar MAP_SkyLightG     0 0  255 // 0, 0, 0xFFFFFF
    defvar MAP_SkyLightB     0 0  255
    defvar MAP_SkyLightScale 0 0 1600 // 0.0, 1.0, 16.0

    defvar MAP_AoLightR     0 0  255
    defvar MAP_AoLightG     0 0  255 // 0, 0, 0xFFFFFF
    defvar MAP_AoLightB     0 0  255
    defvar MAP_AoLightScale 0 0 1600 // 0.0, 1.0, 16.0

    defvar MAP_AmbientR 0 0 255
    defvar MAP_AmbientG 0 0 255 // 0, 0, 0xFFFFFF
    defvar MAP_AmbientB 0 0 255
]

newgui "map_lighting" [
    guiposition 0 1
    guiscale 0.6
    guikeeptab 1
    guistayopen [
    //##########################################################################################################################################################
    //##########################################################################################################################################################
    if (= $guitabnum  1) [
        guialign 0 [// H
            guistrut $GUI_MapLighting_Height 1
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1
                guititle "sunlight"
                guistrut 0.5
                guifreerow 12  1 [ guitext "pitch: " 0
                         ] 48 -2 [ guislider sunlightpitch
                ]
                guifreerow 12  1 [ guitext "yaw: " 0
                         ] 48 -2 [ guislider sunlightyaw
                ]
                guilist [// H
                    guistrut 12
                    guibutton "get sun pitch & yaw from camera  ^f2/getsundir" [getsundir]
                ]
                guistrut 0.5
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1
                        guialign 1 [guicolor $sunlight; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_SunLightR (& (>> $sunlight 16) 0xFF)
                        MAP_SunLightG (& (>> $sunlight  8) 0xFF)
                        MAP_SunLightB (&     $sunlight     0xFF)
                        guislider MAP_SunLightR 0 255 [sunlight $MAP_SunLightR $MAP_SunLightG $MAP_SunLightB]
                        guislider MAP_SunLightG 0 255 [sunlight $MAP_SunLightR $MAP_SunLightG $MAP_SunLightB]
                        guislider MAP_SunLightB 0 255 [sunlight $MAP_SunLightR $MAP_SunLightG $MAP_SunLightB]
                    ]
                ]
                guistrut 0.5
                MAP_SunLightScale (*f $sunlightscale 100)
                guifreerow 12  1 [ guitext "scale: " 0
                         ] 48 -2 [ guislider MAP_SunLightScale 1 400 [sunlightscale (*f $MAP_SunLightScale 0.01)]
                ]
                guibar
                guilist [// H
                    guistrut 9
                    guibutton "set default skybox with lighting  ^f2/lettherebelight" [lettherebelight]
                ]
            ]

            guibar //===============================================================================================================================================
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1
                guititle "skylight"
                guistrut 0.5
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1
                        guialign 1 [guicolor $skylight; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_SkyLightR (& (>> $skylight 16) 0xFF)
                        MAP_SkyLightG (& (>> $skylight  8) 0xFF)
                        MAP_SkyLightB (&     $skylight     0xFF)
                        guislider MAP_SkyLightR 0 255 [skylight $MAP_SkyLightR $MAP_SkyLightG $MAP_SkyLightB]
                        guislider MAP_SkyLightG 0 255 [skylight $MAP_SkyLightR $MAP_SkyLightG $MAP_SkyLightB]
                        guislider MAP_SkyLightB 0 255 [skylight $MAP_SkyLightR $MAP_SkyLightG $MAP_SkyLightB]
                    ]
                ]
                guistrut 0.5
                guifreerow 12  1 [ guitext "blur: " 0
                         ]  4 -2 [ guiradio "0" blurskylight 0
                         ]  4 -2 [ guiradio "1" blurskylight 1
                         ]  4 -2 [ guiradio "2" blurskylight 2
                ]
                guibar
                guititle "ambient"
                guistrut 0.5
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1
                        guialign 1 [guicolor $ambient; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_AmbientR (& (>> $ambient  16) 0xFF)
                        MAP_AmbientG (& (>> $ambient   8) 0xFF)
                        MAP_AmbientB (&     $ambient      0xFF)
                        guislider MAP_AmbientR 0 255 [ambient $MAP_AmbientR $MAP_AmbientG $MAP_AmbientB]
                        guislider MAP_AmbientG 0 255 [ambient $MAP_AmbientR $MAP_AmbientG $MAP_AmbientB]
                        guislider MAP_AmbientB 0 255 [ambient $MAP_AmbientR $MAP_AmbientG $MAP_AmbientB]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "lighting2"
    if (= $guitabnum  2) [
        guialign 0 [// H
            guistrut $GUI_MapLighting_Height 1
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1
                guititle "indirect light"
                guistrut 0.5
                guifreerow 12  1 [ guitext "mode: " 0
                         ] 48 -2 [ guiradio "^f9(0) ^f~classic skylight" indirectlightmode 0
                                   guiradio "^f9(1) ^f~new skylight + aolight" indirectlightmode 1
                ]
                guistrut 0.5
                guifreerow 12  1 [ guitext "ray count: " 0
                         ] 48 -2 [
                    if ($indirectlightmode) [
                        guilistslider indirectraycount [600 900 1200 1500 1800 2100 2400 3000 3600 4200 4800 5400 6000 7200 8400 9600 12000]
                    ][
                        guitext "^f217" 0
                    ]
                ]

                guistrut 0.25
                guibar
                guititle (concatword (? $indirectlightmode "" "^f4") "skylight +")
                guistrut 0.4
                guifreerow 12  1 [
                         ] 48 -2 [ guicheckbox (concatword (? $indirectlightmode "" "^f4") "bias towards up direction") skylightbiasup
                ]
                guistrut 0.4
                MAP_SkyLightScale (*f $skylightscale 100)
                guifreerow 12  1 [ guitext (concatword (? $indirectlightmode "" "^f4") "scale: ") 0
                         ] 48 -2 [ guislider MAP_SkyLightScale 1 400 [skylightscale (*f $MAP_SkyLightScale 0.01)]
                ]
                guistrut 0.4
                guifreerow 12  1 [
                         ] 48 -2 [ guicheckbox (concatword (? $indirectlightmode "" "^f4") "tonemap") skylighttonemap
                ]
            ]

            guibar //===============================================================================================================================================
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1
                guititle (concatword (? $indirectlightmode "" "^f4") "aolight")

                guistrut 0.5
                guifreerow 12  1 [
                         ] 48 -2 [ guicheckbox (concatword (? $indirectlightmode "" "^f4") "mix with skylight") aolightmix
                ]
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 10.5 1
                        guialign 1 [guitext (concatword (? $indirectlightmode "" "^f4") "attenuation") 0]
                        guialign 1 [guitext (concatword (? $indirectlightmode "" "^f4") "distance") 0]
                    ]
                    guialign 0 [
                        guitext (concatword (? $indirectlightmode "" "^f4") ": ") 0
                    ]
                    guialign 0 [// V
                        guistrut 48 1
                        guilistslider aolightdist [32 48 64 96 128 192 256 320 384 448 512 640 768 896 1024 1280 1536 1792 2048]
                    ]
                ]
                guistrut 0.5
                MAP_AoLightScale (*f $aolightscale 100)
                guifreerow 12  1 [ guitext (concatword (? $indirectlightmode "" "^f4") "scale: ") 0
                         ] 48 -2 [ guislider MAP_AoLightScale 1 400 [aolightscale (*f $MAP_AoLightScale 0.01)]
                ]
                guistrut 0.5
                guifreerow 12  1 [
                         ] 48 -2 [ guicheckbox (concatword (? $indirectlightmode "" "^f4") "tonemap") aolighttonemap
                ]
                guistrut 0.5
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext (concatword (? $indirectlightmode "" "^f4") "color: ") 0]
                        guistrut 1.25
                        guialign 1 [
                            if ($indirectlightmode) [
                                guicolor $aolight
                                guistrut 1
                            ][
                                guitext "^f40x000000" 0
                                guistrut 1
                            ]
                        ]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_AoLightR (& (>> $aolight  16) 0xFF)
                        MAP_AoLightG (& (>> $aolight   8) 0xFF)
                        MAP_AoLightB (&     $aolight      0xFF)
                        guislider MAP_AoLightR 0 255 [aolight $MAP_AoLightR $MAP_AoLightG $MAP_AoLightB]; guistrut 0.125
                        guislider MAP_AoLightG 0 255 [aolight $MAP_AoLightR $MAP_AoLightG $MAP_AoLightB]; guistrut 0.125
                        guislider MAP_AoLightB 0 255 [aolight $MAP_AoLightR $MAP_AoLightG $MAP_AoLightB]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "parameters"
    if (= $guitabnum  3) [
        guialign 0 [// H
            guistrut $GUI_MapLighting_Height 1
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1
                guifreerow 12  1 [ guitext "lightprecision: " 0
                         ] 48 -2 [ guilistslider lightprecision [8 12 16 24 32 48 64 96 128 192 256]
                                   guitext "^f9lower value = higher resolution lightmaps" 0
                ]
                guistrut 0.5
                guifreerow 12  1 [ guitext "lightlod: " 0
                         ] 48 -2 [ guislider lightlod
                                   guitext "^f9if (cube_gridpower >= lightlod) then, use lightprecision" 0
                                   guitext "^f9if (cube_gridpower <  lightlod) then, use lightprecision/2" 0
                ]
                guistrut 0.5
                guibar
                guistrut 0.25
                guifreerow 12  1 [ guitext "lighterror: " 0
                         ] 48 -2 [ guislider lighterror
                                   guitext "^f9if (min-to-max delta < lighterror) then," 0
                                   guitext "^f9lighting will be uniform on surface (no lightmap used)" 0
                ]
                //guistrut 0.5
                //guifreerow 12  1 [ guitext "bumperror: " 0
                //         ] 48 -2 [ guislider bumperror
                //                   guitext "^f9if (min-to-max delta < bumperror) then," 0
                //                   guitext "^f9normal will be uniform on surface (no lightmap_normal used)" 0
                //]
            ]

            guibar //===============================================================================================================================================
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1
                guifreerow 13  1 [ guitext "blurskylight: " 0
                         ]  5 -2 [ guiradio "off" blurskylight 0
                         ]  5 -2 [ guiradio "1x"  blurskylight 1
                         ]  5 -2 [ guiradio "2x"  blurskylight 2
                ]
                guistrut 0.5
                guifreerow 13  1 [ guitext "blurlightmaps: " 0
                         ]  5 -2 [ guiradio "off" blurlms 0
                         ]  5 -2 [ guiradio "1x"  blurlms 1
                         ]  5 -2 [ guiradio "2x"  blurlms 2
                ]
                guistrut 0.5
                guibar
                guistrut 0.25
                guifreerow 13  1 [ guitext "lerpangle: " 0
                         ] 47 -2 [ guislider lerpangle
                ]
                guistrut 0.25
                guibar
                guistrut 0.25
                guifreerow 13  1 [ guitext "skytexturelight: " 0
                         ] 47 -2 [ guicheckbox "emit sunlight & skylight from skytexture" skytexturelight
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "settings"
    if (= $guitabnum  4) [
        guialign 0 [// H
            guistrut $GUI_MapLighting_Height 1
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1

                guifreerow 12  1 [ guitext "lmaa: " 0
                         ] 10 -2 [ guiradio "^f9(0) ^f~none" lmaa 0
                         ] 10 -2 [ guiradio "^f9(1) ^f~2x"   lmaa 1
                         ] 10 -2 [ guiradio "^f9(2) ^f~4x"   lmaa 2
                         ]  1 -2 [ guiradio "^f9(3) ^f~8x"   lmaa 3
                ]
                guistrut 0.25
                guifreerow 12  1 [ guitext "lmshadows: " 0
                         ] 10 -2 [ guiradio "^f9(0) ^f~none"            lmshadows 0
                         ] 10 -2 [ guiradio "^f9(1) ^f~cubes"           lmshadows 1
                         ]  1 -2 [ guiradio "^f9(2) ^f~cubes+mapmodels" lmshadows 2
                ]
                guistrut 0.25
                guifreerow 12  1 [ guitext "lerptjoints: " 0
                         ] 48 -2 [ guicheckbox "lerp t-joints" lerptjoints
                ]

                guibar
                guilist [// H
                    guistrut 12
                    guicheckbox "fullbright  ^f2[L]" [fullbright]
                ]
                guistrut 0.375
                guifreerow 12  1 [ guitext "fullbrightlevel: " 0
                         ] 48 -2 [ guislider fullbrightlevel
                ]

                guibar
                guistrut 0.125
                guifreerow 12  1 [ guitext "maxmerge: " 0
                         ] 48 -2 [ guislider maxmerge
                ]
                //guistrut 0.5
                //guifreerow 12  1 [ guitext "adaptivesample: " 0   //  adaptivesample 0, 2, 2
                //         ] 48 -2 [ guislider adaptivesample       //      "1" seems to produce the least amount of lighting errors.
                //]
                guistrut 0.25
                guibar
                guistrut 0.25
                guifreerow 12  1 [ guitext "lightthreads: " 0
                         ]  1 -2 [ guifield lightthreads 5
                         ]  1 -2 [ guistayopen [guibutton "" [lightthreads (+ $lightthreads -1)]  "val_dec"]
                         ]  1 -2 [ guistayopen [guibutton "" [lightthreads (+ $lightthreads  1)]  "val_inc"]
                ]
            ]

            guibar //===============================================================================================================================================
            guilist [// V
                guistrut $GUI_MapLighting_ColumnWidth 1

                guialign 0 [// H
                    guistrut 9.5 1
                    guialign 0 [// V
                        guibutton "calclight  ^f2[K]^t^f9(use vars)" [calclight]
                        guistrut 1
                        guibutton "calclight -1^t^f9(quick)" [calclight -1]
                        guitext "^tlmaa = 0 ^tlmshadows = 1^tlerptjoints = 0" 0
                        guistrut 0.5
                        guibutton "calclight 1^t^f9(quality)" [calclight 1]
                        guitext "^tlmaa = 3 ^tlmshadows = 2^tlerptjoints = 1" 0
                        guistrut 1
                        guibutton "clear lightmaps" [clearlightmaps]

                        //guibutton "dump lightmap textures" [dumplms]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
]] "lighting"
