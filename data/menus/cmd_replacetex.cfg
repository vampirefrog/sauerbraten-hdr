//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvar ReplaceMe   0 1 65535
    defvar ReplaceWith 0 1 65535

    defvar ReplaceInsideSelection 0 0 1
]

newgui "replacetex" [
    guiposition 0 1
    guiscale 0.5
    guistayopen [
    guilist [// H
        //======================================================================================================================================================
        guialign 0 [// V
            guistrut 48 1

            guititle "replace this"
            guistrut 0.5

            guialign 0 [// H
                guiimage (concatword (GetTexCmdsString $ReplaceMe) "packages/" (gettexname $ReplaceMe)) [] 6 0 "data/cube.png"
                if (!= (getvlayer $ReplaceMe) 0) [
                    guistrut -10
                    guiimage (concatword (GetTexCmdsString (getvlayer $ReplaceMe)) "packages/" (gettexname (getvlayer $ReplaceMe))) 0 2.5 0 "data/cube.png"
                ]
            ]

            guialign 0 [// H
                guitext (concatword " ^f~[^f2" $ReplaceMe "^f~] ^f2^"" (gettexname $ReplaceMe) "^"^n^n") 0
            ]

            guistrut 1.25
            if (> (+ $getseltex 0) 0) [
                guibutton (concatword "GET ^f~[^f2" $getseltex "^f~] ^f2^"" (gettexname $getseltex) "^"^n^n") [ReplaceMe    $getseltex   ]
            ][
                guitext "GET ^f4[~] ^"~^"" "action"
            ]
            guistrut 0.25
            if (> (+ $getcurtex 0) 0) [
                guibutton (concatword "GET ^f~[^f2" $getcurtex "^f~] ^f2^"" (gettexname $getcurtex) "^"^n^n") [ReplaceMe (+ $getcurtex 0)]
            ][
                guitext "GET ^f4[~] ^"~^"" "action"
            ]
            guistrut 0.25
            if (> (+ $getreptex 0) 0) [
                guibutton (concatword "GET ^f~[^f2" $getreptex "^f~] ^f2^"" (gettexname $getreptex) "^"^n^n") [ReplaceMe (+ $getreptex 0)]
            ][
                guitext "GET ^f4[~] ^"~^"" "action"
            ]
            guistrut 0.25
        ]

        guibar //===============================================================================================================================================
        guilist [// V
            //guistrut 10 1
            guistrut 0.5
            guialign 0 [// H
                guistrut 0.49
                guicheckbox "inside selection" ReplaceInsideSelection
            ]
            guistrut 0.3
            guialign 0 [// H
                guistrut 0.49
                if ($ReplaceInsideSelection) [
                    guibutton "^f2REPLACE" [replacetexsel $ReplaceWith $ReplaceMe]
                ][
                    guibutton "^f6REPLACE" [replacetex $ReplaceWith $ReplaceMe]
                ]
            ]
            guistrut 0.25
            guialign 0 [// H
                guistrut 0.49
                guitext "^f9this cannot be undone!" 0
            ]

            guispring
            guilist [// H
                guistrut 0.49
                guibutton "" [ReplaceMe (max (+ $ReplaceMe -1)                0)] "val_dec"
                guibutton "" [ReplaceMe (min (+ $ReplaceMe  1) (- $numvslots 1))] "val_inc"
                guispring
                guitext "^f~>>>" 0
                guispring
                guibutton "" [ReplaceWith (max (+ $ReplaceWith -1)                0)] "val_dec"
                guibutton "" [ReplaceWith (min (+ $ReplaceWith  1) (- $numvslots 1))] "val_inc"
            ]
            guispring

            guilist [// H
                guistrut 0.49
                guispring
                guilist [// V
                    guialign 0 [guitext "from selection" 0]
                    guistrut 0.25
                    guialign 0 [guitext "last used" 0]
                    guistrut 0.25
                    guialign 0 [guitext "last replaced" 0]
                ]
                guispring
            ]
            guistrut 0.25
        ]

        guibar //===============================================================================================================================================
        guialign 0 [// V
            guistrut 48 1

            guititle "with this"
            guistrut 0.5

            guialign 0 [// H
                guiimage (concatword (GetTexCmdsString $ReplaceWith) "packages/" (gettexname $ReplaceWith)) [] 6 0 "data/cube.png"
                if (!= (getvlayer $ReplaceWith) 0) [
                    guistrut -10
                    guiimage (concatword (GetTexCmdsString (getvlayer $ReplaceWith)) "packages/" (gettexname (getvlayer $ReplaceWith))) 0 2.5 0 "data/cube.png"
                ]
            ]

            guialign 0 [// H
                guitext (concatword " ^f~[^f2" $ReplaceWith "^f~] ^f2^"" (gettexname $ReplaceWith) "^"^n^n") 0
            ]

            guistrut 1.25
            if (> (+ $getseltex 0) 0) [
                guibutton (concatword "GET ^f~[^f2" $getseltex "^f~] ^f2^"" (gettexname $getseltex) "^"^n^n") [ReplaceWith    $getseltex   ]
            ][
                guitext "GET ^f4[~] ^"~^"" "action"
            ]
            guistrut 0.25
            if (> (+ $getcurtex 0) 0) [
                guibutton (concatword "GET ^f~[^f2" $getcurtex "^f~] ^f2^"" (gettexname $getcurtex) "^"^n^n") [ReplaceWith (+ $getcurtex 0)]
            ][
                guitext "GET ^f4[~] ^"~^"" "action"
            ]
            guistrut 0.25
            if (> (+ $getreptex 0) 0) [
                guibutton (concatword "GET ^f~[^f2" $getreptex "^f~] ^f2^"" (gettexname $getreptex) "^"^n^n") [ReplaceWith (+ $getreptex 0)]
            ][
                guitext "GET ^f4[~] ^"~^"" "action"
            ]
            guistrut 0.25
        ]

        //======================================================================================================================================================
    ]
]] 0 [
    if (|| [=s (gettexname $ReplaceMe) ""] [=s (gettexname $ReplaceWith) ""]) [
        ReplaceMe   1
        ReplaceWith 1
    ]
]
