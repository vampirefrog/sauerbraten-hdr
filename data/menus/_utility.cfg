//##############################################################################################################################################################
//##############################################################################################################################################################
// "Free" in the sense that it is not shackled by an oppressive table.
//    arg1: FLOAT   Column Width
//    arg2: INT     Column Align        -2: NoAlign  -1: Left  0: Center  1: Right
//    arg3: [LIST]  [Column Contents]
//      ** Repeat, up to 6 columns. **
guifreerow = [
    guilist [
        if (>= $numargs  3) [guilist [guistrut $arg1  1; if (= $arg2  -2) [@arg3 ][guialign $arg2  [@arg3 ]] ]]
        if (>= $numargs  6) [guilist [guistrut $arg4  1; if (= $arg5  -2) [@arg6 ][guialign $arg5  [@arg6 ]] ]]
        if (>= $numargs  9) [guilist [guistrut $arg7  1; if (= $arg8  -2) [@arg9 ][guialign $arg8  [@arg9 ]] ]]
        if (>= $numargs 12) [guilist [guistrut $arg10 1; if (= $arg11 -2) [@arg12][guialign $arg11 [@arg12]] ]]
        if (>= $numargs 15) [guilist [guistrut $arg13 1; if (= $arg14 -2) [@arg15][guialign $arg14 [@arg15]] ]]
        if ( = $numargs 18) [guilist [guistrut $arg16 1; if (= $arg17 -2) [@arg18][guialign $arg17 [@arg18]] ]]
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//  This generates a full gui with:  Map List, Map Screenshot, GameMode Selection
//  Do not call more than once in a gui.
//    arg1: INT     Column Width
//    arg2: INT     Maps PerColumn
//    arg3: INT     Columns PerTab
//    arg4: STRING  MapList Tab Label
//    arg5: [LIST]  MapList
//      ** Repeat, up to 6 MapLists. **
guimaplist = [
    ML_CurrentTab 0
    if (>= $numargs  5) [GUI__MapList $arg1 $arg2 $arg3   $arg4  $arg5]
    if (>= $numargs  7) [GUI__MapList $arg1 $arg2 $arg3   $arg6  $arg7]
    if (>= $numargs  9) [GUI__MapList $arg1 $arg2 $arg3   $arg8  $arg9]
    if (>= $numargs 11) [GUI__MapList $arg1 $arg2 $arg3  $arg10 $arg11]
    if (>= $numargs 13) [GUI__MapList $arg1 $arg2 $arg3  $arg12 $arg13]
    if ( = $numargs 15) [GUI__MapList $arg1 $arg2 $arg3  $arg14 $arg15]
]

nodebug [
    defvar  ML_NumOfMaps -1 0 16384
    defvar  ML_NumOfCols  0 0   512
    defvar  ML_MapsPerTab 0 0   512
    defvar  ML_NumOfTabs  0 0   256

    defvar  ML_CurrentTab 0 0   256   //  Current tab being rendered, not current tab being viewed.

    defvar  ML_ModeType -1 0     7
    defvar  ML_ModeVrty  0 0     3
    defvar  ML_Mode     -3 1    22
    defvar  ML_ModeMaps  0 0     2
    defsvar ML_ModeName  "coop"

    defsvar ML_MapName ""
]

GUI__MapList = [
    ML_NumOfMaps  (- (listlen $arg5) 1) // List index starts at 0.
    ML_NumOfCols  (+ (ceil (divf (+ $ML_NumOfMaps 1) $arg2)))
    ML_MapsPerTab (* $arg2 $arg3)
    ML_NumOfTabs  (max (+ (ceil (divf $ML_NumOfCols $arg3))) 1)

    loop iTab $ML_NumOfTabs [
        ML_CurrentTab (+ $ML_CurrentTab 1)

        cond [&& [= $iTab 0][> $ML_CurrentTab 1]][ guitab $arg4
            ][    > $iTab 0                     ][ guitab (+ $iTab 1) ]

        //======================================================================================================================================================
        //  Is this the active Tab?  If so, populate.
        if (= $ML_CurrentTab $guitabnum) [
            iMap = (* $iTab $ML_MapsPerTab)

            guialign 0 [// H
                guistrut $arg2 1
                if (< $ML_NumOfMaps 0) [
                    //  Map list is empty.
                    guilist [// V
                        guistrut (*f $arg1 $arg3) 1
                        guialign 0 [guitext "^f4~" 0]
                    ]
                ][
                    iCol = 1
                    while [<= $iCol $arg3] [
                        guilist [// V
                            guistrut $arg1 1
                            iEND = (+ (* $iTab $ML_MapsPerTab) (- (* $iCol $arg2) 1))
                            while [<= $iMap $iEND] [
                                if (> $iMap $ML_NumOfMaps) [
                                    iMap = (+ $iEND 1) // exitloop/break
                                ][
                                    guibutton (at $arg5 $iMap) (concatword "mode " $ML_Mode "; map " (at $arg5 $iMap)) "cube"
                                    iMap = (+ $iMap 1)
                                ]
                            ]
                        ]
                        iCol = (+ $iCol 1)
                    ]
                ]
                guibar //---------------------------------------------------------------------------------------------------------------------------------------
                guistrut 0.5
                guistayopen [
                    guilist [// V
                        if (>= (strstr $guirolloveraction "map ") 0) [
                            ML_MapName (checkrolloveraction "map " [if (> $numargs 0) [result $arg5] [at $guirollovername 0]])
                        ]
                        guialign 0 [// H
                            guiimage (concatword "packages/base/" $ML_MapName ".jpg") () 3.875 0 "data/cube.png"
                        ]
                        guititle (concatword "^f2/" $ML_ModeName " ^f~" $ML_MapName)
                        guistrut 0.25
                        guialign 0 [// H
                            guilist [// V
                                guistrut 9 1
                                guiradio "^f3DM"       ML_ModeType 1 [ML__SetupMode]
                                guiradio "^f3TDM"      ML_ModeType 2 [ML__SetupMode]
                                guiradio "^f6Capture"  ML_ModeType 3 [ML__SetupMode]
                                guiradio "^f6Hold"     ML_ModeType 4 [ML__SetupMode]
                                guiradio "^f2CTF"      ML_ModeType 5 [ML__SetupMode]
                                guiradio "^f2Protect"  ML_ModeType 6 [ML__SetupMode]
                                guiradio "^f2Collect"  ML_ModeType 7 [ML__SetupMode]
                                guiradio "^f0CoopEdit" ML_ModeType 0 [ML__SetupMode]
                            ]
                            guistrut 1
                            guilist [// V
                                guistrut 9.5 1
                                cond [<= $ML_ModeType 0][ //  DMSP & Coopedit
                                    guitext "^f7Normal" "radio_on"
                                    guistrut 5
                                ][<= $ML_ModeType 2][
                                    guiradio  "^f7Normal"     ML_ModeVrty 0 [ML__SetupMode]
                                    guiradio  "^f8InstaGib"   ML_ModeVrty 1 [ML__SetupMode]
                                    guiradio  "^f1Efficiency" ML_ModeVrty 2 [ML__SetupMode]
                                    guiradio  "^f5Tactics"    ML_ModeVrty 3 [ML__SetupMode]
                                    guistrut 2
                                ][ = $ML_ModeType 3][
                                    guiradio  "^f7Normal"     ML_ModeVrty 0 [ML__SetupMode]
                                    guibutton "^f8Regen"      [if (< $ML_ModeVrty 1) [ML_ModeVrty 1; ML__SetupMode]] (if (>= $ML_ModeVrty 1) [result "radio_on"] [result "radio_off"])
                                    guistrut 4
                                ][>= $ML_ModeType 4][
                                    guiradio  "^f7Normal"     ML_ModeVrty 0 [ML__SetupMode]
                                    guiradio  "^f8InstaGib"   ML_ModeVrty 1 [ML__SetupMode]
                                    guibutton "^f1Efficiency" [if (< $ML_ModeVrty 2) [ML_ModeVrty 2; ML__SetupMode]] (if (>= $ML_ModeVrty 2) [result "radio_on"] [result "radio_off"])
                                    guistrut 3
                                ]
                                if (! (ingamemp)) [
                                    guiradio "DMSP" ML_ModeType -1 [ML__SetupMode]
                                    guibutton "SP" [showgui "campaign"]
                                ]
                            ]
                        ]
                    ]
                ]
            ]
        ]
        //======================================================================================================================================================
    ]
]

ML__SetupMode = [
    case ($ML_ModeType) -1         [ML_Mode -2; ML_ModeMaps 0; ML_ModeName "dmsp"         // -1 "DMSP"
    ] 0                            [ML_Mode  1; ML_ModeMaps 0; ML_ModeName "coop"         //  0 "CoopEdit"
    ] 1 [case   ($ML_ModeVrty) 0   [ML_Mode  0; ML_ModeMaps 0; ML_ModeName "ffa"          //  1 "DM"
                             ] 1   [ML_Mode  3; ML_ModeMaps 0; ML_ModeName "insta"
                             ] 2   [ML_Mode  5; ML_ModeMaps 0; ML_ModeName "effic"
                             ] 3   [ML_Mode  7; ML_ModeMaps 0; ML_ModeName "tac"]
    ] 2 [case   ($ML_ModeVrty) 0   [ML_Mode  2; ML_ModeMaps 0; ML_ModeName "teamplay"     //  2 "TDM"
                             ] 1   [ML_Mode  4; ML_ModeMaps 0; ML_ModeName "instateam"
                             ] 2   [ML_Mode  6; ML_ModeMaps 0; ML_ModeName "efficteam"
                             ] 3   [ML_Mode  8; ML_ModeMaps 0; ML_ModeName "tacteam"]
    ] 3 [cond [=  $ML_ModeVrty 0]  [ML_Mode  9; ML_ModeMaps 1; ML_ModeName "capture"      //  3 "Capture"
             ][>= $ML_ModeVrty 1]  [ML_Mode 10; ML_ModeMaps 1; ML_ModeName "regencapture"]
    ] 4 [cond [=  $ML_ModeVrty 0]  [ML_Mode 15; ML_ModeMaps 1; ML_ModeName "hold"         //  4 "Hold"
             ][=  $ML_ModeVrty 1]  [ML_Mode 16; ML_ModeMaps 1; ML_ModeName "instahold"
             ][>= $ML_ModeVrty 2]  [ML_Mode 19; ML_ModeMaps 1; ML_ModeName "effichold"]
    ] 5 [cond [=  $ML_ModeVrty 0]  [ML_Mode 11; ML_ModeMaps 2; ML_ModeName "ctf"          //  5 "CTF"
             ][=  $ML_ModeVrty 1]  [ML_Mode 12; ML_ModeMaps 2; ML_ModeName "instactf"
             ][>= $ML_ModeVrty 2]  [ML_Mode 17; ML_ModeMaps 2; ML_ModeName "efficctf"]
    ] 6 [cond [=  $ML_ModeVrty 0]  [ML_Mode 13; ML_ModeMaps 2; ML_ModeName "protect"      //  6 "Protect"
             ][=  $ML_ModeVrty 1]  [ML_Mode 14; ML_ModeMaps 2; ML_ModeName "instaprotect"
             ][>= $ML_ModeVrty 2]  [ML_Mode 18; ML_ModeMaps 2; ML_ModeName "efficprotect"]
    ] 7 [cond [=  $ML_ModeVrty 0]  [ML_Mode 20; ML_ModeMaps 2; ML_ModeName "collect"      //  7 "Collect"
             ][=  $ML_ModeVrty 1]  [ML_Mode 21; ML_ModeMaps 2; ML_ModeName "instacollect"
             ][>= $ML_ModeVrty 2]  [ML_Mode 22; ML_ModeMaps 2; ML_ModeName "efficcollect"]
    ]
]
