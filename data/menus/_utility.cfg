reui = [
    clearconsole
    exec "data/menus.cfg"
    echo "^f2*** Menus Reinitialized ***  ^f6This is for testing; it will break stuff; ^f3delete ^"config.cfg^" after use."
]


//##############################################################################################################################################################
//##############################################################################################################################################################
//  These are hard-coded aliases that are updated upon mouse rollover:
guirollovername          = "" //  Name           updated upon rollover  GuiButton
guirolloveraction        = "" //  Action         updated upon rollover  GuiButton
guirolloverimgpath       = "" //  ImgPath        updated upon rollover  GuiImage
guirolloverimgaction     = "" //  ImgAction      updated upon rollover  GuiImage
guirolloverpreviewname   = "" //  PreviewName    updated upon rollover  GuiModelPreview  &  GuiPrefabPreview
guirolloverpreviewaction = "" //  PreviewAction  updated upon rollover  GuiModelPreview  &  GuiPrefabPreview

checkrolloveraction = [
    if (>= (strstr $guirolloveraction $arg1) 0) [
        if (>= $numargs 2) [arg2] [result $guirolloveraction]
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
togglegui = [
    if (|| [cleargui] [cleartexgui]) [
        //  If any GUI is currently visible, then just cleargui.
    ][
        showgui $arg1
    ]
]

toggleeditgui = [
    if $arg2 [
        //  For edit GUIs that are still functional while not editing:
        if (|| [= $getmode 1] [! (ingamemp)]) [
            if (&& (! $arg3) [|| [cleargui] [cleartexgui]]) [
                //  If any GUI is currently visible, then just cleargui.
            ][
                showgui $arg1
            ]
        ][
            error "must be offline or in coopedit or to use this menu"
        ]
    ][
        if $editing [
            if (&& (! $arg3) [|| [cleargui] [cleartexgui]]) [
                //  If any GUI is currently visible, then just cleargui.
            ][
                if (=s $arg1 "showtexgui") [showtexgui][showgui $arg1]
            ]
        ][
            error "must be editing to use this menu"
        ]
    ]
]

guieditingcheck = [|| [&& [$editing] [ingame]] [cleargui]]


//##############################################################################################################################################################
//##############################################################################################################################################################
//    arg1: STRING  Identifier for row index
//    arg2: INT     Number of Columns
//    arg3: [LIST]  Row items
//    arg4: [LIST]  Column contents
//    arg5: [LIST]  Column separator
//    arg6: [LIST]  Column header
guilistsplit = [
    guilist [
        RowsPerColumn = (div (+ (listlen $arg3) (- $arg2 1)) $arg2)
        loop iCol $arg2 [
            guilist [
                if (>= $numargs 6) [arg6]
                loopsublist $arg1 $arg3 (* $iCol $RowsPerColumn) $RowsPerColumn [arg4]
            ]
            if (&& (>= $numargs 5) (< (+ $iCol 1) $arg2)) [arg5]
        ]
    ]
]


