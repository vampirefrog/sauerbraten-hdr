newgui "testpadding" [
    guinoautotab [
        guiimage "packages/textures/razgriz/black.png" [] 6
    guitab "IW"
        guiimage "packages/textures/razgriz/white.png" [] 6
    guitab "IP"
        guiimage "packages/textures/steep_fur_n.png" [] 6
    guitab "BH"
        // H                        V                         H-bar
        guilist [ guistrut  5 1; guialign -1 [guistrut 24 1; guibar] ]
        guilist [ guistrut  2 1; guialign  0 [guistrut 24 1; guibar] ]
        guilist [ guistrut  5 1; guialign  1 [guistrut 24 1; guibar] ]
    guitab "BV"
        guilist [//H
            // V                        H                         V-bar
            guilist [ guistrut 10 1; guialign -1 [guistrut 12 1; guibar] ]
            guilist [ guistrut  4 1; guialign  0 [guistrut 12 1; guibar] ]
            guilist [ guistrut 10 1; guialign  1 [guistrut 12 1; guibar] ]
        ]
    ]
] "IB"
