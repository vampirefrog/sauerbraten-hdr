
nodebug [
    deffvar GUI_Editing_Width  1 83 0 // in units of (fontscale Width )
    deffvar GUI_Editing_Height 1 23 0 // in units of (fontscale Height)

    defvar  EDT_NewMap_Size  10 10 16
    defsvar EDT_SaveMap_Name "untitled"
    defsvar EDT_MapTitle ""

    defsvar WayPointFile ""
]

newgui "editing" [
    guiscale 0.7
    guikeeptab 1
    guinoautotab [guistayopen [
    //##########################################################################################################################################################
    //##########################################################################################################################################################
    if (= $guitabnum 1) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1

                guibutton "toggle edit mode^t^t^f2[E]"  [edittoggle]
                guibar //-------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guistrut 41.5 1
                        guitext "select^t^t^t^t^f2[MouseLeft ^f6drag^f2]"
                        guitext "extend selection^t^t^f2[MouseRight]"
                        guitext "move selection^t^t^t^f2[MouseRight ^f6drag^f2]"
                        guitext "deselect^t^t^t^t^f2[SPACE]"
                        guitext "select all ents in box^t^f2[NumPad-ENTER]"
                    ]
                    guilist [// V
                        guitext "select corners^t^t^t^f2[MouseMiddle ^f6drag^f2]"
                        guitext "reorient selection^t^t^f2[MouseRight]"
                        guitext "passthrough^t^t^t^f2[LCTRL ^f6hold^f2]"
                        guitext "center view on ent^t^t^f2[, + MouseWheel]"
                        guitext "select all matching ents^t^f2[N]"
                    ]
                ]
                guibar //-------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guistrut 41.5 1
                        guitext "push/pull cubes^t^t^f2[MouseWheel]"
                        guitext "change gridsize^t^t^f2[G + MouseWheel]"
                        guitext "flip/mirror cubes^t^t^f2[X]"
                    ]
                    guilist [// V
                        guitext "push/pull cube face^t^t^f2[F + MouseWheel]"
                        guitext "push/pull cube corner^t^f2[Q + MouseWheel]"
                        guitext "rotate cubes^t^t^t^f2[R + MouseWheel]"
                    ]
                ]
                guibar //-------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guistrut 41.5 1
                        guitext "copy^t^t^t^t^t^f2[C]"
                        guitext "delete^t^t^t^t^f2[Delete]"
                    ]
                    guilist [// V
                        guitext "paste^t^t^t^t^f2[V]"
                    ]
                ]
                guibar //-------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guistrut 41.5 1
                        guitext "undo^t^t^t^t^t^f2[U] [Z]"
                    ]
                    guilist [// V
                        guitext "redo^t^t^t^t^t^f2[I]"
                    ]
                ]
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guitext "undo size:"
                    ]
                    guilist [// V
                        guistrut 71 1
                        guilistslider undomegs [1 2 3 4 6 8 12 16 20 24 32 40 48 56 64 72 80 88 96 100]
                        guilist [// H
                            guitext "^f9(in megabytes)" 0
                            guispring
                            guitext "^f9(default 8)" 0
                        ]
                    ]
                ]
                guibar //-------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guistrut 41.5 1
                        guibutton "cube material volumes^t^f2/materialgui"           [showgui "editmat"] "menu"
                    ]
                    guilist [// V
                        guibutton "cube prefab browser^t^f2[Insert] /browse_prefabs" [showgui "prefabs"] "menu"
                    ]
                ]
                guibar //-------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guistrut 41.5 1
                        guicheckbox "toggle outline^t^t^t^f2[7]" outline
                    ]
                    guilist [// V
                        guicheckbox "toggle wireframe"           wireframe
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "texture"
    if (= $guitabnum 2) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1

                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                    ]
                    guilist [
                        guistrut 28 1
                        guitext "change texture^t^t^t^f2[Y + MouseWheel]"

                        guistrut 0.5
                        guibutton "texture browser^t^t^f2[F2]^t^t/browse_textures" [showtexgui] "menu"

                        guistrut 0.75
                        guicheckbox "texture all faces^t^t^f2[6]" allfaces
                    ]

                ]
                guistrut 0.5
                guibar //-------------------------------------------------------------------------
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [// H
                            guitext "parameters: " 0
                        ]
                    ]
                    guilist [// V
                        guistrut 28 1
                        guifreerow 22 -2 [ guitext "offset on X by 8px"
                                 ] 20 -2 [ guitext "^f2[1 + MouseWheel]" 0
                                 ]  0 -2 [ guitext "^tby 1px^t^f2[+ALT]" 0
                        ]
                        guifreerow 22 -2 [ guitext "offset on Y by 8px"
                                 ] 20 -2 [ guitext "^f2[2 + MouseWheel]" 0
                                 ]  0 -2 [ guitext "^tby 1px^t^f2[+ALT]" 0
                        ]
                        guistrut 0.25
                        guifreerow 22 -2 [ guitext "rotate-by-90 and/or flip"
                                 ] 20 -2 [ guitext "^f2[3 + MouseWheel]" 0
                        ]
                        guistrut 0.25
                        guifreerow 22 -2 [ guitext "scale half/double"
                                 ] 20 -2 [ guitext "^f2[4 + MouseWheel]" 0
                                 ]  0 -2 [ guitext "^f~ -/+ by 1/16^t^f2[+ALT]" 0  //  1/16 = 0.0625
                        ]

                        guistrut 1
                        guibutton "vcolor editor^t^t^t^t^t^f2/vcolorgui"            [showgui "vcolor"]
                        guistrut 0.25
                        guibutton "vshaderparam editor^t^t^t^f2/vshaderparamgui"    [showgui "vshaderparam"]

                        guistrut 1
                        guibutton "reset all parameters^t^t^t^f2/vreset"            [vreset]
                    ]
                ]
                guistrut 0.5
                guibar //-------------------------------------------------------------------------
                guistrut 0.35
                guilist [// H
                    guistrut 12
                    guibutton "texture slot manager^t^f2[F8]^t^t/manage_textureslots" [showgui "texslotmanager"]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "entity"
    if (= $guitabnum 3) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1

                guistrut 0.25
                guilist [// H
                    guistrut 12
                    guilist [// V
                        guistrut 32 1
                        guibutton "create new entity^t^t^t^t^f2/newentgui"             [showgui "newent"]
                        guistrut 0.5
                        guibutton "mapmodel browser^t^t^f2[F4]^t^t/browse_mapmodels" [showgui "mapmodels"]
                    ]
                ]

                guistrut 0.5
                guibar //-------------------------------------------------------------------------
                guistrut 0.25
                guilist [// H
                    guistrut 12
                    guilist [// V
                        guistrut 32 1
                        guicheckbox "entity selection^t^t^f2[8]"     entediting
                        guicheckbox "entity snap-to-grid^t^t^f2[9]"  entselsnap
                    ]
                    guilist [
                        guicheckbox "new entities take yaw from camera  ^f2[0]"  entcamdir
                    ]
                ]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [// H
                            guitext "entdrop: " 0
                        ]
                    ]
                    guilist [// V
                        guistrut 32 1
                        guiradio "^f9(2) ^f~at selection"                       entdrop 2
                        guiradio "^f9(3) ^f~at selection, to the floor"         entdrop 3
                    ]
                    guilist [// V
                        guiradio "^f9(0) ^f~at current position"                entdrop 0
                        guiradio "^f9(1) ^f~at current position, to the floor"  entdrop 1
                    ]
                ]

                guistrut 0.5
                guibar //-------------------------------------------------------------------------
                guistrut 0.25
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [// H
                            guitext "attributes: " 0
                        ]
                    ]
                    guilist [// V
                        guistrut 32 1
                        guitext "change attr1 by 1^t^t^f2[1 + MouseWheel]^t^t^f~by 10 ^f2[+ALT]"
                        guitext "change attr2 by 1^t^t^f2[2 + MouseWheel]^t^t^f~by 10 ^f2[+ALT]"
                        guitext "change attr3 by 1^t^t^f2[3 + MouseWheel]^t^t^f~by 10 ^f2[+ALT]"
                        guitext "change attr4 by 1^t^t^f2[4 + MouseWheel]^t^t^f~by 10 ^f2[+ALT]"
                        guitext "change attr5 by 1^t^t^f2[5 + MouseWheel]^t^t^f~by 10 ^f2[+ALT]"
                    ]
                ]

                guistrut 1
                guilist [// H
                    guistrut 12
                    guilist [// V
                        guistrut 32 1
                        guibutton "edit selected entity ^t^f2[F3]"  showentgui
                    ]
                    guilist [// V
                        guibutton "edit selected entity in console ^t^f2[.]"  selentedit
                    ]
                ]

                guistrut 0.5
                guibar //-------------------------------------------------------------------------
                guistrut 0.35
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                    ]
                    guilist [// V
                        guistrut 28 1
                        guibutton "entity manager ^t^t^f2[F7]^t^t/manage_entities" [showgui "entitymanager"]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "height/blend"
    if (= $guitabnum 4) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1
                guialign 0 [// H
                    guilist [// V
                        guititle "heightmap"
                        guistrut 0.5

                        guilist [// H
                            guilist [// V
                                guistrut 41 1
                                guitext "toggle heightmap mode^t^t^f2[H]"
                                guistrut 0.25
                                guitext "push/pull heightmap^t^t^t^f2[MouseWheel]"
                            ]
                            guilist [// V
                                guistrut 41 1
                                guistrut 1.25
                                guitext "select heightmap brush^t^t^f2[B + MouseWheel]"
                            ]
                        ]
                    ]
                ]

                guistrut 1
                guibar //---------------------------------------------------------------------------
                guialign 0 [// H
                    guilist [// V
                        guititle "blendmap"
                        guilist [// H
                            guilist [// V
                                guistrut 41 1
                                guitext "set paint mode:"
                                guilist [// H
                                    guistrut 4
                                    guilist [// V
                                        guiradio (concatword "^f9(0)^f~ " (at $Labels_BlendPaintMode 0) "^t^t^t^t^f2[NumPad 0]")  blendpaintmode 0; guistrut 0.125
                                        guiradio (concatword "^f9(2)^f~ " (at $Labels_BlendPaintMode 2) "^t^t^t^t^f2[NumPad 1]")  blendpaintmode 2; guistrut 0.125
                                        guiradio (concatword "^f9(5)^f~ " (at $Labels_BlendPaintMode 5) "^t^t^t^t^f2[NumPad 2]")  blendpaintmode 5
                                    ]
                                ]
                            ]
                            guilist [// V
                                guistrut 41 1
                            ]
                        ]

                        guistrut 1
                        guilist [// H
                            guilist [// V
                                guistrut 41 1
                                guitext "paint^t^t^t^t^t^t^f2[MouseLeft]"
                                guistrut 0.25
                                guitext "rotate brush^t^t^t^t^f2[MouseRight]"
                            ]
                            guilist [// V
                                guistrut 41 1
                                guitext "change brush^t^t^t^t^f2[MouseWheel]"
                            ]
                        ]

                        guistrut 1
                        guilist [// H
                            guilist [// V
                                guistrut 41 1
                                guibutton "reveal blendmap^t^t^t^f2[NumPad 3]" [clearlightmaps; showblendmap]
                            ]
                            guilist [// V
                                guistrut 41 1
                                guibutton "clear entire blendmap^t^t^f2/clearblendmap"        [clearblendmap]
                                guistrut 0.5
                                guibutton "clear blendmap in selection^t^f2/clearblendmapsel" [clearblendmapsel]
                            ]
                        ]

                        //guistrut 3
                        //guialign 0 [
                        //    guitext "^f5moveblendmap X Y" 0
                        //]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "mapvars"
    if (= $guitabnum 5) [
        guialign 0 [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1
                guialign 0 [// H
                    guilist [// V
                        guistrut 58 1

                        guistrut 0.5
                        guibutton "lighting^t^t^f2/maplighting" [toggleeditgui "map_lighting" 1 1] "menu"

                        guistrut 0.5
                        guibutton "misc^t^t^t^f2/mapmisc"       [toggleeditgui "map_misc"     1 1] "menu"

                        guistrut 0.5
                        guibutton "sky^t^t^t^f2/mapsky"         [toggleeditgui "map_sky"      1 1] "menu"
                    ]
                ]

                guistrut 0.5
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------
                guialign 0 [// H
                    guilist [// V
                        guistrut 58 1
                        guititle "maptitle"

                        guistrut 0.5
                        guialign 0 [// H
                            guitext $maptitle 0
                        ]

                        guistrut 0.5
                        guialign 0 [// H
                            guifield EDT_MapTitle 57
                        ]

                        guistrut 0.5
                        guialign 0 [// H
                            guibutton "get" [EDT_MapTitle (escape $maptitle)]
                            guistrut 8
                            guibutton "set" [maptitle @EDT_MapTitle]
                        ]

                        guistrut 1
                        guibutton "edit maptitle in console" [saycommand (concatword "/maptitle " (escape $maptitle))]
                    ]
                ]

            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "waypoints"
    if (= $guitabnum 6) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1

                guistrut 0.5
                WayPointFile (concatword (? $mapname $mapname "untitled") ".wpt")
                guifreerow 18  1 [ guitext "load: " 0
                         ]  0 -2 [ guibutton (concatword (? (findfile (concatword "packages/base/" $WayPointFile)) "" "^f4")  "^"" $WayPointFile "^"") [loadwaypoints]
                ]

                guistrut 1
                guifreerow 18  1 [ guitext "save: " 0
                         ]  0 -2 [ guibutton (concatword "^"" $WayPointFile "^"") [savewaypoints]
                ]

                guistrut 0.75
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------

                guistrut 0.5
                guilist [// H
                    guistrut 18
                    guilist [// V
                        guibutton "clear ALL waypoints ^t^t^t^t^f2/clearwaypoints" [clearwaypoints]
                        guistrut 1
                        guibutton "clear waypoints inside selection box ^t^f2/delselwaypoints" [delselwaypoints]
                    ]
                ]

                guistrut 0.75
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------

                guistrut 0.5
                guilist [// H
                    guistrut 18
                    guilist [// V
                        guicheckbox "show ^t^f2[-]^t^t/showwaypoints" showwaypoints
                        guistrut 0.5
                        guicheckbox "drop ^t^f2[=]^t^t/dropwaypoints" dropwaypoints
                    ]
                ]

                guistrut 1
                guifreerow 18  1 [ guitext "view distance: " 0
                         ] 64 -2 [ guinameslider showwaypointsradius ["inf" "256" "512" "768" "1024" "2048" "4096" "8192"] [0 256 512 768 1024 2048 4096 8192]
                ]
            ]
        ]
    ]

//delselwaypoints   Delete waypoints inside selection box.  Waypoints cannot be directly selected.  Nor are they visible, they exist at the ends of the particle lines.

//movewaypoints INT INT INT


    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "map"
    if (= $guitabnum 7) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1

                guifreerow 18  1 [ guitext "newmap: " 0
                         ] 12 -2 [ guitext "scale:"
                         ] 45 -2 [ guislider EDT_NewMap_Size 10 16
                ]
                guifreerow 18 -2 [
                         ] 12 -2 [ guitext "size:"
                         ] 45 -2 [ guinameslider EDT_NewMap_Size ["1024" "2048" "4096" "8192" "16384" "32768" "65536"] [10 11 12 13 14 15 16] []
                ]
                guistrut 0.5
                guilist [// H
                    guistrut 18
                    guibutton "start newmap" [newmap $EDT_NewMap_Size]
                ]

                guistrut 0.5
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------
                guifreerow 18  1 [ guitext "savemap: " 0
                         ]  1 -2 [ guistayopen [ guibutton (concatword "save ^"" (? $mapname $mapname "untitled") ".ogz^"") [savemap] ]
                ]
                guistrut 0.5
                guifreerow 18 -2 [
                         ]  1 -2 [ guistayopen [ guibutton "save as: " [savemap $EDT_SaveMap_Name] ]
                         ]  1 -2 [ guifield EDT_SaveMap_Name 48
                ]

                guistrut 0.5
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------
                guilist [// H
                    guilist [// V
                        guifreerow 18  1 [ guitext "mapscale: " 0
                                 ]  1 -2 [ guitext (concatword "^f2" $mapscale " (" $mapsize ")") 0
                        ]
                        guistrut 0.5
                        guifreerow 18  1 [ guitext "resize: " 0
                                 ]  1 -2 [ guistayopen [ guibutton "increase mapsize (double)" mapenlarge ]
                        ]
                        guistrut 0.25
                        guifreerow 18 -2 [
                                 ] 24 -2 [ guistayopen [ guibutton "decrease mapsize (half)" shrinkmap ]
                                 ]  1 -2 [ guitext "^f9(shrunk area must be empty)" 0
                        ]
                    ]
                    //guilist [// V
                    //    guitext (concat "mapversion: ^f2" $mapversion) 0
                    //]
                ]

                guistrut 0.5
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------
                guifreerow 18 -2 [
                         ] 24 -2 [ guistayopen [ guibutton "^f2/remip" remip ]
                         ]  1 -2 [ guitext "^f9(optimize: octree, triangulation)" 0
                ]
                guistrut 0.5
                guifreerow 18 -2 [
                         ] 24 -2 [ guistayopen [ guibutton "^f2/recalc" recalc ]
                         ]  1 -2 [ guitext "^f9(regenerate: envmaps, minimap, texslotUVs, etc)" 0
                ]

                guistrut 0.5
                guibar //---------------------------------------------------------------------------------------------------------------------------------------------------
                guilist [// H
                    guistrut 18
                    guilist [// V
                        guistayopen [
                            guibutton "reload map^t^t^f2/reloadmap"         [reloadmap]
                            guistrut 0.5
                            guibutton "reload map config^t^f2/reloadmapcfg" [reloadmapcfg]
                        ]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "map.cfg"
    if (= $guitabnum 8) [
        guilist [// H
            guistrut $GUI_Editing_Height 1
            guilist [// V
                guistrut $GUI_Editing_Width 1

                guitext (mapcfgname)
                guistrut 0.25
                guitexteditor (mapcfgname) -80 20
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    ]]
] "editing" [
    EDT_SaveMap_Name $mapname
]
