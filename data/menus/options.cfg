//##############################################################################################################################################################
//##############################################################################################################################################################
GUI_Options_Video = [
    guistrut 0.25
    guifreerow 18 -2 [
             ] 12 -2 [ guicheckbox "fullscreen" fullscreen
             ]  1 -2 [ guicheckbox "use desktop resolution in fullscreen" fullscreendesktop
            //  "fullscreendesktop 1"
            //      When Fullscreen use: "desktopw" & "desktoph"  (these are readonly vars)
            //      When  Windowed  use:    "scr_w" &    "scr_h"
    ]

    guistrut 0.5
    guibar //===================================================================================================================================================
    //  Multiples of common monitor refresh rates:
    //      60/120/240 Hz [ 60 120 240 360 480 600 720 840 960 ]
    //              75 Hz [ 75 150 225 300 450 600 900 ]
    //              90 Hz [ 90 180 270 360 540 720 900 ]
    //             144 Hz [    144 288 432 576 720 864 ]
    //             165 Hz [    165 330 495 660 825 990 ]
    guistrut 0.25
    guifreerow 18  1 [ guitext "maxfps: " 0
             ] 36 -2 [ guilistslider maxfps [60 75 90 120 144 165 240 360 480 540 600 720 840 960]
             ] 12  1 [ guifield maxfps 10
    ]
    guistrut 0.25 //  "menufps" only applies if not in-game (logo with grey background).
    guifreerow 18  1 [ guitext "menufps: " 0
             ] 36 -2 [ guilistslider menufps [60 75 90 120 144 165 240 360 480 540 600 720 840 960]
             ] 12  1 [ guifield menufps 10
    ]

    guistrut 0.75
    guifreerow 18 -2 [
             ] 12 -2 [ guicheckbox "vsync" vsync
             ]  1 -2 [ guicheckbox (concatword (? (! $vsync) "^f4") "adaptive") vsynctear
    ]
    //  "Adaptive" vSync dynamically disables vsync if framerate drops below screen refresh-rate.
    //  For more info:
    //      https://wiki.libsdl.org/SDL2/SDL_GL_SetSwapInterval
    //      https://www.khronos.org/opengl/wiki/Swap_Interval#Adaptive_Vsync

    guistrut 0.5
    guibar //===================================================================================================================================================
    guifreerow 18  1 [ guitext "anti-aliasing: " 0
             ] 36 -2 [ guinameslider fsaa ["driver" "off" "2x" "4x" "8x" "16x"] [-1 0 2 4 8 16]
    ]

    guistrut 0.5
    guifreerow 18  1 [ guitext "mipmap anisotropy: " 0
             ] 36 -2 [ guinameslider aniso ["off" "2x" "4x" "8x" "16x"] [0 2 4 8 16]
    ]
    guistrut 0.125
    guifreerow 18 -2 [
             ] 36 -1 [ guicheckbox "trilinear^t^f9(mipmap-level blending)"  trilinear
    ]

    guistrut 0.75
    guifreerow 18  1 [ guitext "texture filtering: " 0
             ] 36 -1 [ guicheckbox "bilinear^t^f9(all textures: map, models, text, gui, etc.)"  bilinear
    ]
    guistrut 0.125
    guifreerow 18 -1 [
             ] 36 -1 [ guicheckbox (concatword (? (! $bilinear) "^f4") "bilinear^t" (? (! $bilinear) "^f4" "^f9")  "(map textures only)") reducefilter
    ]

    //guistrut 0.5
    //guifreerow 18  1 [ guitext "z-buffer depth: " 0
    //         ] 36 -2 [ guinameslider depthbits ["auto" "16bit" "24bit" "32bit"] [0 16 24 32]
    //]

    guistrut 0.5
    guibar //===================================================================================================================================================
    guifreerow 18  1 [ guitext "^f9horizontal ^f~fov: " 0
             ] 36 -2 [ guislider fov
             ] 12  0 [ guitext "^f9(default 100)" 0
    ]

    guistrut 0.5
    guifreerow 18  1 [ guitext "gamma: " 0
             ] 36 -2 [ guislider gamma
             ] 12  0 [ guitext "^f9(default 100)" 0
    ]
]


