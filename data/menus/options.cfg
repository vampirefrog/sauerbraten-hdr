GUI_Options_Game = [
    guifreerow 18  1 [ guitext "hit indication: " 0
             ] 14 -2 [ guicheckbox "hit crosshair"  hitcrosshair 425 0
             ]  1 -2 [ guicheckbox "hit sound"      hitsound
    ]

    guibar //===================================================================================================================================================
    guifreerow 18  1 [ guitext "respawn: " 0
             ] 14 -2 [ guicheckbox "press ^f2attack"  attackspawn
             ] 14 -2 [ guicheckbox "press ^f2jump"    jumpspawn
             ]  1 -2 [ if (&& (= $attackspawn 0) (= $jumpspawn 0)) [guitext (? (mod (div $getmillis 500) 2) "^f4use ^f6/bind KEY [respawn]" "^f~use ^f2/bind KEY [respawn]") 0]
    ]

    guibar //===================================================================================================================================================
    guifreerow 18  1 [ guitext "scoreboard: " 0
             ]  1 -2 [ guicheckbox "show upon death"  deathscore
    ]

    guistrut 0.5
    guifreerow 18  1 [ guitext "show/hide: " 0
             ] 15 -2 [ guicheckbox "server info"     showservinfo
             ] 15 -2 [ guicheckbox "connecting"      showconnecting
             ]  1 -2 [ guicheckbox "highlight self"  highlightscore
    ]
    guifreerow 18 -2 [
             ] 15 -2 [ guicheckbox "frags"      hidefrags 0 1
             ] 15 -2 [ guicheckbox "deaths"     showdeaths
             ]  1 -2 [ guicheckbox "client #"   showclientnum
    ]
    guifreerow 18 -2 [
             ] 12 -2 [ guitext "ping: "
             ]  9 -2 [ guiradio "off"                showping 0
             ]  9 -2 [ guiradio "ping"               showping 1
             ]  1 -2 [ guiradio "ping & packetjump"  showping 2
    ]
    guifreerow 18 -2 [
             ]  1 -2 [ guicheckbox "packetjump"  showpj
    ]
    guifreerow 18 -2 [
             ] 15 -2 [ guicheckbox "spectators" showspectators
             ]  1 -2 [ guicheckbox "spectator ping" showspectatorping
    ]

    guistrut 0.5
    guifreerow 18  1 [ guitext "tie sort: " 0
             ] 15 -2 [ guiradio "0?"  tiesort 0 // ?
             ] 15 -2 [ guiradio "1?"  tiesort 1 // Self   always first?  Regarless of tie?        Tie with: teammate|enemy|enemy-team  ??
             ]  1 -2 [ guiradio "2?"  tiesort 2 // Others always first?  Regarless of tie?
    ]

    guibar //===================================================================================================================================================
    guifreerow 18  1 [ guitext "player models: " 0
             ] 27 -2 [ guicheckbox "force matching models" forceplayermodels
             ]  1 -2 [ guicheckbox "always use team skins" teamskins
    ]
    guifreerow 18  1 [ guitext "fullbright: " 0 //guicheckbox "fullbright" fullbrightmodels 60 0
             ]  6 -1 [ guiradio (concatword (? (!= $fullbrightmodels 0) "^f4" "^f4") "off"    ) fullbrightmodels   0
             ]  8 -1 [ guiradio (concatword (? (!= $fullbrightmodels 0) "^f5" "^f4") "subtle" ) fullbrightmodels  60
             ]  8 -1 [ guiradio (concatword (? (!= $fullbrightmodels 0) "^f1" "^f4") "bright" ) fullbrightmodels 100
             ]  9 -1 [ guiradio (concatword (? (!= $fullbrightmodels 0) "^f8" "^f4") "intense") fullbrightmodels 150
             ]  1 -1 [ guiradio (concatword (? (!= $fullbrightmodels 0) "^f7" "^f4") "max"    ) fullbrightmodels 200
    ]

    guibar //===================================================================================================================================================
    guifreerow 18  1 [ guitext "violence: " 0
             ]  1 -2 [ guicheckbox "blood"  blood
    ]
    guifreerow 18 -2 [
             ] 12 -2 [ guitext "hide dead:"
             ]  9 -2 [ guiradio "off"          hidedead 0
             ]  9 -2 [ guiradio "all"          hidedead 1
             ]  1 -2 [ guiradio "enemies only" hidedead 2
    ]
    guifreerow 18 -2 [
             ] 18 -2 [ guicheckbox (concatword (? (= $hidedead 1) "^f4" "") "ragdoll deaths") ragdoll
             ]  1 -2 [ guicheckbox (concatword (? (|| (= $hidedead 1) (= $ragdoll 0)) "^f4" "") "keep after respawn") ragdollmillis 10000 0
    ]
    guifreerow 18 -2 [
             ] 18 -2 [ guitext (concatword (? (|| (= $hidedead 1) (= $ragdoll 0)) "^f4" "") "velocity multiplier:")
             ] 30 -2 [ guislider deadpush
    ]

    guibar //===================================================================================================================================================
    guifreerow 18 -2 [
             ]  1 -2 [ guibutton "^f6restore defaults (clears ALL settings)" [showgui "options_restore"]
    ]
]

newgui "options_restore" [
    guistrut 28 1
    guialign 0 [guitext "^f7restore defaults, are you sure?" 0 ]
    guialign 0 [guitext "^f6(clears ALL settings)" 0 ]
    guistrut 1
    guialign 0 [
        guibutton "^f2restore" [exec "restore.cfg"; cleargui]
        guistrut 5
        guibutton "^f7cancel" [cleargui 1]
    ]
] 0


