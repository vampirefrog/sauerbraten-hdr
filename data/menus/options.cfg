//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    deffvar MouseAimSens 0.001 1.0 1000.0
]
BindActions = [
    "forward" "backward" "left" "right" "jump" "attack" "togglezoom"
    "saycommand" "sayteamcommand" "showscores" "toggleconsole" "screenshot" "edittoggle"
    "setweapon FI" "setweapon SG" "setweapon CG" "setweapon RL" "setweapon RI" "setweapon GL" "setweapon PI" "weapon"
    "delta_do 1" "delta_do -1" "dropflag" "addbot" "delbot"
]

GUI_Options_Input = [
    guititle "mouse"
    guistrut 0.5
    guistayopen [
        MouseAimSens $sensitivity
        guifreerow 21    -2 [ guitext "aim sensitivity:"
                 ]  6.5  -2 [ guifield MouseAimSens 5 [sensitivity $MouseAimSens]
                 ]  2    -2 [ guibutton "" [sensitivity (+fround $sensitivity -0.1)]  "val_dec"
                 ]  4.35 -2 [ guibutton "" [sensitivity (+fround $sensitivity  0.1)]  "val_inc"
                 ]  1    -2 [ guicheckbox "aim invert Y"  invmouse
        ]
    ]

    guistrut 0.25
    guibar //===================================================================================================================================================
    guititle "keyboard"
    guistrut 0.3
    guialign 0 [ guitext "select action to bind, press desired key(s), press ESC when done" ]
    guistrut 0.7
    iBind = 0
    guilistsplit "iRow" 2 $BindActions [
        guistrut 32 1
        guialign 0 [
            guitext (tabify (concatword $iRow ": ") 4) 0
            [NewBinds@iBind] = (searchbinds $iRow)
            guikeyfield [NewBinds@iBind] -12 [
                OldBinds = (searchbinds [@@iRow])
                looplist iOld  $OldBinds         [bind $iOld ""]
                looplist iNew $[NewBinds@@iBind] [bind $iNew [@@@iRow]]
            ]
            iBind = (+ $iBind 1)
        ]
    ] [guibar]
]


