//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvar GUI_Optns_Wdth 1 66 0 // in units of (fontscale Width )
    defvar GUI_Optns_Hght 1 22 0 // in units of (fontscale Height)
    defvar CustomResX 256 256 8192
    defvar CustomResY 256 256 8192
]

newgui "options" [
    guiscale 0.7
    guikeeptab 1
    //  Save-the-frames 'guitabnum' hack:    H                                V
                      if (= $guitabnum  1) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Game   ]] ]
    guitab "console"; if (= $guitabnum  2) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Console]] ]
    guitab "hud"    ; if (= $guitabnum  3) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Hud    ]] ]
    guitab "input"  ; if (= $guitabnum  4) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Input  ]] ]
    guitab "menus"  ; if (= $guitabnum  5) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Menus  ]] ]
    guitab "sound"  ; if (= $guitabnum  6) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Sound  ]] ]
    guitab "video"  ; if (= $guitabnum  7) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Video  ]] ]
    guitab "res"    ; if (= $guitabnum  8) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Res    ]] ]
    guitab "gfx"    ; if (= $guitabnum  9) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Gfx    ]] ]
    guitab "cfg"    ; if (= $guitabnum 10) [ guilist [guistrut $GUI_Optns_Hght 1; guilist [guistrut $GUI_Optns_Wdth 1; GUI_Options_Cfg    ]] ]
] "game" [
    CustomResX = $scr_w
    CustomResY = $scr_h
]


