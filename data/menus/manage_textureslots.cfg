//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvar  GUI_TexMan_Width_Column   24 48    96
    defvar  GUI_TexMan_Width_SideBar   0 50    96
    defvar  GUI_TexMan_Width          -1 -1   480
    defvar  GUI_TexMan_Height         -1 -1    64

    defvarp TSM_SlotsPerColumn 16 36    64
    defvarp TSM_ColumnsPerTab   1  2     4
    defvarp TSM_ShowLayerParams 0  0     1

    defvar  TSM_NumOf_Columns  -1 -1  4096
    defvar  TSM_NumOf_Tabs     -1 -1  4096
    defvar  TSM_SlotsPerTab    -1 -1 16384

    defvar  TSM_NumOf_Slots      -1 -1 65535 //  TextureSlot index is an 'unsigned short'.
    defvar  TSM_NumOf_vSlots     -1 -1 65535
    defvar  TSM_NumOf_SlotsTotal -1 -1 65535

    defvar  TSM_SelIdx -1 -1 65535
    defsvar TSM_SelStr ""
]

//newgui "texslotmanager" [ if (|| (! $editing) (! (ingame))) [cleargui 1] [TSM_Main] ] "info" [TSM__Recalc]
//TSM_Main = [
newgui "texslotmanager" [
    guieditingcheck
    guikeeptab 1
    if (!= $TSM_NumOf_SlotsTotal $numvslots) [TSM__Update]
    guistayopen [
    guialign 0 [// H
        guistrut $GUI_TexMan_Height 1
        guilist [// V
            guistrut $GUI_TexMan_Width 1
            guititle "Texture Slot Manager"

            guibar //-------------------------------------------------------------------------------------------------------------------------------------------
            guialign 0 [// H
                guilist [// V
                    guititle "Options"

                    guistrut 1
                    guilist [// H
                        guitext (format " ^f7SlotsPerColumn:^t%1^t"  $TSM_SlotsPerColumn) 0
                        guibutton "" [TSM_SlotsPerColumn (+ $TSM_SlotsPerColumn -1); if (< $TSM_SlotsPerColumn 16) [TSM_SlotsPerColumn 16]; TSM__Recalc] "val_dec"
                        guibutton "" [TSM_SlotsPerColumn (+ $TSM_SlotsPerColumn  1); if (> $TSM_SlotsPerColumn 64) [TSM_SlotsPerColumn 64]; TSM__Recalc] "val_inc"
                    ]
                    guilist [// H
                        guitext (format " ^f7ColumnsPerTab: ^t%1^t"  $TSM_ColumnsPerTab) 0
                        guibutton "" [TSM_ColumnsPerTab (+ $TSM_ColumnsPerTab -1); if (< $TSM_ColumnsPerTab 1) [TSM_ColumnsPerTab 1]; TSM__Recalc] "val_dec"
                        guibutton "" [TSM_ColumnsPerTab (+ $TSM_ColumnsPerTab  1); if (> $TSM_ColumnsPerTab 4) [TSM_ColumnsPerTab 4]; TSM__Recalc] "val_inc"
                    ]

                    guistrut 1
                    guitext (concatword " NumOf Columns: ^t" $TSM_NumOf_Columns) 0
                    guitext (concatword " NumOf Tabs:    ^t" $TSM_NumOf_Tabs   ) 0

                    guistrut 1
                    guilist [// H
                        guistrut 1;
                        guicheckbox " Show Layer Parameters" TSM_ShowLayerParams
                    ]
                    guistrut 1

                    guibar //-----------------------------------------------------------------------------------------------------------------------------------
                    guititle "Stats"

                    guistrut 1
                    guitext (concatword " NumOf Slots:   ^t"  $TSM_NumOf_Slots     ) 0
                    guitext (concatword " NumOf vSlots:  ^t"  $TSM_NumOf_vSlots    ) 0

                    guistrut 0.5
                    guitext (concatword " Total:         ^t" $TSM_NumOf_SlotsTotal) 0
                    guistrut 1
                ]

                guibar //---------------------------------------------------------------------------------------------------------------------------------------
                guilist [// V
                    guititle "Info"

                    guistrut 1
                    guitext "   ^f7White^t = Texture is loaded." 0
                    guitext "   ^f4Grey^t = Texture is not loaded." 0
                    guitext "   ^f2Yellow^t = Texture is vSlot." 0

                    guistrut 1
                    guitext " A texture can be loaded and un-used." 0
                    guitext " Use ^f2/reloadmap ^f~or ^f2/resetgl ^f~if you would like to see if the map is using a texture." 0
                    guistrut 1

                    guibar //-----------------------------------------------------------------------------------------------------------------------------------
                    guititle "CleanUp / Optimize"

                    guistrut 1
                    guitext " vSlots are automatically optimized upon ^f2/savemap^f~." 0
                    guistrut 1
                    guitext " vSlots will automatically optimize when this many new vslots have been created:" 0

                    guistrut 0.5
                    guilist [// H
                        guitext "^f7   autocompactvslots: " 0
                        guilist [// V
                            guistrut 32 1
                            guislider autocompactvslots 0 1024 [autocompactvslots (round $autocompactvslots 32)]
                        ]
                        guitext "^f9 (default 256)" 0
                    ]
                    guistrut 1.5
                    guitext " This will set the texture of all hidden cube faces to slot[1] (default texture):" 0

                    guistrut 0.5
                    guilist [guistrut 3; guibutton "^f2/fixinsidefaces" [fixinsidefaces]]

                    guistrut 1.5
                    guitext " Manually optimize vSlots:" 0
                    guistrut 0.5
                    guilist [guistrut 3; guibutton "^f2/compactvslots" [compactvslots]]
                    guistrut 1
                ]
            ]
        ]
    ]


    loop iTab $TSM_NumOf_Tabs [
        guitab (* $iTab $TSM_SlotsPerTab)
        guialign 0 [// H
            guistrut $GUI_TexMan_Height 1

            //  Is this the active Tab?  If so, populate.
            if (= $iTab (- $guitabnum 2)) [
                iTex = (* $iTab $TSM_SlotsPerTab)
                iCol = 1
                while [<= $iCol $TSM_ColumnsPerTab] [
                    guilist [// V
                        guistrut $GUI_TexMan_Width_Column 1
                        iEND = (+ (* $iTab $TSM_SlotsPerTab) (- (* $iCol $TSM_SlotsPerColumn) 1))
                        while [<= $iTex $iEND] [
                            if (>= $iTex $TSM_NumOf_SlotsTotal) [
                                iTex = (+ $iEND 1) // exitloop/break
                            ][
                                //cond [= $iTex $TSM_SelIdx    ][TextColor = "^f8"  // Selected
                                //    ][= (getslottex $iTex) -1][TextColor = "^f2"  // Is vSlot  (always loaded, unused vslots are purged upon savemap)
                                //    ][    texloaded $iTex    ][TextColor = "^f7"  // Is Loaded
                                //                             ][TextColor = "^f4"] // Is Not Loaded

                                //                                   Selected                           Is vSlot                   IsLoaded  IsNotLoaded
                                TextColor = (? (= $iTex $TSM_SelIdx) "^f8" (? (= (getslottex $iTex) -1) "^f2" (? (texloaded $iTex) "^f7"     "^f4")))

                                guibutton (concatword " ^f7[^f2" $iTex "^f7] " $TextColor (gettexname $iTex)) (concat "TSM_SelIdx" $iTex "; TSM_SelStr" (gettexname $iTex 0) ) 0
                                iTex = (+ $iTex 1)
                            ]
                        ]
                        iCol = (+ $iCol 1)
                    ]
                ]

                guibar //---------------------------------------------------------------------------------------------------------------------------------------
                guilist [// V
                    guistrut $GUI_TexMan_Width_SideBar 1
                    guialign 0 [// H
                        guiimage (concatword "packages/" $TSM_SelStr) 0 7 0 "data/cube.png" // <thumbnail:256>  <-- Breaks non-square textures.
                        if (!= (getvlayer $TSM_SelIdx) 0) [
                            guistrut -7
                            guiimage (concatword "packages/" (gettexname (getvlayer $TSM_SelIdx)) ) () 4 0 "data/cube.png"
                        ]
                    ]

                    if (< $TSM_SelIdx 0) [
                        guitext " ^f~[^f2~^f~,^f2~^f~] ^f2^"~^"" 0
                    ][
                                                       guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f20^f~] ^f2^"" (gettexname $TSM_SelIdx 0) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 0)] 0
                        if (gettexname $TSM_SelIdx 1) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f21^f~] ^f2^"" (gettexname $TSM_SelIdx 1) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 1)] 0]
                        if (gettexname $TSM_SelIdx 2) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f22^f~] ^f2^"" (gettexname $TSM_SelIdx 2) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 2)] 0]
                        if (gettexname $TSM_SelIdx 3) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f23^f~] ^f2^"" (gettexname $TSM_SelIdx 3) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 3)] 0]
                        if (gettexname $TSM_SelIdx 4) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f24^f~] ^f2^"" (gettexname $TSM_SelIdx 4) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 4)] 0]
                        if (gettexname $TSM_SelIdx 5) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f25^f~] ^f2^"" (gettexname $TSM_SelIdx 5) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 5)] 0]
                        if (gettexname $TSM_SelIdx 6) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f26^f~] ^f2^"" (gettexname $TSM_SelIdx 6) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 6)] 0]
                        if (gettexname $TSM_SelIdx 7) [guibutton (concatword " ^f~[^f2" $TSM_SelIdx "^f~,^f27^f~] ^f2^"" (gettexname $TSM_SelIdx 7) "^"" ) [TSM_SelStr (gettexname $TSM_SelIdx 7)] 0]
                    ]
                    TSM__Parameters $TSM_SelIdx

                    guibar //-----------------------------------------------------------------------------------------------------------------------------------
                    //guititle "texlayer"
                    guistrut 0.25
                    if (<= (getvlayer $TSM_SelIdx) 0) [
                        guitext " ^f~[^f6~^f~] ^f6^"none^"" 0
                    ][
                        guitext (format " ^f~[^f6%1^f~] ^f6^"%2^""  (getvlayer $TSM_SelIdx) (gettexname (getvlayer $TSM_SelIdx)) ) 0
                        //if (!= $TSM_ShowLayerParams 0) [
                            TSM__Parameters (getvlayer $TSM_SelIdx)
                        //]
                        if (getvlayermaskname $TSM_SelIdx) [
                            guistrut 0.5
                            guifreerow 10  1 [ guitext "layermask: " 0
                                     ]  1 -2 [ guitext (concatword "^f2^"" (getvlayermaskname $TSM_SelIdx) "^"") 0
                            ]
                            guifreerow 10  1 [ guitext "mode: " 0
                                     ]  1 -2 [ guitext (concatword "^f2" (getvlayermaskmode $TSM_SelIdx) " ^f7^"" $(concatword "EH_LayerMaskMode_"(getvlayermaskmode $TSM_SelIdx)) "^"") 0
                            ]
                            guifreerow 10  1 [ guitext "scale: " 0
                                     ]  1 -2 [ guitext (concatword "^f2" (getvlayermaskscale $TSM_SelIdx)) 0
                            ]
                        ]
                    ]
                ]

            ]

        ]
    ]
]] "info" [TSM__Recalc]


//##############################################################################################################################################################
//##############################################################################################################################################################
//    arg1: INDEX   Texture slot.
TSM__Parameters = [
    guifreerow 12  1 [ guitext "color:" 0
             ]  8  1 [ guitext (concatword "^f3" (at (getvcolor @arg1) 0)) 0
             ]  8  1 [ guitext (concatword "^f0" (at (getvcolor @arg1) 1)) 0
             ]  8  1 [ guitext (concatword "^f1" (at (getvcolor @arg1) 2)) 0
    ]
    guistrut 0.08333 //0.09375
    guifreerow 12  1 [ guitext "alpha:" 0
             ]  8  1 [ guitext (concatword "^f5" (at (getvalpha @arg1) 0)) 0
             ]  8  1 [ guitext (concatword "^f5" (at (getvalpha @arg1) 1)) 0
    ]
    guistrut 0.08333
    guifreerow 12  1 [ guitext "rotate:" 0
             ]  8  1 [ guitext (concatword "^f2" (getvrotate @arg1)) 0
             ]  1 -1 [ guitext (concatword " ^f7^"" (at $Labels_TexRotate (getvrotate @arg1)) "^"") 0
    ]
    guistrut 0.08333
    guifreerow 12  1 [ guitext "offset:" 0
             ]  8  1 [ guitext (concatword "^f3" (at (getvoffset @arg1) 0)) 0
             ]  8  1 [ guitext (concatword "^f0" (at (getvoffset @arg1) 1)) 0
    ]
    guistrut 0.08333
    guifreerow 12  1 [ guitext "scale:" 0
             ]  8  1 [ guitext (concatword "^f2" (getvscale @arg1)) 0
    ]
    guistrut 0.08333
    guifreerow 12  1 [ guitext "scroll:" 0
             ]  8  1 [ guitext (concatword "^f3" (at (getvscroll @arg1) 0)) 0
             ]  8  1 [ guitext (concatword "^f0" (at (getvscroll @arg1) 1)) 0
    ]
    guistrut 0.08333
    guifreerow 12  1 [ guitext "smooth:" 0
             ]  7 -2 [ guitext " ^f7group:" 0
             ]  4  1 [ guitext (concatword "^f2" (getvsmooth @arg1)) 0
             ] 10 -2 [ guitext "  ^f7threshold:" 0
             ]  4  1 [ guitext (concatword "^f2" (getsmoothangle (getvsmooth @arg1))) 0
    ]
    guistrut 0.08333
    guifreerow 12  1 [ guitext "vshaderparam:" 0
             ]  1 -2 [ guitext (concatword " ^f2^"" (getvshaderparamnames @arg1) "^" " (getvshaderparam @arg1 (getvshaderparamnames @arg1)) ) 0
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
TSM__Recalc = [
    TSM_SlotsPerTab   (* $TSM_SlotsPerColumn $TSM_ColumnsPerTab)
    TSM_NumOf_Columns (+ (ceil (divf $TSM_NumOf_SlotsTotal $TSM_SlotsPerColumn)))
    TSM_NumOf_Tabs    (+ (ceil (divf $TSM_NumOf_Columns  $TSM_ColumnsPerTab )))

    GUI_TexMan_Width  (+ (+ (* $TSM_ColumnsPerTab $GUI_TexMan_Width_Column) $GUI_TexMan_Width_SideBar) 2) //<-- +2 to account for guibar.
    GUI_TexMan_Height $TSM_SlotsPerColumn
]

//==============================================================================================================================================================
TSM__Update = [
    TSM_NumOf_Slots      $numslots
    TSM_NumOf_vSlots     (- $numvslots $numslots)
    TSM_NumOf_SlotsTotal $numvslots

    TSM_SelIdx -1

    TSM__Recalc
]
