    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "minimap"
    if (= $guitabnum  2) [
        guialign 0 [// H
            guistrut $GUI_MapMisc_Height 1
            guilist [// V
                guistrut $GUI_MapMisc_Width 1

                guistrut 0.25
                guilist [// H
                    guistrut 12
                    guicheckbox "clip" minimapclip
                ]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1.5
                        guialign 1 [guicolor $minimapcolour; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_MiniMapR (& (>> $minimapcolour  16) 0xFF)
                        MAP_MiniMapG (& (>> $minimapcolour   8) 0xFF)
                        MAP_MiniMapB (&     $minimapcolour      0xFF)
                        guislider MAP_MiniMapR 0 255 [minimapcolour $MAP_MiniMapR $MAP_MiniMapG $MAP_MiniMapB]; guistrut 0.25
                        guislider MAP_MiniMapG 0 255 [minimapcolour $MAP_MiniMapR $MAP_MiniMapG $MAP_MiniMapB]; guistrut 0.25
                        guislider MAP_MiniMapB 0 255 [minimapcolour $MAP_MiniMapR $MAP_MiniMapG $MAP_MiniMapB]; guistrut 0.25
                    ]
                ]

                guistrut 1
                guifreerow 12  1 [ guitext "height: " 0
                         ] 48 -2 [ guifield minimapheight 24 //  VARR(minimapheight, 0, 0, 2<<16)
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "shadowmap"
    if (= $guitabnum  3) [
        guialign 0 [// H
            guistrut $GUI_MapMisc_Height 1
            guilist [// V
                guistrut $GUI_MapMisc_Width 1

                guistrut 0.25
                guifreerow 12  1 [ guitext "angle: " 0
                         ] 48 -2 [ guislider shadowmapangle
                ]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1.5
                        guialign 1 [guicolor $shadowmapambient; guistrut 1]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_ShadowMapAmbientR (& (>> $shadowmapambient  16) 0xFF)
                        MAP_ShadowMapAmbientG (& (>> $shadowmapambient   8) 0xFF)
                        MAP_ShadowMapAmbientB (&     $shadowmapambient      0xFF)
                        guislider MAP_ShadowMapAmbientR 0 255 [shadowmapambient $MAP_ShadowMapAmbientR $MAP_ShadowMapAmbientG $MAP_ShadowMapAmbientB]; guistrut 0.25
                        guislider MAP_ShadowMapAmbientG 0 255 [shadowmapambient $MAP_ShadowMapAmbientR $MAP_ShadowMapAmbientG $MAP_ShadowMapAmbientB]; guistrut 0.25
                        guislider MAP_ShadowMapAmbientB 0 255 [shadowmapambient $MAP_ShadowMapAmbientR $MAP_ShadowMapAmbientG $MAP_ShadowMapAmbientB]; guistrut 0.25
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
    //##########################################################################################################################################################
    guitab "water caustics"
    if (= $guitabnum  4) [
        guialign 0 [// H
            guistrut $GUI_MapMisc_Height 1
            guilist [// V
                guistrut $GUI_MapMisc_Width 1

                guistrut 0.25
                MAP_CausticContrast (*f $causticcontrast 1000)
                guifreerow 12  1 [ guitext "contrast: " 0
                         ] 48 -2 [ guislider MAP_CausticContrast 0 1000 [causticcontrast (*f $MAP_CausticContrast 0.001)]
                ]

                guistrut 1
                guifreerow 12  1 [ guitext "millis: " 0
                         ] 48 -2 [ guislider causticmillis 33 333
                ]

                guistrut 1
                guifreerow 12  1 [ guitext "scale: " 0
                         ] 48 -2 [ guislider causticscale 8 256
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
