nodebug [
    deffvar GUI_MapMisc_Width  1 60   -1
    deffvar GUI_MapMisc_Height 1 11.5 -1

    defvar MAP_GrassAnimScale 0 0 1000
    defvar MAP_GrassR 0 0 255
    defvar MAP_GrassG 0 0 255
    defvar MAP_GrassB 0 0 255
    defvar MAP_GrassA 0 0 255

    defvar MAP_GrassTaper      0 0 1000
    defvar MAP_GrassStep       0 0 8000
    defvar MAP_GrassMarginFade 0 0 1000

    defvar MAP_MiniMapR 0 0 255
    defvar MAP_MiniMapG 0 0 255
    defvar MAP_MiniMapB 0 0 255

    defvar MAP_ShadowMapAmbientR 0 0 255
    defvar MAP_ShadowMapAmbientG 0 0 255
    defvar MAP_ShadowMapAmbientB 0 0 255

    defvar MAP_CausticContrast 0 0 1000
]

newgui "map_misc" [
    guiposition 0 1
    guiscale 0.6
    guikeeptab 1
    guistayopen [
    //##########################################################################################################################################################
    //##########################################################################################################################################################
    if (= $guitabnum  1) [
        guialign 0 [// H
            guistrut $GUI_MapMisc_Height 1
            guilist [// V
                guistrut $GUI_MapMisc_Width 1

                guistrut 0.25
                MAP_GrassAnimScale (*f $grassanimscale 1000)
                guifreerow 12  1 [ guitext "anim scale: " 0
                         ] 48 -2 [ guislider MAP_GrassAnimScale 0 1000 [grassanimscale (*f $MAP_GrassAnimScale 0.001)]
                ]

                guistrut 0.5
                guifreerow 12  1 [ guitext "anim millis: " 0   //  VARR(grassanimmillis, 0, 3000, 60000)
                         ] 48 -2 [ guislider grassanimmillis
                ]

                guistrut 1
                guifreerow 12  1 [ guitext "texture scale: " 0
                         ] 48 -2 [ guislider grassscale
                ]

                guistrut 1
                guilist [// H
                    guilist [// V
                        guistrut 12 1
                        guialign 1 [guitext "color: " 0]
                        guistrut 1.5
                        guialign 1 [guicolor $grasscolour; guistrut 1]
                        guistrut 0.5
                        guialign 1 [guitext "alpha: " 0]
                    ]
                    guilist [// V
                        guistrut 48 1
                        MAP_GrassR (& (>> $grasscolour  16) 0xFF)
                        MAP_GrassG (& (>> $grasscolour   8) 0xFF)
                        MAP_GrassB (&     $grasscolour      0xFF)
                        MAP_GrassA (*f $grassalpha 255)
                        guislider MAP_GrassR 0 255 [grasscolour $MAP_GrassR $MAP_GrassG $MAP_GrassB]; guistrut 0.25
                        guislider MAP_GrassG 0 255 [grasscolour $MAP_GrassR $MAP_GrassG $MAP_GrassB]; guistrut 0.25
                        guislider MAP_GrassB 0 255 [grasscolour $MAP_GrassR $MAP_GrassG $MAP_GrassB]; guistrut 0.5
                        guislider MAP_GrassA 0 255 [grassalpha (*f $MAP_GrassA (divf 1 255))]
                    ]
                ]
            ]
        ]
    ]

    //##########################################################################################################################################################
