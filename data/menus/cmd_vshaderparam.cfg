//##############################################################################################################################################################
//  vShaderParam Editor:
//##############################################################################################################################################################
nodebug [
    defvar VSP_DoEnvScale       0 0 1
    defvar VSP_DoGlowColor      0 0 1
    defvar VSP_DoPulseGlowColor 0 0 1
    defvar VSP_DoPulseGlowSpeed 0 0 1
    defvar VSP_DoPulseSpeed     0 0 1
    defvar VSP_DoParallaxScale  0 0 1
    defvar VSP_DoSpecScale      0 0 1

    defvar VSP_EnvScaleR       0 100 1000 // 0 to 10
    defvar VSP_EnvScaleG       0 100 1000 // 0 to 10    Reflection Scalar
    defvar VSP_EnvScaleB       0 100 1000 // 0 to 10

    defvar VSP_GlowColorR      0 100 1000 // 0 to 10
    defvar VSP_GlowColorG      0 100 1000 // 0 to 10    GlowColor Multiplier (Pulse from)
    defvar VSP_GlowColorB      0 100 1000 // 0 to 10
    defvar VSP_PulseGlowColorR 0 100 1000 // 0 to 10
    defvar VSP_PulseGlowColorG 0 100 1000 // 0 to 10    GlowColor Multiplier (Pulse to)
    defvar VSP_PulseGlowColorB 0 100 1000 // 0 to 10
    defvar VSP_PulseGlowSpeed  0 100 2000 // 0 to 20    Pulse Frequency (Hz)

    defvar VSP_PulseSpeed      0 100 2000 // 0 to 20    Pulse Frequency (Hz)

    defvar VSP_ParallaxScaleA -100  6 100 // -1 to 1    Parallax Scaling...
    defvar VSP_ParallaxScaleB -100 -3 100 // -1 to 1

    defvar VSP_SpecScaleR      0 100 1000 // 0 to 10
    defvar VSP_SpecScaleG      0 100 1000 // 0 to 10    Specularity Multiplier
    defvar VSP_SpecScaleB      0 100 1000 // 0 to 10

    defvar VSP_AutoSet 0 0 1 [if (&& $VSP_AutoSet (ingamemp)) [VSP_AutoSet 0]]
]

newgui "vshaderparam" [
    guieditingcheck
    guiscale .5
    guiposition 0 1
    guistayopen [guinoautotab [
        guilist [
            guistrut 0.25
            guilist [
                guistrut 64 1
                //==============================================================================================================================================
                guialign 0 [
                    guistrut 2
                    guibutton "RESET" [VSP__Reset; VSP__Set 1]
                    guistrut 10
                    guibutton "^f2GET ALL" [VSP__GetAll]
                    guistrut 10
                    guibutton "^f8SET" [VSP__Set 1]
                    guistrut 3
                    if (= (ingamemp) 0) [
                        //guicheckbox (concatword (? $VSP_AutoSet (? (mod (div $getmillis 500) 2) "^f1" "^f8") "^f7") "AutoSet") VSP_AutoSet 1 0
                        guicheckbox "AutoSet" VSP_AutoSet 1 0
                    ]
                ]
                //==============================================================================================================================================
                //guistrut 0.5
                guilist [
                    guicheckbox "envscale" VSP_DoEnvScale 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "envscale") 0) [
                        Got = (getvshaderparam $getseltex "envscale")
                        guitext (concatword "^f3" (at $Got 0) "  ^f0" (at $Got 1) "  ^f1" (at $Got 2) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetEnvScale]
                    ][
                        guitext "^f4~  ~  ~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8R" 0]; guilist [guistrut 64 1; guislider VSP_EnvScaleR  0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8G" 0]; guilist [guistrut 64 1; guislider VSP_EnvScaleG  0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8B" 0]; guilist [guistrut 64 1; guislider VSP_EnvScaleB  0 1000 [VSP__Set] ]]
                //==============================================================================================================================================
                guistrut 1
                guilist [
                    guicheckbox "specscale" VSP_DoSpecScale 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "specscale") 0) [
                        Got = (getvshaderparam $getseltex "specscale")
                        guitext (concatword "^f3" (at $Got 0) "  ^f0" (at $Got 1) "  ^f1" (at $Got 2) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetSpecScale]
                    ][
                        guitext "^f4~  ~  ~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8R" 0]; guilist [guistrut 64 1; guislider VSP_SpecScaleR 0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8G" 0]; guilist [guistrut 64 1; guislider VSP_SpecScaleG 0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8B" 0]; guilist [guistrut 64 1; guislider VSP_SpecScaleB 0 1000 [VSP__Set] ]]
                //==============================================================================================================================================
                guistrut 1
                guilist [
                    guicheckbox "parallaxscale" VSP_DoParallaxScale 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "parallaxscale") 0) [
                        Got = (getvshaderparam $getseltex "parallaxscale")
                        guitext (concatword "^f2" (at $Got 0) "  " (at $Got 1) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetParallaxScale]
                    ][
                        guitext "^f4~  ~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8A" 0]; guilist [guistrut 64 1; guislider VSP_ParallaxScaleA -100 100 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8B" 0]; guilist [guistrut 64 1; guislider VSP_ParallaxScaleB -100 100 [VSP__Set] ]]
                //==============================================================================================================================================
            ]
            guibar
            guistrut 0.25
            guilist [
                guistrut 64 1
                //==============================================================================================================================================
                guilist [
                    guicheckbox "glowcolor" VSP_DoGlowColor 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "glowcolor") 0) [
                        Got = (getvshaderparam $getseltex "glowcolor")
                        guitext (concatword "^f3" (at $Got 0) "  ^f0" (at $Got 1) "  ^f1" (at $Got 2) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetGlowColor]
                    ][
                        guitext "^f4~  ~  ~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8R" 0];  guilist [guistrut 64 1; guislider VSP_GlowColorR 0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8G" 0];  guilist [guistrut 64 1; guislider VSP_GlowColorG 0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8B" 0];  guilist [guistrut 64 1; guislider VSP_GlowColorB 0 1000 [VSP__Set] ]]
                //==============================================================================================================================================
                guistrut 0.5
                guilist [
                    guicheckbox "pulseglowcolor" VSP_DoPulseGlowColor 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "pulseglowcolor") 0) [
                        Got = (getvshaderparam $getseltex "pulseglowcolor")
                        guitext (concatword "^f3" (at $Got 0) "  ^f0" (at $Got 1) "  ^f1" (at $Got 2) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetPulseGlowColor]
                    ][
                        guitext "^f4~  ~  ~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8R" 0];  guilist [guistrut 64 1; guislider VSP_PulseGlowColorR 0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8G" 0];  guilist [guistrut 64 1; guislider VSP_PulseGlowColorG 0 1000 [VSP__Set] ]]
                guilist [guilist [guistrut 2.5 1; guitext "^f8B" 0];  guilist [guistrut 64 1; guislider VSP_PulseGlowColorB 0 1000 [VSP__Set] ]]
                //==============================================================================================================================================
                guistrut 0.5
                guilist [
                    guicheckbox "pulseglowspeed" VSP_DoPulseGlowSpeed 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "pulseglowspeed") 0) [
                        guitext (concat "^f2" (at (getvshaderparam $getseltex "pulseglowspeed") 0) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetPulseGlowSpeed]
                    ][
                        guitext "^f4~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8Hz" 0]; guilist [guistrut 64 1; guislider VSP_PulseGlowSpeed 1 2000 [VSP__Set] ]]
                //==============================================================================================================================================
                guistrut 1
                guilist [
                    guicheckbox "pulsespeed" VSP_DoPulseSpeed 1 0 [VSP__Set]
                    guispring
                    if (>= (indexof (getvshaderparamnames $getseltex) "pulsespeed") 0) [
                        guitext (concat "^f2" (at (getvshaderparam $getseltex "pulsespeed") 0) ) 0
                        guistrut 2
                        guibutton "^f2GET" [VSP__GetPulseSpeed]
                    ][
                        guitext "^f4~" 0
                        guistrut 2
                        guibutton "^f4GET" [sleep 1]
                    ]
                ]
                guilist [guilist [guistrut 2.5 1; guitext "^f8Hz" 0]; guilist [guistrut 64 1; guislider VSP_PulseSpeed 1 2000 [VSP__Set] ]]
                //==============================================================================================================================================
            ]
        ]
    ]]
] 0 []


//##############################################################################################################################################################
//##############################################################################################################################################################
VSP__Reset = [
    VSP_DoEnvScale        0
    VSP_DoGlowColor       0
    VSP_DoPulseGlowColor  0
    VSP_DoPulseGlowSpeed  0
    VSP_DoPulseSpeed      0
    VSP_DoParallaxScale   0
    VSP_DoSpecScale       0

    VSP_EnvScaleR       100
    VSP_EnvScaleG       100
    VSP_EnvScaleB       100
    VSP_GlowColorR      100
    VSP_GlowColorG      100
    VSP_GlowColorB      100
    VSP_PulseGlowColorR 100
    VSP_PulseGlowColorG 100
    VSP_PulseGlowColorB 100
    VSP_PulseGlowSpeed  100
    VSP_PulseSpeed      100
    VSP_ParallaxScaleA    6
    VSP_ParallaxScaleB   -3
    VSP_SpecScaleR      100
    VSP_SpecScaleG      100
    VSP_SpecScaleB      100
]


//##############################################################################################################################################################
//##############################################################################################################################################################
VSP__Set = [
    if (|| (> $numargs 0) [&& $VSP_AutoSet (= (ingamemp) 0)]) [
        vshaderparam ""
        if $VSP_DoEnvScale       [vdelta [vshaderparam "envscale"       (*f $VSP_EnvScaleR       0.01) (*f $VSP_EnvScaleG       0.01) (*f $VSP_EnvScaleB       0.01) ]]
        if $VSP_DoGlowColor      [vdelta [vshaderparam "glowcolor"      (*f $VSP_GlowColorR      0.01) (*f $VSP_GlowColorG      0.01) (*f $VSP_GlowColorB      0.01) ]]
        if $VSP_DoPulseGlowColor [vdelta [vshaderparam "pulseglowcolor" (*f $VSP_PulseGlowColorR 0.01) (*f $VSP_PulseGlowColorG 0.01) (*f $VSP_PulseGlowColorB 0.01) ]]
        if $VSP_DoPulseGlowSpeed [vdelta [vshaderparam "pulseglowspeed" (*f $VSP_PulseGlowSpeed  0.01)                                                               ]]
        if $VSP_DoPulseSpeed     [vdelta [vshaderparam "pulsespeed"     (*f $VSP_PulseSpeed      0.01)                                                               ]]
        if $VSP_DoParallaxScale  [vdelta [vshaderparam "parallaxscale"  (*f $VSP_ParallaxScaleA  0.01) (*f $VSP_ParallaxScaleB  0.01)                                ]]
        if $VSP_DoSpecScale      [vdelta [vshaderparam "specscale"      (*f $VSP_SpecScaleR      0.01) (*f $VSP_SpecScaleG      0.01) (*f $VSP_SpecScaleB      0.01) ]]
    ]
]


//##############################################################################################################################################################
//##############################################################################################################################################################
VSP__GetAll = [
    VSP_DoEnvScale       0
    VSP_DoGlowColor      0
    VSP_DoPulseGlowColor 0
    VSP_DoPulseGlowSpeed 0
    VSP_DoPulseSpeed     0
    VSP_DoParallaxScale  0
    VSP_DoSpecScale      0

    VSP__GetEnvScale
    VSP__GetGlowColor
    VSP__GetPulseGlowColor
    VSP__GetPulseGlowSpeed
    VSP__GetPulseSpeed
    VSP__GetParallaxScale
    VSP__GetSpecScale
]

//==============================================================================================================================================================
VSP__GetEnvScale = [
    if (>= (indexof (getvshaderparamnames $getseltex) "envscale") 0) [
        Got = (getvshaderparam $getseltex "envscale")
        VSP_EnvScaleR (round (*f (at $Got 0) 100))
        VSP_EnvScaleG (round (*f (at $Got 1) 100))
        VSP_EnvScaleB (round (*f (at $Got 2) 100))
        VSP_DoEnvScale 1
    ]
]
VSP__GetGlowColor = [
    if (>= (indexof (getvshaderparamnames $getseltex) "glowcolor") 0) [
        Got = (getvshaderparam $getseltex "glowcolor")
        VSP_GlowColorR (round (*f (at $Got 0) 100))
        VSP_GlowColorG (round (*f (at $Got 1) 100))
        VSP_GlowColorB (round (*f (at $Got 2) 100))
        VSP_DoGlowColor 1
    ]
]
VSP__GetPulseGlowColor = [
    if (>= (indexof (getvshaderparamnames $getseltex) "pulseglowcolor") 0) [
        Got = (getvshaderparam $getseltex "pulseglowcolor")
        VSP_PulseGlowColorR (round (*f (at $Got 0) 100))
        VSP_PulseGlowColorG (round (*f (at $Got 1) 100))
        VSP_PulseGlowColorB (round (*f (at $Got 2) 100))
        VSP_DoPulseGlowColor 1
    ]
]
VSP__GetPulseGlowSpeed = [
    if (>= (indexof (getvshaderparamnames $getseltex) "pulseglowspeed") 0) [
        Got = (getvshaderparam $getseltex "pulseglowspeed")
        VSP_PulseGlowSpeed (round (*f (at $Got 0) 100))
        VSP_DoPulseGlowSpeed 1
    ]
]
VSP__GetPulseSpeed = [
    if (>= (indexof (getvshaderparamnames $getseltex) "pulsespeed") 0) [
        Got = (getvshaderparam $getseltex "pulsespeed")
        VSP_PulseSpeed (round (*f (at $Got 0) 100))
        VSP_DoPulseSpeed 1
    ]
]
VSP__GetParallaxScale = [
    if (>= (indexof (getvshaderparamnames $getseltex) "parallaxscale") 0) [
        Got = (getvshaderparam $getseltex "parallaxscale")
        VSP_ParallaxScaleA (round (*f (at $Got 0) 100))
        VSP_ParallaxScaleB (round (*f (at $Got 1) 100))
        VSP_DoParallaxScale 1
    ]
]
VSP__GetSpecScale = [
    if (>= (indexof (getvshaderparamnames $getseltex) "specscale") 0) [
        Got = (getvshaderparam $getseltex "specscale")
        VSP_SpecScaleR (round (*f (at $Got 0) 100))
        VSP_SpecScaleG (round (*f (at $Got 1) 100))
        VSP_SpecScaleB (round (*f (at $Got 2) 100))
        VSP_DoSpecScale 1
    ]
]

