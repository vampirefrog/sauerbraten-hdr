//##############################################################################################################################################################
//##############################################################################################################################################################
nodebug [
    defvarp mmguiwidth  2 7 12
    defvarp mmguiheight 2 4 12
    defvarp mmguiname   0 1  1

    defvar  MMB_ModelsPerTab 0 0 144
]

// MMB_pick: spawn a mapmodel by index. Called from the F4 preview click as `MMB_pick @iMdl`. For a
// mapmodel entity, attr1 = yaw and attr2 = the mapmodel index (fpsgame/entities.cpp:84 -
// `mapmodelname(e.attr2)`). The engine's `entcamdir 1` feature shifts a single-arg `newent mapmodel N`
// so N ends up in attr2 -- but with `entcamdir 0` the index stays in attr1 and attr2 stays 0, which
// makes every dropped mapmodel render as model 0. Pass yaw=0 + idx explicitly: it works whether
// `entcamdir` is on (the shift moves yaw -> attr2 = 0... wait that ruins it) or off. So instead
// force `entcamdir 1` around the spawn (the shift sets attr1 to the live camera yaw, attr2 to N),
// then restore.
MMB_pick = [
    MMB_saved_cd = $entcamdir
    entcamdir 1
    do (concatword "newent mapmodel " $arg1)
    entcamdir $MMB_saved_cd
]

newgui "mapmodels" [
    if (|| (! $editing) (! (ingame))) [cleargui 1] [
        guikeeptab 1
        guinoautotab [
            MMB_ModelsPerTab = (* $mmguiwidth $mmguiheight)
            loop iTab (div (+ $nummapmodels (- $MMB_ModelsPerTab 1)) $MMB_ModelsPerTab) [
                if $iTab [guitab (+ $iTab 1)]
                if (= $guitabnum (+ $iTab 1)) [
                    loop iY $mmguiheight [
                        OffsetY = (+ (* $iTab $MMB_ModelsPerTab) (* $iY $mmguiwidth))
                        guilist [
                            loop iX $mmguiwidth [
                                iMdl = (+ $OffsetY $iX)
                                guimodelpreview (mapmodelname $iMdl) "mapmodel" [MMB_pick @iMdl] 3 1 $iMdl 1
                            ]
                        ]
                    ]
                    if (!= $mmguiname 0) [
                        guistrut 0.2
                        guititle (concatword "^f7[^f2" (at $guirolloverpreviewaction 2) "^f7] ^f2" $guirolloverpreviewname)
                    ]
                ]
            ]
        ]
    ]
] "Mapmodels"
