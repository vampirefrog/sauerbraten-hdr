bind  F3 []
bind  F4 []

bind  F5 []
bind  F6 [showcustommaps]
bind  F7 []
bind  F8 []

bind  F9 []
bind F10 []
bind F11 [toggleconsole; if (! $fullconsole) [conskip -1000]]
bind F12 [screenshot]

bindvarquiet PAUSE [paused]

